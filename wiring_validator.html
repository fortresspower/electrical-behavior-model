<body>
<div id="root"></div>
<script>
(function() {
"use strict";

// === Constants ===
const BATTERY_MAX = 250;
const CONDUCTOR_RATING = 250;
const MAX_BATTERY_COUNT = 24;
const MAX_INVERTER_COUNT = 10;
const EFORCE_MAX_BATTERY_COUNT = 32;
const EFORCE_STACK_CURRENTS = [195, 250, 250]; // 1, 2, 3 modules
const EFORCE_MODULE_KWH = 9.6;
const EFORCE_NODE_RATING = 750;
const EFORCE_TERMINAL_COUNT = 4;
const EFORCE_FIXED_TYPE = "eforce_four_point";

function getMaxBatteryCountForModel(batteryModel) {
  return batteryModel === "eforce" ? EFORCE_MAX_BATTERY_COUNT : MAX_BATTERY_COUNT;
}
function getEforceStackCurrent(stackSize) {
  const clamped = Math.max(1, Math.min(3, stackSize | 0));
  return EFORCE_STACK_CURRENTS[clamped - 1];
}
function getBatteryMaxCurrent(batteryIndex, batteryModel, eforceStackSizes) {
  if (batteryModel === "eforce") {
    return getEforceStackCurrent((eforceStackSizes || [])[batteryIndex] || 1);
  }
  return BATTERY_MAX;
}
function getBatteryCapacityWeight(batteryIndex, batteryModel, eforceStackSizes) {
  // Used by the share-mode current-distribution math. Current in parallel batteries
  // distributes inversely to internal resistance, which in turn scales with module
  // count: a 3-module stack pulls 3x the current of a 1-module stack. eBoost
  // batteries are uniform, so the weight is 1 and the math collapses to equal share.
  if (batteryModel === "eforce") {
    return Math.max(1, Math.min(3, (eforceStackSizes || [])[batteryIndex] || 1));
  }
  return 1;
}
const INVERTER_MODELS = {
  envy_8kw: { label: "Envy 8kW", current: 167, maxPorts: 1, bridgedPorts: false },
  envy_10kw: { label: "Envy 10kW", current: 210, maxPorts: 1, bridgedPorts: false },
  envy_duo_21_envy_12kw: { label: "Envy Duo 21 / Envy 12kW", current: 250, maxPorts: 2, bridgedPorts: true },
};

// === Pure helpers ===
function clampCount(value, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 1;
  return Math.max(1, Math.min(max, Math.floor(n)));
}
function formatAmps(value) {
  const rounded = Math.round((Number(value) || 0) * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}
function names(prefix, count) {
  return Array.from({ length: count }, (_, i) => prefix + (i + 1));
}
function matrix(rows, cols, fill) {
  if (fill === undefined) fill = false;
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}
function getConnectionPointConfig(type, batteryModel) {
  if (batteryModel === "eforce") {
    return { label: "eWay", nodeRating: EFORCE_NODE_RATING, terminalCount: EFORCE_TERMINAL_COUNT };
  }
  switch (type) {
    case "three_point_terminal":
      return { label: "eWay", nodeRating: 750, terminalCount: 3 };
    case "six_point_busbar":
      return { label: "eWay Pro", nodeRating: 1200, terminalCount: 6 };
    default:
      return { label: "eWay Lite", nodeRating: 250, terminalCount: 1 };
  }
}
function isFrontStackBottomBattery(index, batteryLayoutMode) {
  return batteryLayoutMode === "front_stacking" && index % 2 === 1;
}
function getEffectiveBatteryConnectionType(index, configuredType, batteryLayoutMode) {
  return isFrontStackBottomBattery(index, batteryLayoutMode) ? "single_point_terminal" : configuredType;
}
function getFrontStackColumnCount(batteryCount) {
  return Math.max(1, Math.ceil(batteryCount / 2));
}
function getTopBatteryIndexForColumn(columnIndex) {
  return columnIndex * 2;
}
function getBottomBatteryIndexForColumn(columnIndex, batteryCount) {
  const candidate = columnIndex * 2 + 1;
  return candidate < batteryCount ? candidate : -1;
}
function distributeStartAndEnd(total, parts, index) {
  const start = Math.floor((index * total) / parts);
  const end = Math.floor(((index + 1) * total) / parts);
  return [start, Math.max(start + 1, end)];
}
function getFrontStackGroupsByBatteryCount(inverterCount, batteryCount) {
  return Array.from({ length: inverterCount }, (_, inv) => {
    const range = distributeStartAndEnd(batteryCount, inverterCount, inv);
    const start = range[0];
    const rawEnd = range[1];
    const end = Math.min(batteryCount, rawEnd);
    return Array.from({ length: Math.max(0, end - start) }, (_, offset) => start + offset);
  }).filter((group) => group.length > 0);
}
function buildBatteryLinkGroups(batteryCount, batteryLinks) {
  const groups = [];
  let start = 0;
  while (start < batteryCount) {
    let end = start;
    while (end < batteryCount - 1 && batteryLinks[end]) end += 1;
    const indices = [];
    for (let i = start; i <= end; i += 1) indices.push(i);
    groups.push(indices);
    start = end + 1;
  }
  return groups;
}
function buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts) {
  const parent = Array.from({ length: batteryCount }, (_, i) => i);
  const find = (x) => {
    while (parent[x] !== x) {
      parent[x] = parent[parent[x]];
      x = parent[x];
    }
    return x;
  };
  const union = (a, b) => {
    const ra = find(a);
    const rb = find(b);
    if (ra !== rb) parent[rb] = ra;
  };
  for (let i = 0; i < batteryCount - 1; i += 1) {
    if (batteryLinks[i]) union(i, i + 1);
  }
  if (bridgedPorts) {
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const connected = [];
      for (let bat = 0; bat < batteryCount; bat += 1) {
        if (((directFlows[inv] || [])[bat] || 0) > 0) connected.push(bat);
      }
      if (connected.length > 1) {
        const first = connected[0];
        for (let k = 1; k < connected.length; k += 1) union(first, connected[k]);
      }
    }
  }
  const map = new Map();
  for (let i = 0; i < batteryCount; i += 1) {
    const root = find(i);
    if (!map.has(root)) map.set(root, []);
    map.get(root).push(i);
  }
  return Array.from(map.values())
    .map((group) => group.sort((a, b) => a - b))
    .sort((a, b) => a[0] - b[0]);
}
function inferGlobalShareMode(groupCount) {
  return groupCount === 1 ? "share" : "do_not_share";
}
function getGroupTouchedInverters(indices, inverterCount, directFlows) {
  const touched = [];
  for (let inv = 0; inv < inverterCount; inv += 1) {
    const touches = indices.some((batteryIndex) => (((directFlows[inv] || [])[batteryIndex]) || 0) > 0);
    if (touches) touched.push(inv);
  }
  return touched;
}
function hasTrueMixedShareDoNotShareTopology(effectiveGroups, inverterCount, directFlows) {
  if (effectiveGroups.length <= 1) return false;
  const sharedAcrossMultipleInverters = effectiveGroups.some((group) => {
    if (group.length <= 1) return false;
    const touched = getGroupTouchedInverters(group, inverterCount, directFlows);
    return touched.length > 1;
  });
  return sharedAcrossMultipleInverters && effectiveGroups.length > 1;
}
function buildCommunicationGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts) {
  const effectiveGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);
  return effectiveGroups.map((indices) => {
    let masterInverter = -1;
    const touchedInverters = [];
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const touches = indices.some((batteryIndex) => (((directFlows[inv] || [])[batteryIndex]) || 0) > 0);
      if (touches) {
        if (masterInverter === -1) masterInverter = inv;
        touchedInverters.push(inv);
      }
    }
    const reason =
      indices.length > 1 && bridgedPorts && touchedInverters.length === 1
        ? "bridged_inverter_bus"
        : indices.length > 1
        ? "shared_group"
        : "single_branch";
    return {
      inverterIndex: masterInverter,
      batteries: indices.slice(),
      touchedInverters,
      reason,
    };
  });
}
function getGroupBoundsCenter(indices, batteryPositions) {
  const xs = indices.map((index) => batteryPositions[index].x + 64);
  return xs.reduce((sum, value) => sum + value, 0) / xs.length;
}

// === Analyzer (ported as-is) ===
function analyzeSystem(inverterCount, batteryCount, connections, batteryLinks, batteryConnectionTypes, inverterModelKey, batteryLayoutMode, batteryModel, eforceStackSizes) {
  batteryModel = batteryModel || "eboost";
  eforceStackSizes = eforceStackSizes || [];
  const model = INVERTER_MODELS[inverterModelKey] || INVERTER_MODELS.envy_duo_21_envy_12kw;
  const inverterOutputCurrent = model.current;
  const maxPorts = model.maxPorts;
  const bridgedPorts = model.bridgedPorts;
  const inverterNames = names("I", inverterCount);
  const batteryNames = names("B", batteryCount);
  const directFlows = Array.from({ length: inverterCount }, () => Array(batteryCount).fill(0));
  const nodeInflow = Array(batteryCount).fill(0);
  const finalBatteryLoad = Array(batteryCount).fill(0);
  const linkTransfers = Array.from({ length: Math.max(0, batteryCount - 1) }, () => ({ net: 0 }));
  const autoCommConnections = matrix(inverterCount, batteryCount, false);
  const autoCommBatteryLinks = Array(Math.max(0, batteryCount - 1)).fill(false);
  const observations = [];
  const inverterLimitWarnings = [];
  const risks = [];
  const alarms = [];
  const advisories = [];
  inverterNames.forEach((name, i) => {
    const targets = [];
    for (let j = 0; j < batteryCount; j += 1) {
      if ((connections[i] || [])[j]) targets.push(j);
    }
    if (targets.length === 0) {
      observations.push(name + " is not connected (no current flow).");
      return;
    }
    if (targets.length > maxPorts) {
      inverterLimitWarnings.push(
        name + " has " + targets.length + " outgoing conductors selected. Only " + maxPorts +
        " conductor" + (maxPorts === 1 ? "" : "s") + " per inverter are allowed for the selected model; the first " +
        maxPorts + " " + (maxPorts === 1 ? "is" : "are") + " used in the model."
      );
    }
    const activeTargets = targets.slice(0, maxPorts);
    const share = activeTargets.length > 0 ? inverterOutputCurrent / activeTargets.length : 0;
    activeTargets.forEach((batteryIndex) => {
      directFlows[i][batteryIndex] = share;
      nodeInflow[batteryIndex] += share;
    });
  });
  const batteryLinkGroups = buildBatteryLinkGroups(batteryCount, batteryLinks);
  const effectiveGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);
  const batteryGroupLabels = effectiveGroups.map((indices, groupIndex) =>
    "Group " + (groupIndex + 1) + ": " + indices.map((idx) => batteryNames[idx]).join(", ")
  );
  const globalShareMode = inferGlobalShareMode(effectiveGroups.length);
  const hasMixedShareDoNotShareTopology = hasTrueMixedShareDoNotShareTopology(effectiveGroups, inverterCount, directFlows);
  const communicationGroups = buildCommunicationGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);
  if (globalShareMode === "share") {
    observations.push("All batteries are part of one effective shared battery network. Share Battery topology confirmed.");
  } else {
    observations.push("Battery network is not fully shared. This layout behaves as Do Not Share Battery.");
    advisories.push("Share Battery functionality depends on one continuous shared path across all batteries.");
    advisories.push("That shared path can be created by battery conductors and, on bridged-port inverter models, through the inverter battery bus.");
  }
  if (hasMixedShareDoNotShareTopology) {
    alarms.push("Mixed Share / Do Not Share battery topology detected. This system combines a shared battery group that spans multiple inverters with other isolated battery groups.");
    advisories.push("Choose one battery topology approach for the whole system: either all batteries participate in one shared network, or all battery groups remain isolated.");
  }
  advisories.push(bridgedPorts
    ? "For Envy Duo 21 / Envy 12kW, the two inverter battery ports are treated as internally bridged."
    : "For Envy 8kW and Envy 10kW, battery ports are not internally bridged.");
  if (batteryLinkGroups.length > 1 && effectiveGroups.length === 1 && bridgedPorts) {
    observations.push("Separated battery-conductor groups are being electrically shared through bridged inverter battery ports.");
  }
  batteryGroupLabels.forEach((label) => observations.push(label));
  effectiveGroups.forEach((indices) => {
    const totalInflow = indices.reduce((sum, idx) => sum + nodeInflow[idx], 0);
    const totalWeight = indices.reduce((sum, idx) => sum + getBatteryCapacityWeight(idx, batteryModel, eforceStackSizes), 0);
    if (indices.length === 1) {
      indices.forEach((idx) => { finalBatteryLoad[idx] = totalInflow; });
    } else if (totalWeight <= 0) {
      indices.forEach((idx) => { finalBatteryLoad[idx] = totalInflow / indices.length; });
    } else {
      indices.forEach((idx) => {
        const weight = getBatteryCapacityWeight(idx, batteryModel, eforceStackSizes);
        finalBatteryLoad[idx] = totalInflow * weight / totalWeight;
      });
    }
  });
  batteryLinkGroups.forEach((indices) => {
    let prefixImbalance = 0;
    const totalInflow = indices.reduce((sum, idx) => sum + nodeInflow[idx], 0);
    const totalWeight = indices.reduce((sum, idx) => sum + getBatteryCapacityWeight(idx, batteryModel, eforceStackSizes), 0);
    const equalShare = indices.length === 1 ? totalInflow : totalInflow / indices.length;
    for (let k = 0; k < indices.length - 1; k += 1) {
      const left = indices[k];
      const leftWeight = getBatteryCapacityWeight(left, batteryModel, eforceStackSizes);
      const leftShare = (indices.length === 1 || totalWeight <= 0) ? equalShare : (totalInflow * leftWeight / totalWeight);
      prefixImbalance += nodeInflow[left] - leftShare;
      linkTransfers[left] = { net: prefixImbalance };
    }
  });
  communicationGroups.forEach((cg) => {
    const inverterIndex = cg.inverterIndex;
    const batteries = cg.batteries;
    const reason = cg.reason;
    if (batteries.length <= 1) return;
    batteries.slice(0, -1).forEach((batteryIndex) => {
      autoCommBatteryLinks[batteryIndex] = true;
    });
    if (inverterIndex !== -1) {
      autoCommConnections[inverterIndex][batteries[0]] = true;
      observations.push(
        reason === "bridged_inverter_bus"
          ? "Communication grouped through bridged inverter battery ports: " + batteryNames[batteries[0]] + " is primary and " + batteryNames[batteries[batteries.length - 1]] + " follows through the inverter bus."
          : "Shared communication group detected: " + batteryNames[batteries[0]] + " is primary and " + batteryNames[batteries[batteries.length - 1]] + " follows in the same effective group."
      );
    }
  });
  effectiveGroups.forEach((indices) => {
    if (indices.length !== 1) return;
    const batteryIndex = indices[0];
    for (let inv = 0; inv < inverterCount; inv += 1) {
      if (((directFlows[inv] || [])[batteryIndex] || 0) > 0) autoCommConnections[inv][batteryIndex] = true;
    }
  });
  const batteryStatus = batteryNames.map((name, i) => {
    const appliedType = getEffectiveBatteryConnectionType(i, batteryConnectionTypes[i] || "three_point_terminal", batteryLayoutMode);
    const config = getConnectionPointConfig(appliedType, batteryModel);
    const batteryMax = getBatteryMaxCurrent(i, batteryModel, eforceStackSizes);
    const isBottomFrontStackBattery = batteryLayoutMode === "front_stacking" && isFrontStackBottomBattery(i, batteryLayoutMode);
    if (isBottomFrontStackBattery) {
      const incomingNodeCurrent = finalBatteryLoad[i];
      const maxNodeCurrent = finalBatteryLoad[i];
      const totalConnectionPointsUsed = finalBatteryLoad[i] > 1e-9 ? 1 : 0;
      const batteryOverload = finalBatteryLoad[i] > batteryMax + 1e-9;
      const nodeOverload = incomingNodeCurrent > config.nodeRating + 1e-9;
      const terminalOveruse = totalConnectionPointsUsed > config.terminalCount;
      const inactive = finalBatteryLoad[i] <= 1e-9;
      if (batteryOverload) risks.push(name + " absorbs " + formatAmps(finalBatteryLoad[i]) + " A, which is above its " + formatAmps(batteryMax) + " A battery maximum.");
      if (nodeOverload) risks.push(name + " connection point incoming current is " + formatAmps(incomingNodeCurrent) + " A, which is above its " + formatAmps(config.nodeRating) + " A connection-point rating.");
      if (terminalOveruse) risks.push(name + " uses " + totalConnectionPointsUsed + " power-conductor landings, but its selected connection point allows only " + config.terminalCount + ". Communication cabling is treated separately and is not counted as a power landing.");
      return { name, finalLoad: finalBatteryLoad[i], incomingNodeCurrent, maxNodeCurrent, config, totalConnectionPointsUsed, batteryMax, overloaded: batteryOverload || nodeOverload || terminalOveruse, inactive };
    }
    const directConnectionCount = connections.reduce((sum, row) => sum + ((row || [])[i] ? 1 : 0), 0);
    const leftEnabled = i > 0 && batteryLinks[i - 1];
    const rightEnabled = i < batteryCount - 1 && batteryLinks[i];
    const leftIncoming = leftEnabled ? Math.max(0, (linkTransfers[i - 1] || {}).net || 0) : 0;
    const rightIncoming = rightEnabled ? Math.max(0, -((linkTransfers[i] || {}).net || 0)) : 0;
    const leftOutgoing = leftEnabled ? Math.max(0, -((linkTransfers[i - 1] || {}).net || 0)) : 0;
    const rightOutgoing = rightEnabled ? Math.max(0, (linkTransfers[i] || {}).net || 0) : 0;
    const totalConnectionPointsUsed = directConnectionCount + (leftEnabled ? 1 : 0) + (rightEnabled ? 1 : 0);
    const incomingNodeCurrent = nodeInflow[i] + leftIncoming + rightIncoming;
    const outgoingNodeCurrent = leftOutgoing + rightOutgoing + finalBatteryLoad[i];
    const maxNodeCurrent = Math.max(incomingNodeCurrent, outgoingNodeCurrent);
    const batteryOverload = finalBatteryLoad[i] > batteryMax + 1e-9;
    const nodeOverload = incomingNodeCurrent > config.nodeRating + 1e-9;
    const terminalOveruse = totalConnectionPointsUsed > config.terminalCount;
    const inactive = nodeInflow[i] <= 1e-9 && finalBatteryLoad[i] <= 1e-9;
    if (batteryOverload) risks.push(name + " absorbs " + formatAmps(finalBatteryLoad[i]) + " A, which is above its " + formatAmps(batteryMax) + " A battery maximum.");
    if (nodeOverload) risks.push(name + " connection point incoming current is " + formatAmps(incomingNodeCurrent) + " A, which is above its " + formatAmps(config.nodeRating) + " A connection-point rating.");
    if (terminalOveruse) risks.push(name + " uses " + totalConnectionPointsUsed + " power-conductor landings, but its selected connection point allows only " + config.terminalCount + ". Communication cabling is treated separately and is not counted as a power landing.");
    return { name, finalLoad: finalBatteryLoad[i], incomingNodeCurrent, maxNodeCurrent, config, totalConnectionPointsUsed, batteryMax, overloaded: batteryOverload || nodeOverload || terminalOveruse, inactive };
  });
  if (batteryLayoutMode === "front_stacking" && globalShareMode === "share") {
    const columnCount = getFrontStackColumnCount(batteryCount);
    for (let column = 0; column < columnCount; column += 1) {
      const topIndex = getTopBatteryIndexForColumn(column);
      const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
      if (bottomIndex === -1) continue;
      const current = Math.abs(finalBatteryLoad[bottomIndex] || 0);
      if (current > CONDUCTOR_RATING + 1e-9) risks.push(batteryNames[topIndex] + " ↔ " + batteryNames[bottomIndex] + " carries " + formatAmps(current) + " A, which is above its 250 A conductor rating.");
    }
    for (let column = 0; column < columnCount - 1; column += 1) {
      const leftTopIndex = getTopBatteryIndexForColumn(column);
      const rightTopIndex = getTopBatteryIndexForColumn(column + 1);
      if (rightTopIndex >= batteryCount) continue;
      const transferIndex = Math.min(linkTransfers.length - 1, leftTopIndex + 1);
      const current = Math.abs((linkTransfers[transferIndex] || {}).net || 0);
      if (current > CONDUCTOR_RATING + 1e-9) risks.push(batteryNames[leftTopIndex] + " ↔ " + batteryNames[rightTopIndex] + " carries " + formatAmps(current) + " A, which is above its 250 A conductor rating.");
    }
  } else {
    linkTransfers.forEach((transfer, i) => {
      const current = Math.abs(transfer.net);
      if (current > CONDUCTOR_RATING + 1e-9) risks.push(batteryNames[i] + " ↔ " + batteryNames[i + 1] + " carries " + formatAmps(current) + " A, which is above its 250 A conductor rating.");
    });
  }
  const totalInput = nodeInflow.reduce((a, b) => a + b, 0);
  let batteryCapacity = 0;
  for (let i = 0; i < batteryCount; i += 1) batteryCapacity += getBatteryMaxCurrent(i, batteryModel, eforceStackSizes);
  if (totalInput > batteryCapacity + 1e-9) {
    risks.push("Total inverter current is " + formatAmps(totalInput) + " A, while total battery capacity is " + formatAmps(batteryCapacity) + " A.");
  }
  return {
    globalShareMode,
    batteryGroups: effectiveGroups,
    batteryGroupLabels,
    communicationGroups,
    inverterNames,
    inverterLimitWarnings,
    batteryNames,
    directFlows,
    batteryStatus,
    linkTransfers,
    risks,
    observations,
    alarms,
    advisories,
    totalInput,
    autoCommConnections,
    autoCommBatteryLinks,
    bridgedPorts,
    modelLabel: model.label,
  };
}

const state = {
  inverterCount: 2,
  batteryCount: 3,
  connections: [[true, false, false], [false, true, false]],
  batteryLinks: [false, false],
  batteryConnectionTypes: ["three_point_terminal", "three_point_terminal", "three_point_terminal"],
  inverterModel: "envy_duo_21_envy_12kw",

// === Actions (mutate state and re-render) ===
function resizeSystem(newInv, newBat) {
  const inv = clampCount(newInv, MAX_INVERTER_COUNT);
  const bat = clampCount(newBat, getMaxBatteryCountForModel(state.batteryModel));
  const prevConn = state.connections;
  const nextConn = matrix(inv, bat, false);
  for (let i = 0; i < Math.min(inv, prevConn.length); i += 1) {
    for (let j = 0; j < Math.min(bat, prevConn[i].length); j += 1) nextConn[i][j] = prevConn[i][j];
  }
  const prevLinks = state.batteryLinks;
  const nextLinks = Array(Math.max(0, bat - 1)).fill(false);
  for (let i = 0; i < Math.min(nextLinks.length, prevLinks.length); i += 1) nextLinks[i] = prevLinks[i];
  const prevTypes = state.batteryConnectionTypes;
  const defaultType = state.batteryModel === "eforce" ? EFORCE_FIXED_TYPE : "three_point_terminal";
  const nextTypes = Array(bat).fill(defaultType);
  for (let i = 0; i < Math.min(bat, prevTypes.length); i += 1) nextTypes[i] = prevTypes[i];
  const prevStacks = state.eforceStackSizes || [];
  const nextStacks = Array(bat).fill(2);
  for (let i = 0; i < Math.min(bat, prevStacks.length); i += 1) nextStacks[i] = prevStacks[i] || 2;
  state.inverterCount = inv;
  state.batteryCount = bat;
  state.connections = nextConn;
  state.batteryLinks = nextLinks;
  state.batteryConnectionTypes = nextTypes;
  state.eforceStackSizes = nextStacks;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function computeEforceStackArrangement(moduleCount, inverterCount) {
  // Pack `moduleCount` 9.6 kWh modules into stacks of 1/2/3 modules each.
  // Rule: minimize stack count by preferring 3-module stacks, but also create
  // at least min(inverterCount, moduleCount) stacks so the bus has somewhere
  // for each inverter to land when modules allow.
  if (moduleCount <= 0) return [];
  const M = moduleCount;
  const I = Math.max(0, inverterCount | 0);
  const S = Math.max(Math.ceil(M / 3), Math.min(I, M));
  const E = M - S;
  const triples = Math.max(0, E - S);
  const singles = Math.max(0, S - E);
  const doubles = S - triples - singles;
  const sizes = [];
  for (let k = 0; k < triples; k += 1) sizes.push(3);
  for (let k = 0; k < doubles; k += 1) sizes.push(2);
  for (let k = 0; k < singles; k += 1) sizes.push(1);
  return sizes;
}

function setEforceModuleCount(moduleCount) {
  // Clamp to 1..32 modules and re-pack stacks per the auto-arrange rule.
  const clamped = Math.max(1, Math.min(EFORCE_MAX_BATTERY_COUNT, moduleCount | 0));
  state.eforceModuleCount = clamped;
  autoArrangeEforceStacks();
}

function autoArrangeEforceStacks() {
  // Recompute stack sizes from state.eforceModuleCount and adjust batteryCount.
  const sizes = computeEforceStackArrangement(state.eforceModuleCount, state.inverterCount);
  const S = sizes.length;
  resizeSystem(state.inverterCount, S);
  state.eforceStackSizes = sizes;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function splitLargestEforceStack() {
  // Manual override: take one module off the largest stack and start a new
  // 1-module stack. Total module count stays the same; stack count grows by 1.
  // Useful when the auto-arranged shape (which minimizes stack count) leaves
  // an oversized stack that pulls too much current under proportional share.
  if (state.batteryCount >= EFORCE_MAX_BATTERY_COUNT) return;
  const sizes = (state.eforceStackSizes || []).slice();
  let maxIdx = -1;
  let maxSize = 1;
  for (let i = 0; i < sizes.length; i += 1) {
    if (sizes[i] > maxSize) { maxSize = sizes[i]; maxIdx = i; }
  }
  if (maxIdx === -1) return; // every stack is already a single module; can't split further
  sizes[maxIdx] -= 1;
  sizes.push(1);
  const newBatteryCount = sizes.length;
  resizeSystem(state.inverterCount, newBatteryCount);
  state.eforceStackSizes = sizes;
  state.eforceModuleCount = sizes.reduce((sum, n) => sum + n, 0);
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function setEforceStackSize(index, size) {
  // Manual override of a single stack's height. Updates moduleCount to the new sum.
  const clamped = Math.max(1, Math.min(3, size | 0));
  const next = (state.eforceStackSizes || []).slice();
  while (next.length < state.batteryCount) next.push(2);
  if (index >= 0 && index < next.length) next[index] = clamped;
  state.eforceStackSizes = next;
  state.eforceModuleCount = next.reduce((sum, n) => sum + n, 0);
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function toggleConnection(i, j) {

function clearAll() {

  state.batteryConnectionTypes = Array(state.batteryCount).fill("three_point_terminal");
  scheduleRender();
}

function distributeInverterLandings(inverterCount, slotCount, maxPorts) {
  // Returns array[invIdx] -> sorted slot indices the inverter should land on.
  // Guarantees every inverter has at least one landing.
  // Spreads "extra" port assignments evenly so high-current single-port landings
  // and Case A doublings are not clustered at the bus edges (which would cause
  // large cumulative imbalances on battery-to-battery conductors in share mode).
  const result = Array.from({ length: inverterCount }, () => []);
  if (slotCount === 0 || inverterCount === 0) return result;
  // Case A: more inverters than slots. Each inverter gets exactly one landing.
  // Spread inverter-to-slot assignments evenly so slots that end up with multiple
  // inverters are placed toward the middle of the bus, not the edges.
  if (inverterCount > slotCount) {
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const slot = Math.floor((inv + 0.5) * slotCount / inverterCount);
      result[inv].push(Math.min(slotCount - 1, Math.max(0, slot)));
    }
    return result;
  }
  // Case B: inverterCount <= slotCount.
  const uniquePositions = Math.min(slotCount, inverterCount * maxPorts);
  const positions = [];
  for (let k = 0; k < uniquePositions; k += 1) {
    positions.push(Math.floor((k + 0.5) * slotCount / uniquePositions));
  }
  const base = Math.floor(uniquePositions / inverterCount);
  const extra = uniquePositions % inverterCount;
  // Spread the "extra" port assignments evenly across the inverter array.
  // Without this, the first `extra` inverters get an extra port and the last
  // (inverterCount - extra) get one fewer, which clusters high-current
  // single-port landings at one end of the bus and creates large cumulative
  // imbalances on share-mode battery conductors.
  const extraSet = new Set();
  if (extra > 0) {
    for (let e = 0; e < extra; e += 1) {
      extraSet.add(Math.floor((e + 0.5) * inverterCount / extra));
    }
  }
  let cursor = 0;
  for (let inv = 0; inv < inverterCount; inv += 1) {
    const want = Math.min(maxPorts, base + (extraSet.has(inv) ? 1 : 0));
    for (let k = 0; k < want && cursor < positions.length; k += 1) result[inv].push(positions[cursor++]);
    if (result[inv].length === 0) result[inv].push(positions[Math.min(positions.length - 1, inv)]);
  }
  result.forEach((arr) => arr.sort((a, b) => a - b));
  return result;
}

function upgradeBatteryConnectionTypes(connections, batteryLinks, baseTypes, batteryLayoutMode) {
  // Walks each battery and upgrades its connection point to the smallest
  // eWay tier that can physically accommodate the resulting landings.
  // Mirrors analyzeSystem's "totalConnectionPointsUsed" formula so the
  // upgrade decision is exactly the rule the analyzer would otherwise flag.
  // Front-stacking bottom batteries always carry exactly one landing (the
  // vertical link from the top battery) and are left as eWay Lite.
  const result = baseTypes.slice();
  const batteryCount = result.length;
  for (let i = 0; i < batteryCount; i += 1) {
    if (isFrontStackBottomBattery(i, batteryLayoutMode)) continue;
    const directLandings = connections.reduce((sum, row) => sum + ((row || [])[i] ? 1 : 0), 0);
    const leftLink = i > 0 && batteryLinks[i - 1] ? 1 : 0;
    const rightLink = i < batteryCount - 1 && batteryLinks[i] ? 1 : 0;
    const totalLandings = directLandings + leftLink + rightLink;
    if (totalLandings > 3) result[i] = "six_point_busbar";
    else if (totalLandings >= 1) result[i] = "three_point_terminal";
  }
  return result;
}

function applyShareConfiguration(layoutModeOverride) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const maxPorts = (INVERTER_MODELS[state.inverterModel] || {}).maxPorts || 1;
  const isEforce = state.batteryModel === "eforce";
  const defaultType = isEforce ? EFORCE_FIXED_TYPE : "three_point_terminal";
  const nextConnections = matrix(inv, bat, false);
  const nextBatteryLinks = Array(Math.max(0, bat - 1)).fill(true);
  const nextBatteryConnectionTypes = Array(bat).fill(defaultType);
  if (layoutModeOverride === "front_stacking" && !isEforce) {
    const columnCount = getFrontStackColumnCount(bat);
    for (let column = 0; column < columnCount; column += 1) {
      const bottomIndex = getBottomBatteryIndexForColumn(column, bat);
      if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
    }
    const landings = distributeInverterLandings(inv, columnCount, maxPorts);
    landings.forEach((slots, invIdx) => {
      slots.forEach((col) => {
        const topIdx = getTopBatteryIndexForColumn(col);
        if (topIdx < bat) nextConnections[invIdx][topIdx] = true;
      });
    });
  } else {
    const landings = distributeInverterLandings(inv, bat, maxPorts);
    landings.forEach((slots, invIdx) => {
      slots.forEach((b) => { nextConnections[invIdx][b] = true; });
    });
  }
  state.connections = nextConnections;
  state.batteryLinks = nextBatteryLinks;
  // eForce uses a single fixed connection point — no upgrade/downgrade allowed.
  state.batteryConnectionTypes = isEforce
    ? nextBatteryConnectionTypes
    : upgradeBatteryConnectionTypes(nextConnections, nextBatteryLinks, nextBatteryConnectionTypes, layoutModeOverride);
}

function applyDoNotShareConfiguration(layoutModeOverride) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const isEforce = state.batteryModel === "eforce";
  const defaultType = isEforce ? EFORCE_FIXED_TYPE : "three_point_terminal";
  const nextConnections = matrix(inv, bat, false);
  const nextBatteryLinks = Array(Math.max(0, bat - 1)).fill(false);
  const nextBatteryConnectionTypes = Array(bat).fill(defaultType);
  const maxPorts = (INVERTER_MODELS[state.inverterModel] || {}).maxPorts || 1;
  if (layoutModeOverride === "front_stacking" && !isEforce) {
    const columnCount = getFrontStackColumnCount(bat);
    for (let column = 0; column < columnCount; column += 1) {
      const bottomIndex = getBottomBatteryIndexForColumn(column, bat);
      if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
    }
    if (inv <= columnCount) {
      // Partition columns proportionally; every inverter gets a contiguous block.
      for (let i = 0; i < inv; i += 1) {
        const colRange = distributeStartAndEnd(columnCount, inv, i);
        const colStart = colRange[0];
        const colEnd = Math.min(columnCount, colRange[1]);
        const groupBatteries = [];
        for (let c = colStart; c < colEnd; c += 1) {
          groupBatteries.push(getTopBatteryIndexForColumn(c));
          const bot = getBottomBatteryIndexForColumn(c, bat);
          if (bot !== -1) groupBatteries.push(bot);
        }
        groupBatteries.sort((a, b) => a - b);
        for (let k = 0; k < groupBatteries.length - 1; k += 1) {
          if (groupBatteries[k + 1] === groupBatteries[k] + 1) nextBatteryLinks[groupBatteries[k]] = true;
        }
        const tops = groupBatteries.filter((idx) => idx % 2 === 0);
        const landingCount = Math.min(tops.length, maxPorts);
        const startOff = Math.floor((tops.length - landingCount) / 2);
        for (let k = 0; k < landingCount; k += 1) nextConnections[i][tops[startOff + k]] = true;
      }
    } else {
      // Degenerate: more inverters than columns. Round-robin across top batteries
      // (bottoms are eWay Lite landing points). Vertical link in each column feeds bottoms.
      // Analyzer will flag any resulting overload.
      for (let i = 0; i < inv; i += 1) {
        nextConnections[i][getTopBatteryIndexForColumn(i % columnCount)] = true;
      }
      for (let c = 0; c < columnCount; c += 1) {
        const top = getTopBatteryIndexForColumn(c);
        const bot = getBottomBatteryIndexForColumn(c, bat);
        if (bot !== -1) nextBatteryLinks[top] = true;
      }
    }
  } else {
    if (inv <= bat) {
      for (let i = 0; i < inv; i += 1) {
        const range = distributeStartAndEnd(bat, inv, i);
        const startBattery = range[0];
        const groupEnd = Math.min(bat, range[1]);
        const groupSize = Math.max(1, groupEnd - startBattery);
        const directAssignments = Math.min(groupSize, maxPorts);
        const assignmentStart = groupSize > directAssignments ? startBattery + Math.floor((groupSize - directAssignments) / 2) : startBattery;
        for (let offset = 0; offset < directAssignments; offset += 1) {
          nextConnections[i][assignmentStart + offset] = true;
        }
        for (let batteryIndex = startBattery; batteryIndex < groupEnd - 1; batteryIndex += 1) {
          nextBatteryLinks[batteryIndex] = true;
        }
      }
    } else {
      for (let i = 0; i < inv; i += 1) nextConnections[i][i % bat] = true;
    }
  }
  state.connections = nextConnections;
  state.batteryLinks = nextBatteryLinks;
  state.batteryConnectionTypes = isEforce
    ? nextBatteryConnectionTypes
    : upgradeBatteryConnectionTypes(nextConnections, nextBatteryLinks, nextBatteryConnectionTypes, layoutModeOverride);
}

function reapplyAutoConfigIfNeeded() {
  if (state.configurationMode === "share") applyShareConfiguration(state.batteryLayoutMode);
  else if (state.configurationMode === "do_not_share") applyDoNotShareConfiguration(state.batteryLayoutMode);
}

function autoConfigureShareBattery() {
  state.configurationMode = "share";
  applyShareConfiguration(state.batteryLayoutMode);
  scheduleRender();
}
function autoConfigureDoNotShareBattery() {
  state.configurationMode = "do_not_share";
  applyDoNotShareConfiguration(state.batteryLayoutMode);
  scheduleRender();
}
function setBatteryLayoutMode(mode) {
  // eForce only supports side-by-side; ignore front-stacking attempts.
  if (state.batteryModel === "eforce" && mode === "front_stacking") return;
  state.batteryLayoutMode = mode;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}
function setInverterModel(model) {
  state.inverterModel = model;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}
function setBatteryModel(model) {
  if (state.batteryModel === model) return;
  state.batteryModel = model;
  if (model === "eforce") {
    // Force side-by-side; eForce doesn't permit front-stacking.
    state.batteryLayoutMode = "side_by_side";
    // Fix every battery's connection type to the single eForce eWay.
    state.batteryConnectionTypes = state.batteryConnectionTypes.map(() => EFORCE_FIXED_TYPE);
    // Seed stack sizes (default 2 modules each) and derive module count.
    const stacks = (state.eforceStackSizes || []).slice();
    while (stacks.length < state.batteryCount) stacks.push(2);
    state.eforceStackSizes = stacks.slice(0, state.batteryCount);
    state.eforceModuleCount = state.eforceStackSizes.reduce((sum, n) => sum + n, 0);
  } else if (model === "eboost") {
    // Coming back from eForce: reset all batteries to the default eWay tier.
    state.batteryConnectionTypes = state.batteryConnectionTypes.map((t) => (t === EFORCE_FIXED_TYPE ? "three_point_terminal" : t));
  }
  // Clamp battery count to the new model's max.
  const maxBat = getMaxBatteryCountForModel(model);
  if (state.batteryCount > maxBat) resizeSystem(state.inverterCount, maxBat);
  else reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function demoBalanced() {
  state.configurationMode = "none";

  state.batteryCount = 3;
  state.connections = [[true, false, false], [false, true, true]];
  state.batteryLinks = [false, true];
  state.batteryConnectionTypes = ["three_point_terminal", "three_point_terminal", "three_point_terminal"];
  scheduleRender();
}
function demoOverload() {
  state.configurationMode = "none";
  state.inverterCount = 3;
  state.batteryCount = 2;
  state.connections = [[true, false], [true, false], [true, false]];
  state.batteryLinks = [false];
  state.batteryConnectionTypes = ["three_point_terminal", "three_point_terminal"];
  scheduleRender();
}
function demoShared() {
  state.configurationMode = "none";
  state.inverterCount = 2;
  state.batteryCount = 2;
  state.connections = [[true, false], [false, true]];
  state.batteryLinks = [true];
  state.batteryConnectionTypes = ["three_point_terminal", "three_point_terminal"];
  scheduleRender();
}

// === Render utilities ===
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function badge(type, content) {
  const cls = type === "good" ? "goodBadge" : type === "bad" ? "badBadge" : type === "warn" ? "warnBadge" : "badge";
  return '<span class="' + cls + '">' + content + '</span>';
}

function buildSvg(state, results) {
  const inverterCount = state.inverterCount;
  const batteryCount = state.batteryCount;
  const isFrontStacking = state.batteryLayoutMode === "front_stacking";
  const stackingColumns = isFrontStacking ? Math.ceil(batteryCount / 2) : batteryCount;
  const diagramWidth = Math.max(860, Math.max(inverterCount, stackingColumns) * 170 + 240);
  const isEforceLayout = state.batteryModel === "eforce";
  const diagramHeight = isFrontStacking ? 610 : 470;
  const inverterY = 90;
  const batteryTopY = isFrontStacking ? 250 : diagramHeight - 170;
  const batteryBottomY = isFrontStacking ? 430 : batteryTopY;
  const selectedCurrent = (INVERTER_MODELS[state.inverterModel] || {}).current || 250;

  const batteryPositions = results.batteryNames.map((name, i) => {
    if (!isFrontStacking) {
      return {
        name,
        x: batteryCount === 1 ? diagramWidth / 2 - 64 : 120 + i * ((diagramWidth - 240) / Math.max(1, batteryCount - 1)) - 64,
        y: batteryTopY,
      };
    }
    const columnIndex = Math.floor(i / 2);
    const rowIndex = i % 2;
    const columnCount = Math.max(1, Math.ceil(batteryCount / 2));
    return {
      name,
      x: columnCount === 1 ? diagramWidth / 2 - 64 : 120 + columnIndex * ((diagramWidth - 240) / Math.max(1, columnCount - 1)) - 64,
      y: rowIndex === 0 ? batteryTopY : batteryBottomY,
    };
  });

  const inverterAnchorCenters = results.inverterNames.map((_, i) => {
    const connectedBatteries = results.batteryNames
      .map((__, batteryIndex) => batteryIndex)
      .filter((batteryIndex) => ((results.directFlows[i] || [])[batteryIndex] || 0) > 0);
    return connectedBatteries.length > 0
      ? getGroupBoundsCenter(connectedBatteries, batteryPositions)
      : (inverterCount === 1 ? diagramWidth / 2 : 120 + i * ((diagramWidth - 240) / Math.max(1, inverterCount - 1)));
  });

  const inverterPositions = inverterAnchorCenters.map((centerX, i) => {
    const sameCluster = inverterAnchorCenters
      .map((value, index) => ({ value, index }))
      .filter((entry) => Math.abs(entry.value - centerX) < 1)
      .sort((a, b) => a.index - b.index);
    const clusterIndex = sameCluster.findIndex((entry) => entry.index === i);
    const offset = sameCluster.length > 1 ? (clusterIndex - (sameCluster.length - 1) / 2) * 120 : 0;
    return { name: results.inverterNames[i], x: centerX - 45 + offset, y: inverterY };
  });

  const frontStackColumnCount = getFrontStackColumnCount(batteryCount);
  const isFrontStackShared = isFrontStacking && results.globalShareMode === "share";
  const isFrontStackDoNotShare = isFrontStacking && results.globalShareMode === "do_not_share";

  let svg = '<svg viewBox="0 0 ' + diagramWidth + ' ' + diagramHeight + '" style="width:100%;height:auto" role="img" aria-label="Electrical behavior diagram">';
  svg += '<text x="' + (diagramWidth / 2) + '" y="30" text-anchor="middle" style="fill:#475569;font-size:14px;font-weight:700">Inverters</text>';
  svg += '<text x="' + (diagramWidth / 2) + '" y="' + (diagramHeight - 18) + '" text-anchor="middle" style="fill:#475569;font-size:14px;font-weight:700">Batteries</text>';

  // Power conductors inverter -> battery
  results.inverterNames.forEach((inv, i) => {
    results.batteryNames.forEach((bat, j) => {
      if (!(state.connections[i] || [])[j]) return;
      const current = results.directFlows[i][j];
      if (current <= 0) return;
      const from = inverterPositions[i];
      const to = batteryPositions[j];
      svg += '<line x1="' + (from.x + 45) + '" y1="' + (from.y + 56) + '" x2="' + (to.x + 64) + '" y2="' + to.y + '" stroke="#000" stroke-width="2.5"/>';
      svg += '<text x="' + ((from.x + to.x) / 2 + 10) + '" y="' + ((from.y + to.y) / 2 + 6) + '" text-anchor="middle" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
    });
  });

  // Communication: standard (non-front-stack)
  if (!isFrontStackShared && !isFrontStackDoNotShare) {
    results.autoCommConnections.forEach((row, i) => {
      row.forEach((enabled, j) => {
        if (!enabled) return;
        const from = inverterPositions[i];
        const to = batteryPositions[j];
        svg += '<line x1="' + (from.x + 70) + '" y1="' + (from.y + 62) + '" x2="' + (to.x + 90) + '" y2="' + (to.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
    });
    results.autoCommBatteryLinks.forEach((enabled, i) => {
      if (!enabled) return;
      const a = batteryPositions[i];
      const b = batteryPositions[i + 1];
      svg += '<line x1="' + (a.x + 90) + '" y1="' + (a.y + 90) + '" x2="' + (b.x + 90) + '" y2="' + (a.y + 90) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    });
  }

  // Front-stack shared comm lines
  if (isFrontStackShared && inverterPositions[0] && batteryPositions[0]) {
    const inv0 = inverterPositions[0];
    const bat0 = batteryPositions[0];
    svg += '<line x1="' + (inv0.x + 70) + '" y1="' + (inv0.y + 62) + '" x2="' + (bat0.x + 90) + '" y2="' + (bat0.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
  }
  if (isFrontStackShared) {
    // Diagonal comm lines: top of column N -> bottom of column N-1
    for (let offset = 0; offset < Math.max(0, frontStackColumnCount - 1); offset += 1) {
      const fromColumn = frontStackColumnCount - 1 - offset;
      const toColumn = fromColumn - 1;
      const fromTopIndex = getTopBatteryIndexForColumn(fromColumn);
      const toBottomIndex = getBottomBatteryIndexForColumn(toColumn, batteryCount);
      if (fromTopIndex >= batteryCount || toBottomIndex === -1) continue;
      const from = batteryPositions[fromTopIndex];
      const to = batteryPositions[toBottomIndex];
      svg += '<line x1="' + (from.x + 28) + '" y1="' + (from.y + 90) + '" x2="' + (to.x + 100) + '" y2="' + (to.y + 18) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    }
    // Vertical comm lines: within each column, top battery -> bottom battery (closes the daisy chain)
    for (let column = 0; column < frontStackColumnCount; column += 1) {
      const topIndex = getTopBatteryIndexForColumn(column);
      const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
      if (bottomIndex === -1) continue;
      const top = batteryPositions[topIndex];
      const bottom = batteryPositions[bottomIndex];
      svg += '<line x1="' + (top.x + 94) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 94) + '" y2="' + (bottom.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    }
  }

  // Front-stack do-not-share comm
  if (isFrontStackDoNotShare) {
    results.batteryGroups.forEach((group, groupIndex) => {
      const topIndices = group.filter((batteryIndex) => batteryIndex % 2 === 0);
      const touchedInverter = results.inverterNames.findIndex((_, inv) =>
        group.some((batteryIndex) => ((results.directFlows[inv] || [])[batteryIndex] || 0) > 0)
      );
      if (touchedInverter !== -1 && topIndices.length > 0) {
        const from = inverterPositions[touchedInverter];
        const to = batteryPositions[topIndices[0]];
        svg += '<line x1="' + (from.x + 70) + '" y1="' + (from.y + 62) + '" x2="' + (to.x + 90) + '" y2="' + (to.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      }
      topIndices.forEach((topIndex) => {
        const bottomIndex = topIndex + 1;
        if (group.indexOf(bottomIndex) === -1) return;
        const top = batteryPositions[topIndex];
        const bottom = batteryPositions[bottomIndex];
        svg += '<line x1="' + (top.x + 94) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 94) + '" y2="' + (bottom.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
      topIndices.slice(1).forEach((topIndex) => {
        const previousBottomIndex = topIndex - 1;
        if (group.indexOf(previousBottomIndex) === -1) return;
        const from = batteryPositions[topIndex];
        const to = batteryPositions[previousBottomIndex];
        svg += '<line x1="' + (from.x + 28) + '" y1="' + (from.y + 90) + '" x2="' + (to.x + 100) + '" y2="' + (to.y + 18) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
    });
  }

  // Battery-to-battery power conductors (non-front-stack)
  if (!isFrontStackShared && !isFrontStackDoNotShare) {
    results.linkTransfers.forEach((transfer, i) => {
      if (!state.batteryLinks[i]) return;
      const a = batteryPositions[i];
      const b = batteryPositions[i + 1];
      const current = Math.abs(transfer.net);
      svg += '<line x1="' + (a.x + 64) + '" y1="' + (a.y + 70) + '" x2="' + (b.x + 64) + '" y2="' + (a.y + 70) + '" stroke="#000" stroke-width="3"/>';
      svg += '<text x="' + ((a.x + b.x) / 2 + 64) + '" y="' + (a.y + 64) + '" text-anchor="middle" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
    });
  }

  // Front-stack shared power
  if (isFrontStackShared) {
    for (let column = 0; column < frontStackColumnCount; column += 1) {
      const topIndex = getTopBatteryIndexForColumn(column);
      const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
      if (bottomIndex === -1) continue;
      const top = batteryPositions[topIndex];
      const bottom = batteryPositions[bottomIndex];
      const current = (results.batteryStatus[bottomIndex] || {}).finalLoad || 0;
      svg += '<line x1="' + (top.x + 64) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 64) + '" y2="' + bottom.y + '" stroke="#000" stroke-width="3"/>';
      svg += '<text x="' + (bottom.x + 50) + '" y="' + (bottom.y - 8) + '" text-anchor="end" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
    }
    for (let column = 0; column < Math.max(0, frontStackColumnCount - 1); column += 1) {
      const leftTopIndex = getTopBatteryIndexForColumn(column);
      const rightTopIndex = getTopBatteryIndexForColumn(column + 1);
      if (rightTopIndex >= batteryCount) continue;
      const left = batteryPositions[leftTopIndex];
      const right = batteryPositions[rightTopIndex];
      const transferIndex = Math.min(results.linkTransfers.length - 1, leftTopIndex + 1);
      const current = Math.abs(((results.linkTransfers[transferIndex] || {}).net) || 0);
      svg += '<line x1="' + (left.x + 128) + '" y1="' + (left.y + 70) + '" x2="' + right.x + '" y2="' + (right.y + 70) + '" stroke="#000" stroke-width="3"/>';
      svg += '<text x="' + ((left.x + 128 + right.x) / 2) + '" y="' + (left.y + 64) + '" text-anchor="middle" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
    }
  }

  // Front-stack do-not-share power
  if (isFrontStackDoNotShare) {
    results.batteryGroups.forEach((group) => {
      group.filter((batteryIndex) => batteryIndex % 2 === 0).forEach((topIndex) => {
        const bottomIndex = topIndex + 1;
        if (group.indexOf(bottomIndex) === -1) return;
        const top = batteryPositions[topIndex];
        const bottom = batteryPositions[bottomIndex];
        const current = Math.abs((results.batteryStatus[bottomIndex] || {}).finalLoad || 0);
        svg += '<line x1="' + (top.x + 64) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 64) + '" y2="' + bottom.y + '" stroke="#000" stroke-width="3"/>';
        svg += '<text x="' + (bottom.x + 50) + '" y="' + (bottom.y - 8) + '" text-anchor="end" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
      });
    });
    results.batteryGroups.forEach((group) => {
      const topIndices = group.filter((batteryIndex) => batteryIndex % 2 === 0);
      topIndices.slice(1).forEach((topIndex, pairIndex) => {
        const previousTopIndex = topIndices[pairIndex];
        const boundaryIndex = Math.min(results.linkTransfers.length - 1, previousTopIndex + 1);
        const left = batteryPositions[previousTopIndex];
        const right = batteryPositions[topIndex];
        const current = Math.abs(((results.linkTransfers[boundaryIndex] || {}).net) || 0);
        svg += '<line x1="' + (left.x + 128) + '" y1="' + (left.y + 70) + '" x2="' + right.x + '" y2="' + (right.y + 70) + '" stroke="#000" stroke-width="3"/>';
        svg += '<text x="' + ((left.x + 128 + right.x) / 2) + '" y="' + (left.y + 64) + '" text-anchor="middle" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
      });
    });
  }

  // Inverter-to-inverter mustard comm lines
  results.inverterNames.forEach((_, i) => {
    results.inverterNames.forEach((__, j) => {
      if (j <= i) return;
      const a = inverterPositions[i];
      const b = inverterPositions[j];
      svg += '<line x1="' + (a.x + 45) + '" y1="' + (a.y + 28) + '" x2="' + (b.x + 45) + '" y2="' + (b.y + 28) + '" stroke="#d4a017" stroke-width="2" stroke-dasharray="6 6"/>';
    });
  });

  // Inverter boxes
  inverterPositions.forEach((item, idx) => {
    svg += '<g>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y - 6) + '" text-anchor="middle" style="fill:#64748b;font-size:10px;font-weight:700">' + (idx === 0 ? "Primary" : "Secondary") + '</text>';
    svg += '<rect x="' + item.x + '" y="' + item.y + '" width="90" height="56" rx="10" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y + 24) + '" text-anchor="middle" style="fill:#0f172a;font-size:13px;font-weight:700">' + escapeHtml(item.name) + '</text>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y + 42) + '" text-anchor="middle" style="fill:#475569;font-size:11px">' + formatAmps(selectedCurrent) + 'A DC</text>';
    svg += '</g>';
  });

  // Battery boxes
  const isEforceMode = state.batteryModel === 'eforce';
  // Use the eWay-band + module-block visual for every battery, in every layout.
  const useStackedVisual = true;
  batteryPositions.forEach((item, i) => {
    const status = results.batteryStatus[i];
    const active = !status.inactive;
    const commGroup = results.communicationGroups.find((g) => g.batteries.indexOf(i) !== -1);
    const isPrimaryBattery = commGroup ? commGroup.batteries[0] === i : (i === 0 || !state.batteryLinks[i - 1]);
    const opacity = active ? 1 : 0.35;
    const overloadStroke = status.overloaded ? "#dc2626" : "#65a30d";
    const overloadFill = status.overloaded ? "#fee2e2" : "#ecfccb";
    const stackSize = isEforceMode ? Math.max(1, Math.min(3, (state.eforceStackSizes || [])[i] || 1)) : 1;
    const batteryMaxA = getBatteryMaxCurrent(i, state.batteryModel, state.eforceStackSizes);
    svg += '<g opacity="' + opacity + '">';
    const primaryY = useStackedVisual ? (isEforceMode ? item.y + 134 : item.y + 118) : item.y + 118;
    svg += '<text x="' + (item.x + 64) + '" y="' + primaryY + '" text-anchor="middle" style="fill:#64748b;font-size:10px;font-weight:700">' + (isPrimaryBattery ? "Primary" : "Secondary") + '</text>';

    if (useStackedVisual) {
      // eWay band at the top — separate visual element, slightly darker, with name + node load.
      const ewayX = item.x;
      const ewayY = item.y;
      const ewayW = 128;
      const ewayH = 26;
      svg += '<rect x="' + ewayX + '" y="' + ewayY + '" width="' + ewayW + '" height="' + ewayH + '" rx="6" fill="#cbd5e1" stroke="' + overloadStroke + '" stroke-width="2"/>';
      svg += '<text x="' + (ewayX + 8) + '" y="' + (ewayY + 11) + '" style="fill:#0f172a;font-size:10px;font-weight:700">' + escapeHtml(item.name) + '</text>';
      svg += '<text x="' + (ewayX + 8) + '" y="' + (ewayY + 22) + '" style="fill:#475569;font-size:9px">' + escapeHtml(status.config.label) + ' · ' + formatAmps(status.config.nodeRating) + 'A</text>';
      svg += '<text x="' + (ewayX + ewayW - 8) + '" y="' + (ewayY + 11) + '" text-anchor="end" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.incomingNodeCurrent) + 'A</text>';
      svg += '<text x="' + (ewayX + ewayW - 8) + '" y="' + (ewayY + 22) + '" text-anchor="end" style="fill:#0f172a;font-size:9px;font-weight:700">at node</text>';

      // Module section: 1 block for eBoost, 1–3 blocks for eForce stacks.
      const modulesAreaY = item.y + ewayH + 4;
      const modulesAreaH = 102 - ewayH - 4; // 72h
      const moduleGap = 2;
      const totalGap = moduleGap * (stackSize - 1);
      const moduleH = Math.max(12, Math.floor((modulesAreaH - totalGap) / stackSize));
      for (let m = 0; m < stackSize; m += 1) {
        const modY = modulesAreaY + m * (moduleH + moduleGap);
        svg += '<rect x="' + (item.x + 6) + '" y="' + modY + '" width="116" height="' + moduleH + '" rx="4" fill="' + overloadFill + '" stroke="' + overloadStroke + '" stroke-width="1.5"/>';
        // Lego-style studs along the top of each module
        const studCount = 4;
        for (let s = 0; s < studCount; s += 1) {
          const studX = item.x + 22 + s * 24;
          svg += '<circle cx="' + studX + '" cy="' + modY + '" r="2.5" fill="' + overloadStroke + '" opacity="0.6"/>';
        }
        // Module label (and, for eBoost, the absorbed/max line beneath it inside the same module).
        if (moduleH >= 16) {
          if (isEforceMode) {
            const moduleLabel = 'M' + (stackSize - m) + ' · 9.6 kWh';
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 + 3) + '" text-anchor="middle" style="fill:#475569;font-size:11px;font-weight:700">' + moduleLabel + '</text>';
          } else {
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 - 5) + '" text-anchor="middle" style="fill:#475569;font-size:11px;font-weight:700">eBoost</text>';
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 + 11) + '" text-anchor="middle" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.finalLoad) + ' / ' + formatAmps(batteryMaxA) + 'A max</text>';
          }
        }
      }
      // Per-stack load + max below modules — eForce only (eBoost shows it inside the module above).
      if (isEforceMode) {
        svg += '<text x="' + (item.x + 64) + '" y="' + (item.y + 118) + '" text-anchor="middle" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.finalLoad) + ' / ' + formatAmps(batteryMaxA) + 'A max</text>';
      }
    }
    svg += '</g>';
  });

  svg += '</svg>';

  const legend = '<div class="legend">' +
    '<div class="legendItem"><div class="swatchBlack"></div><span>Power cable</span></div>' +
    '<div class="legendItem"><div class="swatchBlue"></div><span>Battery &amp; inverter communication</span></div>' +
    '<div class="legendItem"><div class="swatchMustard"></div><span>Inverter-to-inverter communication</span></div>' +
    '</div>';
  return svg + legend;
}

function buildStructuredObservations(results) {
  const topology = [];
  const groups = [];
  const communication = [];
  const general = results.inverterLimitWarnings.slice();
  results.observations.forEach((line) => {
    if (line.indexOf("Share Battery topology confirmed") !== -1 || line.indexOf("Do Not Share Battery") !== -1) topology.push(line);
    else if (/^Group \d+:/.test(line)) groups.push(line);
    else if (line.indexOf("Communication grouped") !== -1 || line.indexOf("Shared communication group") !== -1 || line.indexOf("Single inverter with multiple batteries") !== -1) communication.push(line);
    else general.push(line);
  });
  let html = '<div class="obsContainer">';
  if (topology.length > 0) {
    html += '<ul class="obsList">' + topology.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (groups.length > 0) {
    html += '<ul class="' + (topology.length ? 'obsListSpaced' : 'obsList') + '">' + groups.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (communication.length > 0) {
    html += '<ul class="obsCommList">' + communication.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (results.advisories.length > 0) {
    html += '<ul class="obsListSpaced">' + results.advisories.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (general.length > 0) {
    html += '<ul class="obsListSpaced">' + general.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  html += '</div>';
  return html;
}

function buildSetupPanel(state, results) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const model = INVERTER_MODELS[state.inverterModel];
  const bridgedNote = model.bridgedPorts
    ? "This inverter model treats its two battery ports as internally bridged."
    : "This inverter model does not bridge separate battery ports.";

  let html = '';
  html += '<div class="panel">';
  html += '<div class="panelHeader">System setup</div>';
  html += '<div class="setupBody">';

  // Choose Battery
  html += '<details class="section"' + (detailsOpen.chooseBattery ? ' open' : '') + ' data-details-key="chooseBattery">';
  html += '<summary>Choose Battery</summary>';
  html += '<div class="configButtonRow">';
  html += '<button class="btn' + (state.batteryModel === 'eboost' ? ' active' : '') + '" data-action="setBatteryEboost">eBoost</button>';
  html += '<button class="btn' + (state.batteryModel === 'eforce' ? ' active' : '') + '" data-action="setBatteryEforce">eForce</button>';
  html += '</div>';
  html += '</details>';

  // Step 1
  html += '<details class="section"' + (detailsOpen.step1 ? ' open' : '') + ' data-details-key="step1">';
  html += '<summary>Step 1. Choose inverter model</summary>';
  html += '<select class="select" data-action="setInverterModel">';
  ['envy_8kw', 'envy_10kw', 'envy_duo_21_envy_12kw'].forEach((key) => {
    const m = INVERTER_MODELS[key];
    const sel = state.inverterModel === key ? ' selected' : '';
    html += '<option value="' + key + '"' + sel + '>' + escapeHtml(m.label) + ' — ' + m.current + ' A</option>';
  });
  html += '</select>';
  html += '<div class="helper">' + escapeHtml(bridgedNote) + '</div>';
  html += '</details>';

  // Step 2
  const eforceMode = state.batteryModel === 'eforce';
  const eforceModules = eforceMode ? (state.eforceModuleCount || 1) : 0;

function buildResultsPanel(state, results) {
  let totalBatteryDischarge = 0;
  for (let i = 0; i < state.batteryCount; i += 1) totalBatteryDischarge += getBatteryMaxCurrent(i, state.batteryModel, state.eforceStackSizes);
  const overloadBadge = badge(results.risks.length === 0 ? 'good' : 'bad', results.risks.length === 0 ? 'No overload' : 'Overload present');
  const alarmBadge = results.alarms.length > 0 ? badge('bad', 'Alarm present') : '';
  const obsBadge = badge('warn', 'System observations');
  const commBadge = badge(null, 'Communication: Auto');
  const shareBadge = badge(results.globalShareMode === 'share' ? 'good' : 'warn', results.globalShareMode === 'share' ? 'Share Battery' : 'Do Not Share Battery');
  const portsBadge = badge(results.bridgedPorts ? 'warn' : null, results.bridgedPorts ? 'Ports bridged internally' : 'Ports not bridged');
  const modelBadge = badge(null, 'Inverter model: ' + escapeHtml(results.modelLabel));
  const totalBadge = badge(null, 'Total inverter current: ' + formatAmps(results.totalInput) + ' A');
  const dischargeBadge = badge(null, 'Total Battery Discharging Capacity: ' + formatAmps(totalBatteryDischarge) + ' A');

  let html = '';
  html += '<div class="panel" id="pdfResultsPanel">';
  html += '<div class="panelHeader">System result</div>';
  html += '<div class="panelBody">';
  html += '<div class="badgeRow">' + overloadBadge + alarmBadge + obsBadge + commBadge + shareBadge + portsBadge + modelBadge + totalBadge + dischargeBadge + '</div>';

  const showAlerts = results.alarms.length > 0 || results.risks.length > 0 || results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0;
  if (showAlerts) {
    html += '<div style="display:flex;flex-direction:column;gap:16px;margin-top:16px">';
    if (results.alarms.length > 0) {
      html += '<div class="alertRed">';
      html += '<div class="alertTitleRed">🚨 Topology alarm</div>';
      html += '<div class="alertList red">';
      results.alarms.forEach((a) => { html += '<div>• ' + escapeHtml(a) + '</div>'; });
      html += '</div></div>';
    }
    if (results.risks.length > 0) {
      html += '<div class="alertRed">';
      html += '<div class="alertTitleRed">🔴 Electrical risks</div>';
      html += '<div class="alertList red">';
      results.risks.forEach((r) => { html += '<div>• ' + escapeHtml(r) + '</div>'; });
      html += '</div></div>';
    }
    if (results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0) {
      html += '<div class="alertYellow">';
      html += '<div class="alertTitleYellow">🟡 System observations</div>';
      html += buildStructuredObservations(results);
      html += '</div>';
    }
    html += '</div>';
  }

  // Battery cards
  html += '<div class="cards" style="margin-top:16px">';
  results.batteryStatus.forEach((status, idx) => {
    const batteryMax = status.batteryMax || getBatteryMaxCurrent(idx, state.batteryModel, state.eforceStackSizes);
    const percent = Math.min(100, (status.finalLoad / Math.max(1, batteryMax)) * 100);
    const cardCls = status.overloaded ? 'cardRed' : status.inactive ? 'cardYellow' : 'card';
    const statusBadge = badge(status.overloaded ? 'bad' : status.inactive ? 'warn' : 'good', status.overloaded ? 'Overloaded' : status.inactive ? 'Idle' : 'Within limit');
    const fillColor = status.overloaded ? '#ef4444' : status.inactive ? '#eab308' : '#0f172a';
    const stackInfo = state.batteryModel === 'eforce' ? ' • ' + (state.eforceStackSizes[idx] || 1) + '× 9.6kWh' : '';
    html += '<div class="' + cardCls + '">';
    html += '<div class="cardHeader"><div class="cardName">' + escapeHtml(status.name) + escapeHtml(stackInfo) + '</div>' + statusBadge + '</div>';
    html += '<div class="cardLine">Connection point: ' + escapeHtml(status.config.label) + '</div>';
    html += '<div class="cardLine">Incoming current at node: ' + formatAmps(status.incomingNodeCurrent) + ' A</div>';
    html += '<div class="cardLine">Max Discharge: ' + formatAmps(batteryMax) + 'A</div>';
    html += '<div class="cardSmall">Power landings used: ' + status.totalConnectionPointsUsed + ' / ' + status.config.terminalCount + '</div>';
    html += '<div class="progress"><div style="width:' + percent + '%;height:100%;background:' + fillColor + '"></div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '</div></div>';
  return html;
}

function downloadReportPdf() {
  // Build the PDF using jsPDF (text + image placement) and html2canvas
  // (rasterize HTML to images). Both are loaded from CDN as standalone
  // scripts in the page <head>.
  const figureNode = document.getElementById('pdfFigurePanel');
  const resultsNode = document.getElementById('pdfResultsPanel');
  if (!figureNode || !resultsNode) return;
  const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  const html2canvasFn = window.html2canvas;
  if (!jsPDFCtor || !html2canvasFn) {
    window.print();
    return;
  }

  const pill = document.createElement('div');
  pill.style.cssText = 'position:fixed;top:14px;right:18px;background:#0f172a;color:#ffffff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:99999;box-shadow:0 4px 12px rgba(15,23,42,0.25);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;';
  pill.textContent = 'Generating PDF…';
  document.body.appendChild(pill);

  const pdf = new jsPDFCtor({ unit: 'pt', format: 'letter', orientation: 'portrait' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 36;
  const usableW = pageW - 2 * margin;
  const now = new Date();
  let y = margin;

  function done() { pdf.save('wiring_validator_' + now.toISOString().slice(0, 10) + '.pdf'); pill.remove(); }
  function abort(err) { console.error('PDF generation failed:', err); pill.remove(); window.print(); }

  // Title + date.
  pdf.setFontSize(14);
  pdf.setFont(undefined, 'bold');
  pdf.text('Wiring validator report', margin, y + 12);
  y += 20;
  pdf.setFontSize(8);
  pdf.setFont(undefined, 'normal');
  pdf.setTextColor(110);
  pdf.text('Generated ' + now.toLocaleString() + ' — Theoretical worst-case analysis at maximum rated current. Engineer stamp required before installation.', margin, y + 7, { maxWidth: usableW });
  y += 22;
  pdf.setTextColor(0);
  pdf.setFontSize(10);
  pdf.setFont(undefined, 'bold');
  pdf.text('Illustrative figure', margin, y + 8);
  y += 14;

  // Capture the figure panel (entire DOM, not just the SVG) via html2canvas.
  // This is the most reliable path because we know html2canvas handles HTML
  // wrappers correctly, and the SVG inside renders via the browser's normal
  // pipeline before capture.
  html2canvasFn(figureNode, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
    backgroundColor: '#ffffff',
  }).then(function (fcanvas) {
    const fDataUrl = fcanvas.toDataURL('image/png');
    const fAspect = fcanvas.height / fcanvas.width;
    // Reserve roughly half the page for the figure so the results panel has room below.
    const remaining = pageH - margin - y;
    const figMaxH = remaining * 0.55;
    let fW = usableW;
    let fH = fW * fAspect;
    if (fH > figMaxH) { fH = figMaxH; fW = fH / fAspect; }
    pdf.addImage(fDataUrl, 'PNG', margin, y, fW, fH);
    y += fH + 16;

    return html2canvasFn(resultsNode, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: '#ffffff',
    });
  }).then(function (rcanvas) {
    const rDataUrl = rcanvas.toDataURL('image/png');
    const rAspect = rcanvas.height / rcanvas.width;
    let remaining = pageH - margin - y;
    let rW = usableW;
    let rH = rW * rAspect;
    if (rH > remaining) {
      pdf.addPage();
      y = margin;
      remaining = pageH - margin - y;
      if (rH > remaining) { rH = remaining; rW = rH / rAspect; }
    }
    pdf.addImage(rDataUrl, 'PNG', margin, y, rW, rH);
    done();
  }).catch(abort);
}

function render() {
  const results = analyzeSystem(
    state.inverterCount,
    state.batteryCount,
    state.connections,
    state.batteryLinks,
    state.batteryConnectionTypes,
    state.inverterModel,
    state.batteryLayoutMode,
    state.batteryModel,
    state.eforceStackSizes
  );

  let html = '';
  html += '<div class="page"><div class="container">';

  // Header
  html += '<div class="headerRow">';
  html += '<div>';
  html += '<h1 class="title">Battery &amp; inverter wiring validator for installers</h1>';
  html += '<p class="subtitle">Plan a Fortress Power battery + inverter installation before you wire it. Pick your inverter model, battery model (eBoost or eForce), and quantities; the tool auto-configures a topology and checks conductor currents, per-battery max discharge limits, connection-point terminal counts, and eWay node ratings. Anything out of spec turns red with a plain-language explanation.</p>';
  html += '<p class="subtitle">This is a <strong>theoretical</strong> validator: it analyzes the worst case using the <strong>maximum rated current output</strong> of both the inverters and the batteries. Real-world operation under partial load will be less stressful than what is modeled here — so any layout that passes here has headroom in practice, and any layout that fails here will fail under the conditions it is designed to handle.</p>';

  html += '<button class="btn" data-action="demoOverload"><span style="font-weight:700">Overload example</span></button>';
  html += '<button class="btn" data-action="demoShared"><span style="font-weight:700">Share battery example</span></button>';
  html += '<button class="btn" data-action="clearAll"><span style="font-weight:700">Clear</span></button>';
  html += '</div>';
  html += '</div>';

  // Layout
  html += '<div class="layout">';
  html += buildSetupPanel(state, results);
  html += '<div class="resultsCol">';

  document.getElementById('root').innerHTML = html;
}

// === Render scheduling ===
let renderQueued = false;
function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  Promise.resolve().then(() => {
    renderQueued = false;
    render();
  });
}

// === Event delegation ===
document.addEventListener('click', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  // Walk up to find the actionable element (button/select clicks may originate on inner span)
  const el = t.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  switch (action) {
    case 'demoBalanced': demoBalanced(); break;
    case 'demoOverload': demoOverload(); break;
    case 'demoShared': demoShared(); break;
    case 'clearAll': clearAll(); break;
    case 'invMinus': resizeSystem(state.inverterCount - 1, state.batteryCount); break;
    case 'invPlus': resizeSystem(state.inverterCount + 1, state.batteryCount); break;
    case 'batMinus': resizeSystem(state.inverterCount, state.batteryCount - 1); break;
    case 'batPlus': resizeSystem(state.inverterCount, state.batteryCount + 1); break;
    case 'autoShare': autoConfigureShareBattery(); break;
    case 'autoDoNotShare': autoConfigureDoNotShareBattery(); break;
    case 'layoutSide': setBatteryLayoutMode('side_by_side'); break;
    case 'layoutFront': setBatteryLayoutMode('front_stacking'); break;
    case 'setBatteryEboost': setBatteryModel('eboost'); break;
    case 'setBatteryEforce': setBatteryModel('eforce'); break;
    case 'eforceStack': {
      const idx = parseInt(el.getAttribute('data-idx'), 10);
      const n = parseInt(el.getAttribute('data-n'), 10);
      setEforceStackSize(idx, n);
      break;
    }
    case 'eforceModMinus': setEforceModuleCount((state.eforceModuleCount || 1) - 1); break;
    case 'eforceModPlus': setEforceModuleCount((state.eforceModuleCount || 1) + 1); break;
    case 'autoArrangeStacks': autoArrangeEforceStacks(); break;
    case 'splitEforceStack': splitLargestEforceStack(); break;
    case 'toggleConn': {
      const i = parseInt(el.getAttribute('data-i'), 10);
      const j = parseInt(el.getAttribute('data-j'), 10);
      toggleConnection(i, j);
      break;
    }
    case 'openFullscreen': setState({ isFigureFullscreen: true }); break;
    case 'closeFullscreen': setState({ isFigureFullscreen: false }); break;
    case 'downloadPdf': downloadReportPdf(); break;
    case 'closeOverlay': {
      // Only close if click originated on backdrop, not inside panel
      if (el === t) setState({ isFigureFullscreen: false });
      break;
    }
    case 'overlayPanelClick': e.stopPropagation(); break;
  }
});

document.addEventListener('change', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  const action = t.getAttribute('data-action');
  if (!action) return;
  if (action === 'setInverterModel') {
    setInverterModel(t.value);
  } else if (action === 'changeBatType') {
    const idx = parseInt(t.getAttribute('data-idx'), 10);
    changeBatteryConnectionType(idx, t.value);
  } else if (action === 'toggleLink') {
    const idx = parseInt(t.getAttribute('data-idx'), 10);
    toggleBatteryLink(idx);
  } else if (action === 'invInput') {
    resizeSystem(t.value, state.batteryCount);
  } else if (action === 'batInput') {
    resizeSystem(state.inverterCount, t.value);
  } else if (action === 'eforceModInput') {
    setEforceModuleCount(parseInt(t.value, 10));
  }
});

// Track <details> open/closed across re-renders
document.addEventListener('toggle', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  const key = t.getAttribute('data-details-key');
  if (!key) return;
  detailsOpen[key] = t.open;
}, true);

// Initial render
render();

})();
</script>
</body>
</html>
