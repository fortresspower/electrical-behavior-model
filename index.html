<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Battery & inverter wiring validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: #f8fafc; color: #0f172a; font-family: "Rajdhani", Arial, sans-serif; }
.page { min-height: 100vh; padding: 24px; }
.container { max-width: 1500px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
.headerRow { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.title { font-size: 30px; font-weight: 700; margin: 0; }
.subtitle { margin-top: 8px; max-width: 980px; font-size: 13px; line-height: 1.5; color: #475569; }
.buttonRow { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { border: 1px solid #cbd5e1; background: #ffffff; border-radius: 10px; padding: 8px 12px; font-size: 12px; cursor: pointer; color: #0f172a; font-family: inherit; }
.btn.active { border: 1px solid #94a3b8; background: #eff6ff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 8px rgba(15,23,42,0.12); font-weight: 700; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.layout { display: grid; grid-template-columns: 35% 65%; gap: 16px; align-items: start; }
@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
@media print {
  @page { size: letter portrait; margin: 0.5in; }
  body { background: #ffffff !important; }
  /* Hide page chrome, controls, and the entire setup column when printing. */
  .setupCol, .demoButtonRow, .printHide, .figureHeaderRow .btn { display: none !important; }
  /* Collapse to a single column so the figure + results occupy the full page. */
  .layout { grid-template-columns: 1fr !important; gap: 12px !important; }
  /* Compact panels for print. */
  .panel { border: 1px solid #cbd5e1 !important; box-shadow: none !important; break-inside: avoid; page-break-inside: avoid; }
  .figurePanel svg { max-width: 100% !important; height: auto !important; }
  details { page-break-inside: avoid; }
  details > summary { list-style: none; }
  /* Force every <details> open so the printed PDF shows full content even if collapsed on screen. */
  details:not([open]) > :not(summary) { display: block !important; }
  details { display: block !important; }
}
.panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 1px 2px rgba(15,23,42,0.05); }
.panelHeader { padding: 14px 16px 0 16px; font-size: 18px; font-weight: 700; }
.setupBody { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.panelBody { padding: 16px; }
.section { border: 1px solid #e2e8f0; border-radius: 12px; background: #ffffff; padding: 10px; }
.section > summary { cursor: pointer; font-size: 12px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
.subFieldLabel { font-size: 12px; font-weight: 700; margin-bottom: 6px; display: block; color: #0f172a; }
.select { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; background: #ffffff; padding: 8px 10px; font-size: 12px; color: #0f172a; font-family: inherit; }
.input { width: 100%; height: 32px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 8px; font-size: 14px; color: #0f172a; box-sizing: border-box; font-family: inherit; }
.smallButton { width: 32px; height: 32px; border: 1px solid #cbd5e1; background: #ffffff; border-radius: 8px; font-size: 16px; cursor: pointer; font-family: inherit; }
.twoCol { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
.row { display: flex; align-items: center; gap: 6px; }
.tableWrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { border-bottom: 1px solid #e2e8f0; padding: 6px 8px; text-align: center; font-weight: 700; }
.tbl td { border-bottom: 1px solid #f1f5f9; padding: 6px 8px; text-align: center; }
.tbl td.lbl { text-align: left; font-weight: 700; }
.toggleOn { border: 1px solid #0f172a; background: #0f172a; color: #ffffff; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.toggleOff { border: 1px solid #cbd5e1; background: #ffffff; color: #475569; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.helper { font-size: 11px; color: #64748b; margin-top: 4px; }
.configButtonRow { display: flex; gap: 8px; flex-wrap: wrap; }
.resultsCol { display: flex; flex-direction: column; gap: 16px; }
.figureWrap { border: 1px solid #e2e8f0; border-radius: 16px; background: #ffffff; padding: 12px; overflow-x: auto; }
.figureWrap.fullscreen { overflow: auto; height: calc(100vh - 140px); }
.badgeRow { display: flex; gap: 8px; flex-wrap: wrap; }
.badge { border: 1px solid #cbd5e1; background: #ffffff; border-radius: 999px; padding: 6px 10px; font-size: 12px; color: #334155; }
.goodBadge { border: 1px solid #bbf7d0; background: #dcfce7; color: #166534; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
.badBadge { border: 1px solid #fecaca; background: #fee2e2; color: #991b1b; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
.warnBadge { border: 1px solid #fde68a; background: #fef3c7; color: #92400e; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
.alertRed { border: 1px solid #fecaca; background: #fef2f2; border-radius: 16px; padding: 14px; }
.alertYellow { border: 1px solid #fde68a; background: #fffbeb; border-radius: 16px; padding: 14px; }
.alertTitleRed { color: #991b1b; font-weight: 700; margin-bottom: 8px; }
.alertTitleYellow { color: #92400e; font-weight: 700; margin-bottom: 8px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.card { border: 1px solid #e2e8f0; border-radius: 16px; padding: 14px; background: #ffffff; }
.cardRed { border: 1px solid #fca5a5; border-radius: 16px; padding: 14px; background: #fef2f2; }
.cardYellow { border: 1px solid #fde68a; border-radius: 16px; padding: 14px; background: #fffbeb; }
.progress { margin-top: 10px; height: 10px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
.legend { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; color: #475569; }
.legendItem { display: flex; align-items: center; gap: 8px; }
.swatchBlack { width: 28px; height: 0; border-top: 3px solid #000000; }
.swatchBlue { width: 28px; height: 0; border-top: 3px dashed #2563eb; }
.swatchMustard { width: 28px; height: 0; border-top: 3px dashed #d4a017; }
.swatchGreen { width: 28px; height: 0; border-top: 3px dashed #16a34a; }

/* Wizard step cards */
.wizardStep { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; background: #ffffff; transition: opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease; }
.wizardStep.active { border-color: #0f172a; border-width: 2px; padding: 13px 15px; box-shadow: 0 2px 10px rgba(15,23,42,0.06); }
.wizardStep.completed { background: #fafafa; border-color: #dcfce7; }
.wizardStep.pending { opacity: 0.45; background: #fafafa; border-style: dashed; }
.wizardStepHeader { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.wizardStepTitle { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: #0f172a; }
.wizardStepNum { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #e2e8f0; color: #475569; font-size: 11px; font-weight: 800; }
.wizardStep.active .wizardStepNum { background: #0f172a; color: #ffffff; }
.wizardStep.completed .wizardStepNum { background: #16a34a; color: #ffffff; }
.wizardEditBtn { font-size: 12px; color: #2563eb; background: none; border: none; padding: 4px 6px; cursor: pointer; font-weight: 600; }
.wizardEditBtn:hover { text-decoration: underline; }
.wizardStepSummary { font-size: 13px; color: #475569; margin-top: 6px; margin-left: 32px; }
.wizardStepBody { margin-top: 12px; }
.wizardContinueRow { display: flex; justify-content: flex-end; margin-top: 14px; }
.wizardContinue { background: #0f172a; color: #ffffff; border: none; padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; }
.wizardContinue:hover { background: #1e293b; }
.wizardContinue:disabled { background: #cbd5e1; cursor: not-allowed; }
.wizardPendingMsg { font-size: 12px; color: #94a3b8; font-style: italic; margin-left: 32px; }

/* Smart suggestion banner */
.smartSuggestion { background: #fef3c7; border: 1.5px solid #f59e0b; border-radius: 8px; padding: 10px 14px; margin: 8px 0; display: flex; align-items: center; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
.smartSuggestion .msg { color: #78350f; font-size: 13px; font-weight: 500; flex: 1; min-width: 200px; }
.smartSuggestion .applyBtn { background: #f59e0b; color: #ffffff; border: none; padding: 6px 14px; font-size: 12px; font-weight: 700; border-radius: 5px; cursor: pointer; }
.smartSuggestion .applyBtn:hover { background: #d97706; }

/* Advanced section toggle */
.advancedToggle { background: none; border: none; color: #2563eb; font-size: 12px; font-weight: 600; cursor: pointer; padding: 8px 0; }
.advancedToggle:hover { text-decoration: underline; }
.figureHeaderRow { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px 0 16px; }
.overlayBackdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); z-index: 1000; padding: 20px; box-sizing: border-box; overflow: auto; }
.overlayPanel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,0.18); min-height: calc(100vh - 40px); }
.bpRow { display: flex; align-items: center; justify-content: space-between; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; margin-bottom: 8px; gap: 8px; }
.bpRowName { font-weight: 700; }
.bbRow { display: flex; align-items: center; justify-content: space-between; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 10px; margin-bottom: 8px; gap: 8px; }
.checkLabel { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.cardHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cardName { font-weight: 700; }
.cardLine { font-size: 13px; color: #334155; margin-bottom: 4px; }
.cardSmall { font-size: 12px; color: #64748b; }
.obsList { margin: 0; padding-left: 20px; }
.obsListSpaced { margin-top: 10px; padding-left: 20px; }
.obsCommList { margin-top: 6px; margin-left: 26px; padding-left: 18px; }
.obsCommList li { list-style-type: circle; }
.obsContainer { font-size: 13px; color: #78350f; line-height: 1.6; }
.alertList { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
.alertList.red { color: #7f1d1d; }
.figureTitle { font-size: 18px; font-weight: 700; }

// === Constants ===
const BATTERY_MAX = 250;
const CONDUCTOR_RATING = 250;
const MAX_BATTERY_COUNT = 24;
const MAX_INVERTER_COUNT = 10;
const EFORCE_MAX_BATTERY_COUNT = 32;
const EFLEX_MAX_MAX_BATTERY_COUNT = 16;
const EFLEX_MAX_CURRENT = 100;          // per-battery max output (A)
const EFLEX_MAX_TERMINAL_COUNT = 2;
const EFLEX_MAX_FIXED_TYPE = "eflex_two_point";
const EFLEX_BUSBAR_RATING = 325;        // fixed rating for the eFlex Busbar accessory (A)
const EFORCE_STACK_CURRENTS = [195, 250, 250]; // 1, 2, 3 modules
const EFORCE_MODULE_KWH = 9.6;
const EFORCE_NODE_RATING = 750;
const EFORCE_TERMINAL_COUNT = 4;
const EFORCE_FIXED_TYPE = "eforce_four_point";

function getMaxBatteryCountForModel(batteryModel) {
  if (batteryModel === "eforce") return EFORCE_MAX_BATTERY_COUNT;
  if (batteryModel === "eflex_max") return EFLEX_MAX_MAX_BATTERY_COUNT;
  return MAX_BATTERY_COUNT;
}
function getEforceStackCurrent(stackSize) {
  const clamped = Math.max(1, Math.min(3, stackSize | 0));
  return EFORCE_STACK_CURRENTS[clamped - 1];
}
function getBatteryMaxCurrent(batteryIndex, batteryModel, eforceStackSizes) {
  if (batteryModel === "eforce") {
    return getEforceStackCurrent((eforceStackSizes || [])[batteryIndex] || 1);
  }
  if (batteryModel === "eflex_max") {
    return EFLEX_MAX_CURRENT;
  }
  return BATTERY_MAX;
}
function getBatteryCapacityWeight(batteryIndex, batteryModel, eforceStackSizes) {
  // Used by the share-mode current-distribution math. Current in parallel batteries
  // distributes inversely to internal resistance, which in turn scales with module
  // count: a 3-module stack pulls 3x the current of a 1-module stack. eBoost
  // batteries are uniform, so the weight is 1 and the math collapses to equal share.
  if (batteryModel === "eforce") {
    return Math.max(1, Math.min(3, (eforceStackSizes || [])[batteryIndex] || 1));

  return 1;

// === Pure helpers ===
function clampCount(value, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 1;
  return Math.max(1, Math.min(max, Math.floor(n)));
}
function formatAmps(value) {
  const rounded = Math.round((Number(value) || 0) * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}
function names(prefix, count) {
  return Array.from({ length: count }, (_, i) => prefix + (i + 1));
}
function matrix(rows, cols, fill) {
  if (fill === undefined) fill = false;
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}
function getConnectionPointConfig(type, batteryModel) {
  if (batteryModel === "eforce") {
    return { label: "eWay", nodeRating: EFORCE_NODE_RATING, terminalCount: EFORCE_TERMINAL_COUNT };
  }
  if (batteryModel === "eflex_max") {
    // eFlex Max has no eWay — direct terminal connection, 2 lugs, 100 A node max.
    return { label: "eFlex Max", nodeRating: EFLEX_MAX_CURRENT, terminalCount: EFLEX_MAX_TERMINAL_COUNT };
  }
  switch (type) {
    case "three_point_terminal":
      return { label: "eWay", nodeRating: 750, terminalCount: 3 };
    case "six_point_busbar":
      return { label: "eWay Pro", nodeRating: 1200, terminalCount: 6 };
    default:
      return { label: "eWay Lite", nodeRating: 250, terminalCount: 1 };
  }
}
function isFrontStackBottomBattery(index, batteryLayoutMode) {
  return batteryLayoutMode === "front_stacking" && index % 2 === 1;
}
function getEffectiveBatteryConnectionType(index, configuredType, batteryLayoutMode) {
  // The configured type is always honoured. Front-stack bottom batteries are
  // still *defaulted* to eWay Lite by the auto-config routines (since they
  // physically carry a single cable from the battery above), but a user can
  // override that in the manual "Battery connection points" panel — e.g. to
  // reproduce and validate an installer's single-line diagram. The analyzer's
  // node-rating check then verifies the chosen connection point can carry the
  // current actually passing through it.
  return configuredType;
}
function getFrontStackColumnCount(batteryCount) {
  return Math.max(1, Math.ceil(batteryCount / 2));
}
function getTopBatteryIndexForColumn(columnIndex) {
  return columnIndex * 2;
}
function getBottomBatteryIndexForColumn(columnIndex, batteryCount) {
  const candidate = columnIndex * 2 + 1;

// === Analyzer (ported as-is) ===

  const batteryNames = names("B", batteryCount);

  const nodeInflow = Array(batteryCount).fill(0);

  const autoCommBatteryLinks = Array(Math.max(0, batteryCount - 1)).fill(false);
  const observations = [];
  const inverterLimitWarnings = [];
  const risks = [];
  const alarms = [];
  const advisories = [];
  inverterNames.forEach((name, i) => {
    const targets = [];
    for (let j = 0; j < batteryCount; j += 1) {
      if ((connections[i] || [])[j]) targets.push(j);
    }
    if (targets.length === 0) {
      observations.push(name + " isn't wired to any battery, so no power flows from it.");
      return;

    if (targets.length > maxPorts) {
      inverterLimitWarnings.push(
        name + " has " + targets.length + " battery cables connected, but this inverter model only supports " + maxPorts +
        " cable" + (maxPorts === 1 ? "" : "s") + ". Only the first " + maxPorts + " " + (maxPorts === 1 ? "is" : "are") + " used."
      );
    }
    const activeTargets = targets.slice(0, maxPorts);
    const share = activeTargets.length > 0 ? inverterOutputCurrent / activeTargets.length : 0;
    activeTargets.forEach((batteryIndex) => {
      directFlows[i][batteryIndex] = share;
      nodeInflow[batteryIndex] += share;

  const edges = getBatteryEdges(batteryLinks, batteryLayoutMode, batteryCount, extraBatteryEdges);
  const cableGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, edges, false);
  const effectiveGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, edges, bridgedPorts);
  const batteryGroupLabels = effectiveGroups.map((indices, groupIndex) =>
    "Group " + (groupIndex + 1) + " shares power across: " + indices.map((idx) => batteryNames[idx]).join(", ")
  );
  const globalShareMode = inferGlobalShareMode(effectiveGroups.length);
  const hasMixedShareDoNotShareTopology = hasTrueMixedShareDoNotShareTopology(effectiveGroups, inverterCount, directFlows);
  const communicationGroups = buildCommunicationGroups(inverterCount, batteryCount, directFlows, edges, bridgedPorts);
  if (globalShareMode === "share") {
    observations.push("All your batteries are wired together into one shared pool, so they share the load evenly. (Share Battery setup)");
  } else {
    observations.push("Your batteries are split into separate groups instead of one shared pool. (Do Not Share setup)");
    advisories.push("To share batteries, there needs to be one unbroken connection running across all of them.");
    advisories.push("You can create that connection with battery-to-battery cables, or — on inverters that link their two battery ports inside the unit — through the inverter itself.");
  }
  if (hasMixedShareDoNotShareTopology) {
    alarms.push("This setup mixes two approaches: some batteries are shared across multiple inverters while others are kept separate. That is usually a wiring mistake.");
    advisories.push("Pick one approach for the whole system: either wire every battery into a single shared pool, or keep every group fully separate. Try not to mix the two.");
  }
  advisories.push(bridgedPorts
    ? "The Envy Duo 21 / Envy 12kW links its two battery ports together inside the unit, so the two ports act as one."
    : "This inverter keeps its battery port separate — it is not linked to anything inside the unit.");
  if (cableGroups.length > 1 && effectiveGroups.length === 1 && bridgedPorts) {

  }

    const outgoingNodeCurrent = finalBatteryLoad[i] + edgeExports;

    const nodeOverload = incomingNodeCurrent > config.nodeRating + 1e-9;

    if (nodeOverload) risks.push(name + " has " + formatAmps(incomingNodeCurrent) + " A flowing into its connection point, more than the " + formatAmps(config.nodeRating) + " A it is rated for. The connection hardware can't carry this much current.");

  inverterModel: "envy_duo_21_envy_12kw",
  isFigureFullscreen: false,
  batteryLayoutMode: "side_by_side",
  batteryModel: "eboost",
  eforceStackSizes: [2, 2, 2],
  eforceModuleCount: 6,
  configurationMode: "none",
  busbarType: "none",     // eFlex Max only: "busbar" | "eflex_busbar" | "none"
  wizardActiveStep: "inverter",     // current step key in the guided wizard
  wizardCompletedSteps: [],          // array of step keys that have been confirmed
};

// Track open/closed state of <details> sections so re-renders don't collapse them.
const detailsOpen = {
  chooseBattery: true,
  step1: true,
  step2: true,
  autoConfig: true,
  manualConfig: false,
  manualConductors: false,
  manualBattConn: false,
  manualBatteryLinks: false,
};

function setState(patch) {
  Object.assign(state, patch);
  scheduleRender();
}

// === Actions (mutate state and re-render) ===
function resizeSystem(newInv, newBat) {
  const inv = clampCount(newInv, MAX_INVERTER_COUNT);
  const bat = clampCount(newBat, getMaxBatteryCountForModel(state.batteryModel));
  const prevConn = state.connections;
  const nextConn = matrix(inv, bat, false);
  for (let i = 0; i < Math.min(inv, prevConn.length); i += 1) {
    for (let j = 0; j < Math.min(bat, prevConn[i].length); j += 1) nextConn[i][j] = prevConn[i][j];
  }
  const prevLinks = state.batteryLinks;
  const nextLinks = Array(Math.max(0, bat - 1)).fill(false);
  for (let i = 0; i < Math.min(nextLinks.length, prevLinks.length); i += 1) nextLinks[i] = prevLinks[i];
  const prevTypes = state.batteryConnectionTypes;
  const defaultType = state.batteryModel === "eforce" ? EFORCE_FIXED_TYPE : "three_point_terminal";
  const nextTypes = Array(bat).fill(defaultType);
  for (let i = 0; i < Math.min(bat, prevTypes.length); i += 1) nextTypes[i] = prevTypes[i];
  // Newly-added front-stack bottom batteries default to eWay Lite (single cable
  // from the battery above). Existing batteries keep whatever the user set.
  if (state.batteryModel !== "eforce" && state.batteryLayoutMode === "front_stacking") {
    for (let i = prevTypes.length; i < bat; i += 1) {
      if (isFrontStackBottomBattery(i, "front_stacking")) nextTypes[i] = "single_point_terminal";
    }
  }
  const prevStacks = state.eforceStackSizes || [];
  const nextStacks = Array(bat).fill(2);
  for (let i = 0; i < Math.min(bat, prevStacks.length); i += 1) nextStacks[i] = prevStacks[i] || 2;
  state.inverterCount = inv;
  state.batteryCount = bat;
  state.connections = nextConn;
  state.batteryLinks = nextLinks;
  state.batteryConnectionTypes = nextTypes;
  state.eforceStackSizes = nextStacks;
  // Drop any user-added conductors that referenced batteries removed by the resize.
  if (Array.isArray(state.extraBatteryEdges)) {
    state.extraBatteryEdges = state.extraBatteryEdges.filter((e) => e[0] < bat && e[1] < bat);
  }
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function computeEforceStackArrangement(moduleCount, inverterCount) {
  // Pack `moduleCount` 9.6 kWh modules into stacks of 1/2/3 modules each.
  // Rule: minimize stack count by preferring 3-module stacks, but also create
  // at least min(inverterCount, moduleCount) stacks so the bus has somewhere
  // for each inverter to land when modules allow.
  if (moduleCount <= 0) return [];
  const M = moduleCount;
  const I = Math.max(0, inverterCount | 0);
  const S = Math.max(Math.ceil(M / 3), Math.min(I, M));
  const E = M - S;
  const triples = Math.max(0, E - S);
  const singles = Math.max(0, S - E);
  const doubles = S - triples - singles;
  const sizes = [];
  for (let k = 0; k < triples; k += 1) sizes.push(3);
  for (let k = 0; k < doubles; k += 1) sizes.push(2);
  for (let k = 0; k < singles; k += 1) sizes.push(1);
  return sizes;
}

function setEforceModuleCount(moduleCount) {
  // Clamp to 1..32 modules and re-pack stacks per the auto-arrange rule.
  const clamped = Math.max(1, Math.min(EFORCE_MAX_BATTERY_COUNT, moduleCount | 0));
  state.eforceModuleCount = clamped;
  autoArrangeEforceStacks();
}

function autoArrangeEforceStacks() {
  // Recompute stack sizes from state.eforceModuleCount and adjust batteryCount.
  const sizes = computeEforceStackArrangement(state.eforceModuleCount, state.inverterCount);
  const S = sizes.length;
  resizeSystem(state.inverterCount, S);
  state.eforceStackSizes = sizes;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function splitLargestEforceStack() {
  // Manual override: take one module off the largest stack and start a new
  // 1-module stack. Total module count stays the same; stack count grows by 1.
  // Useful when the auto-arranged shape (which minimizes stack count) leaves
  // an oversized stack that pulls too much current under proportional share.
  if (state.batteryCount >= EFORCE_MAX_BATTERY_COUNT) return;
  const sizes = (state.eforceStackSizes || []).slice();
  let maxIdx = -1;
  let maxSize = 1;
  for (let i = 0; i < sizes.length; i += 1) {
    if (sizes[i] > maxSize) { maxSize = sizes[i]; maxIdx = i; }
  }
  if (maxIdx === -1) return; // every stack is already a single module; can't split further
  sizes[maxIdx] -= 1;
  sizes.push(1);
  const newBatteryCount = sizes.length;
  resizeSystem(state.inverterCount, newBatteryCount);
  state.eforceStackSizes = sizes;
  state.eforceModuleCount = sizes.reduce((sum, n) => sum + n, 0);
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function setEforceStackSize(index, size) {
  // Clicking a size on the stack picker re-packs the FIXED module budget into
  // uniform stacks of that size, with a smaller remainder stack if the budget
  // isn't an exact multiple. The module count chosen in the Battery step never
  // changes — only the grouping does. Examples (budget = 4):
  //   click "2" -> [2,2]   click "3" -> [3,1]   click "1" -> [1,1,1,1]
  // This makes the picker behave predictably ("I want N-module stacks") instead
  // of awkwardly shaving a module off a neighbour.
  const target = Math.max(1, Math.min(3, size | 0));
  const budget = state.eforceModuleCount || (state.eforceStackSizes || []).reduce((s, n) => s + n, 0) || 1;
  const sizes = [];
  let remaining = budget;
  while (remaining > 0) {
    const take = Math.min(target, remaining);
    sizes.push(take);
    remaining -= take;
  }
  const newBatteryCount = sizes.length;
  resizeSystem(state.inverterCount, newBatteryCount); // rebuilds connections/types for the new stack count
  state.eforceStackSizes = sizes;                     // restore our arrangement (resizeSystem defaults to 2s)
  // eforceModuleCount stays fixed at `budget`.
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function toggleConnection(i, j) {
  state.configurationMode = "none";
  state.connections = state.connections.map((row, r) => row.map((cell, c) => (r === i && c === j ? !cell : cell)));
  scheduleRender();
}

function toggleBatteryLink(idx) {
  state.configurationMode = "none";
  state.batteryLinks = state.batteryLinks.map((value, i) => (i === idx ? !value : value));
  scheduleRender();
}

function addBatteryEdge(a, b) {
  if (!Number.isFinite(a) || !Number.isFinite(b) || a === b) return;
  const lo = Math.min(a, b), hi = Math.max(a, b);
  if (lo < 0 || hi >= state.batteryCount) return;
  if (!Array.isArray(state.extraBatteryEdges)) state.extraBatteryEdges = [];
  // Avoid duplicating an existing custom conductor.
  if (state.extraBatteryEdges.some((e) => e[0] === lo && e[1] === hi)) return;
  state.configurationMode = "none";
  state.extraBatteryEdges = state.extraBatteryEdges.concat([[lo, hi]]);
  scheduleRender();
}

function removeBatteryEdge(idx) {
  if (!Array.isArray(state.extraBatteryEdges)) return;
  state.configurationMode = "none";
  state.extraBatteryEdges = state.extraBatteryEdges.filter((_, i) => i !== idx);
  scheduleRender();
}

function changeBatteryConnectionType(idx, value) {
  state.configurationMode = "none";
  state.batteryConnectionTypes = state.batteryConnectionTypes.map((item, i) => (i === idx ? value : item));
  scheduleRender();
}

function clearAll() {
  state.configurationMode = "none";
  state.connections = matrix(state.inverterCount, state.batteryCount, false);
  state.batteryLinks = Array(Math.max(0, state.batteryCount - 1)).fill(false);
  state.extraBatteryEdges = [];
  state.batteryConnectionTypes = Array(state.batteryCount).fill("three_point_terminal");
  scheduleRender();
}

function distributeInverterLandings(inverterCount, slotCount, maxPorts) {
  // Returns array[invIdx] -> sorted slot indices the inverter should land on.
  // Guarantees every inverter has at least one landing.
  // Spreads "extra" port assignments evenly so high-current single-port landings
  // and Case A doublings are not clustered at the bus edges (which would cause
  // large cumulative imbalances on battery-to-battery conductors in share mode).
  const result = Array.from({ length: inverterCount }, () => []);
  if (slotCount === 0 || inverterCount === 0) return result;
  // Case A: more inverters than slots. Each inverter gets exactly one landing.
  // Spread inverter-to-slot assignments evenly so slots that end up with multiple
  // inverters are placed toward the middle of the bus, not the edges.
  if (inverterCount > slotCount) {
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const slot = Math.floor((inv + 0.5) * slotCount / inverterCount);
      result[inv].push(Math.min(slotCount - 1, Math.max(0, slot)));
    }
    return result;
  }
  // Case B: inverterCount <= slotCount.
  const uniquePositions = Math.min(slotCount, inverterCount * maxPorts);
  const positions = [];
  for (let k = 0; k < uniquePositions; k += 1) {
    positions.push(Math.floor((k + 0.5) * slotCount / uniquePositions));
  }
  const base = Math.floor(uniquePositions / inverterCount);
  const extra = uniquePositions % inverterCount;
  // Spread the "extra" port assignments evenly across the inverter array.
  // Without this, the first `extra` inverters get an extra port and the last
  // (inverterCount - extra) get one fewer, which clusters high-current
  // single-port landings at one end of the bus and creates large cumulative
  // imbalances on share-mode battery conductors.
  const extraSet = new Set();
  if (extra > 0) {
    for (let e = 0; e < extra; e += 1) {
      extraSet.add(Math.floor((e + 0.5) * inverterCount / extra));
    }
  }
  let cursor = 0;
  for (let inv = 0; inv < inverterCount; inv += 1) {
    const want = Math.min(maxPorts, base + (extraSet.has(inv) ? 1 : 0));
    for (let k = 0; k < want && cursor < positions.length; k += 1) result[inv].push(positions[cursor++]);
    if (result[inv].length === 0) result[inv].push(positions[Math.min(positions.length - 1, inv)]);
  }
  result.forEach((arr) => arr.sort((a, b) => a - b));
  return result;
}

function getBatteryTopLandingCount(i, connections, batteryLinks, batteryLayoutMode, batteryCount) {
  // How many physical power-cable landings meet at this battery's connection
  // point. Used by both the auto-upgrade logic AND the analyzer's terminal
  // overuse check, so they stay consistent.
  //
  // SIDE-BY-SIDE: the flat batteryLinks array's linear adjacency matches the
  // physical layout. Landings = direct inverter cables + left neighbour link
  // (batteryLinks[i-1]) + right neighbour link (batteryLinks[i]).
  //
  // FRONT-STACKING (top battery only — bottoms are handled separately as
  // single-terminal eWay Lite landings): the visual layout has each top
  // battery wired to (a) its own column's bottom via a vertical, AND (b)
  // horizontal cables to the front batteries of the previous and next columns.
  // In the flat batteryLinks array these inter-column horizontals are stored
  // at the ODD indices (batteryLinks[i-1] and batteryLinks[i+1] for a top
  // battery at even index i), while the within-column vertical lives at
  // batteryLinks[i]. The flat linear-adjacency formula misses the right-side
  // horizontal entirely, which is why interior front-stack columns (3+ total
  // columns, i.e. 5+ batteries) used to never auto-upgrade to eWay Pro.
  const directLandings = connections.reduce((sum, row) => sum + ((row || [])[i] ? 1 : 0), 0);
  if (batteryLayoutMode === "front_stacking") {
    const column = Math.floor(i / 2);
    const columnCount = getFrontStackColumnCount(batteryCount);
    const hasBottom = getBottomBatteryIndexForColumn(column, batteryCount) !== -1;
    const verticalLink = (hasBottom && batteryLinks[i]) ? 1 : 0;
    const leftHorizLink = (column > 0 && batteryLinks[i - 1]) ? 1 : 0;
    const rightHorizLink = (column < columnCount - 1 && batteryLinks[i + 1]) ? 1 : 0;
    return directLandings + verticalLink + leftHorizLink + rightHorizLink;
  }
  const leftLink = i > 0 && batteryLinks[i - 1] ? 1 : 0;
  const rightLink = i < batteryCount - 1 && batteryLinks[i] ? 1 : 0;
  return directLandings + leftLink + rightLink;
}

function upgradeBatteryConnectionTypes(connections, batteryLinks, baseTypes, batteryLayoutMode) {
  // Walks each battery and upgrades its connection point to the smallest
  // eWay tier that can physically accommodate the resulting landings (direct
  // inverter cables + battery-to-battery conductors). Front-stacking bottom
  // batteries are left at their default (eWay Lite) here; a user can still
  // override them in manual config.
  const result = baseTypes.slice();
  const batteryCount = result.length;
  const edges = getBatteryEdges(batteryLinks, batteryLayoutMode, batteryCount, null);
  for (let i = 0; i < batteryCount; i += 1) {
    if (isFrontStackBottomBattery(i, batteryLayoutMode)) continue;
    const directLandings = connections.reduce((sum, row) => sum + ((row || [])[i] ? 1 : 0), 0);
    const totalLandings = directLandings + batteryEdgeDegree(i, edges);
    if (totalLandings > 3) result[i] = "six_point_busbar";
    else if (totalLandings >= 1) result[i] = "three_point_terminal";
  }
  return result;
}

function applyShareConfiguration(layoutModeOverride) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const maxPorts = (INVERTER_MODELS[state.inverterModel] || {}).maxPorts || 1;
  const isEforce = state.batteryModel === "eforce";
  const isEflexMax = state.batteryModel === "eflex_max";
  const defaultType = isEforce ? EFORCE_FIXED_TYPE : (isEflexMax ? EFLEX_MAX_FIXED_TYPE : "three_point_terminal");
  const nextConnections = matrix(inv, bat, false);
  const nextBatteryLinks = Array(Math.max(0, bat - 1)).fill(true);
  const nextBatteryConnectionTypes = Array(bat).fill(defaultType);
  if (layoutModeOverride === "front_stacking" && !isEforce) {
    const columnCount = getFrontStackColumnCount(bat);
    for (let column = 0; column < columnCount; column += 1) {
      const bottomIndex = getBottomBatteryIndexForColumn(column, bat);
      if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
    }
    const landings = distributeInverterLandings(inv, columnCount, maxPorts);
    landings.forEach((slots, invIdx) => {
      slots.forEach((col) => {
        const topIdx = getTopBatteryIndexForColumn(col);
        if (topIdx < bat) nextConnections[invIdx][topIdx] = true;
      });
    });
  } else {
    const landings = distributeInverterLandings(inv, bat, maxPorts);
    landings.forEach((slots, invIdx) => {
      slots.forEach((b) => { nextConnections[invIdx][b] = true; });
    });
  }
  state.connections = nextConnections;
  state.batteryLinks = nextBatteryLinks;
  state.extraBatteryEdges = []; // auto-config defines its own topology
  // eForce uses a single fixed connection point — no upgrade/downgrade allowed.
  state.batteryConnectionTypes = (isEforce || isEflexMax)
    ? nextBatteryConnectionTypes
    : upgradeBatteryConnectionTypes(nextConnections, nextBatteryLinks, nextBatteryConnectionTypes, layoutModeOverride);
}

function applyBusbarConfiguration() {
  // Busbar mode: every inverter and every battery connects to a central busbar.
  // Electrically this is identical to share mode with all batteries linked, so
  // we reuse the same analyzer machinery (one effective group, current
  // distributes proportionally to battery capacity). The visual difference is
  // rendered as a horizontal busbar between the inverters and the batteries.
  const inv = state.inverterCount, bat = state.batteryCount;
  const maxPorts = (INVERTER_MODELS[state.inverterModel] || {}).maxPorts || 1;
  const isEforce = state.batteryModel === "eforce";
  const isEflexMax = state.batteryModel === "eflex_max";
  const defaultType = isEforce ? EFORCE_FIXED_TYPE : (isEflexMax ? EFLEX_MAX_FIXED_TYPE : "three_point_terminal");
  // Force side-by-side layout — busbar doesn't combine with front-stacking.
  state.batteryLayoutMode = "side_by_side";
  const nextConnections = matrix(inv, bat, false);
  const nextBatteryLinks = Array(Math.max(0, bat - 1)).fill(true);
  const nextBatteryConnectionTypes = Array(bat).fill(defaultType);
  // Distribute inverter landings the same way share mode does (the busbar
  // routes the current to whichever batteries each inverter "points at").
  const landings = distributeInverterLandings(inv, bat, maxPorts);
  landings.forEach((slots, invIdx) => {
    slots.forEach((b) => { nextConnections[invIdx][b] = true; });
  });
  state.connections = nextConnections;
  state.batteryLinks = nextBatteryLinks;
  state.extraBatteryEdges = []; // auto-config defines its own topology
  state.batteryConnectionTypes = (isEforce || isEflexMax)
    ? nextBatteryConnectionTypes
    : upgradeBatteryConnectionTypes(nextConnections, nextBatteryLinks, nextBatteryConnectionTypes, "side_by_side");
}

function autoConfigureBusbar() {
  state.configurationMode = "busbar";
  applyBusbarConfiguration();
  scheduleRender();
}

function applyEflexBusbarConfiguration() {
  // Electrically equivalent to busbar mode (every inverter and every battery
  // meets at a shared node), but with a fixed 325 A rating instead of the
  // dynamic 1.2 × Σ inverter rule. Available only when eFlex Max is selected.
  applyBusbarConfiguration();
}

function autoConfigureEflexBusbar() {
  state.configurationMode = "eflex_busbar";
  applyEflexBusbarConfiguration();
  scheduleRender();
}

function applyDoNotShareConfiguration(layoutModeOverride) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const isEforce = state.batteryModel === "eforce";
  const isEflexMax = state.batteryModel === "eflex_max";
  const defaultType = isEforce ? EFORCE_FIXED_TYPE : (isEflexMax ? EFLEX_MAX_FIXED_TYPE : "three_point_terminal");
  const nextConnections = matrix(inv, bat, false);
  const nextBatteryLinks = Array(Math.max(0, bat - 1)).fill(false);
  const nextBatteryConnectionTypes = Array(bat).fill(defaultType);
  const maxPorts = (INVERTER_MODELS[state.inverterModel] || {}).maxPorts || 1;
  if (layoutModeOverride === "front_stacking" && !isEforce) {
    const columnCount = getFrontStackColumnCount(bat);
    for (let column = 0; column < columnCount; column += 1) {
      const bottomIndex = getBottomBatteryIndexForColumn(column, bat);
      if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
    }
    if (inv <= columnCount) {
      // Partition columns proportionally; every inverter gets a contiguous block.
      for (let i = 0; i < inv; i += 1) {
        const colRange = distributeStartAndEnd(columnCount, inv, i);
        const colStart = colRange[0];
        const colEnd = Math.min(columnCount, colRange[1]);
        const groupBatteries = [];
        for (let c = colStart; c < colEnd; c += 1) {
          groupBatteries.push(getTopBatteryIndexForColumn(c));
          const bot = getBottomBatteryIndexForColumn(c, bat);
          if (bot !== -1) groupBatteries.push(bot);
        }
        groupBatteries.sort((a, b) => a - b);
        for (let k = 0; k < groupBatteries.length - 1; k += 1) {
          if (groupBatteries[k + 1] === groupBatteries[k] + 1) nextBatteryLinks[groupBatteries[k]] = true;
        }
        const tops = groupBatteries.filter((idx) => idx % 2 === 0);
        const landingCount = Math.min(tops.length, maxPorts);
        const startOff = Math.floor((tops.length - landingCount) / 2);
        for (let k = 0; k < landingCount; k += 1) nextConnections[i][tops[startOff + k]] = true;
      }
    } else {
      // Degenerate: more inverters than columns. Round-robin across top batteries
      // (bottoms are eWay Lite landing points). Vertical link in each column feeds bottoms.
      // Analyzer will flag any resulting overload.
      for (let i = 0; i < inv; i += 1) {
        nextConnections[i][getTopBatteryIndexForColumn(i % columnCount)] = true;
      }
      for (let c = 0; c < columnCount; c += 1) {
        const top = getTopBatteryIndexForColumn(c);
        const bot = getBottomBatteryIndexForColumn(c, bat);
        if (bot !== -1) nextBatteryLinks[top] = true;
      }
    }
  } else {
    if (inv <= bat) {
      for (let i = 0; i < inv; i += 1) {
        const range = distributeStartAndEnd(bat, inv, i);
        const startBattery = range[0];
        const groupEnd = Math.min(bat, range[1]);
        const groupSize = Math.max(1, groupEnd - startBattery);
        const directAssignments = Math.min(groupSize, maxPorts);
        const assignmentStart = groupSize > directAssignments ? startBattery + Math.floor((groupSize - directAssignments) / 2) : startBattery;
        for (let offset = 0; offset < directAssignments; offset += 1) {
          nextConnections[i][assignmentStart + offset] = true;
        }
        for (let batteryIndex = startBattery; batteryIndex < groupEnd - 1; batteryIndex += 1) {
          nextBatteryLinks[batteryIndex] = true;
        }
      }
    } else {
      for (let i = 0; i < inv; i += 1) nextConnections[i][i % bat] = true;
    }
  }
  state.connections = nextConnections;
  state.batteryLinks = nextBatteryLinks;
  state.extraBatteryEdges = []; // auto-config defines its own topology
  state.batteryConnectionTypes = (isEforce || isEflexMax)
    ? nextBatteryConnectionTypes
    : upgradeBatteryConnectionTypes(nextConnections, nextBatteryLinks, nextBatteryConnectionTypes, layoutModeOverride);
}

function reapplyAutoConfigIfNeeded() {
  if (state.configurationMode === "share") applyShareConfiguration(state.batteryLayoutMode);
  else if (state.configurationMode === "do_not_share") applyDoNotShareConfiguration(state.batteryLayoutMode);
}

function autoConfigureShareBattery() {
  state.configurationMode = "share";
  applyShareConfiguration(state.batteryLayoutMode);
  scheduleRender();
}
function autoConfigureDoNotShareBattery() {
  state.configurationMode = "do_not_share";
  applyDoNotShareConfiguration(state.batteryLayoutMode);
  scheduleRender();
}
// === Wizard helpers ===
function getWizardSteps() {
  const steps = [
    { key: "inverter", title: "Inverter" },
    { key: "battery", title: "Battery" },
  ];
  if (state.batteryModel === "eforce") {
    steps.push({ key: "stacks", title: "Stack arrangement" });
  } else if (state.batteryModel === "eboost") {
    steps.push({ key: "layout", title: "Layout" });
  }
  steps.push({ key: "sharing", title: "Sharing scheme" });
  if (state.batteryModel === "eflex_max") {
    steps.push({ key: "busrail", title: "Bus rail" });
  }
  return steps;
}

function isWizardStepCompleted(key) {
  return (state.wizardCompletedSteps || []).indexOf(key) !== -1;
}

function getWizardStatus(key) {
  // Visible steps may have changed (battery model switch); drop stale completed.
  const visibleKeys = getWizardSteps().map((s) => s.key);
  state.wizardCompletedSteps = (state.wizardCompletedSteps || []).filter((k) => visibleKeys.indexOf(k) !== -1);
  // Re-home wizardActiveStep ONLY if it's a non-null value that's no longer
  // visible (e.g., user switched battery model away from a step). When
  // wizardActiveStep is explicitly null (set by continueWizardStep after the
  // final step), leave it null so every step renders as "completed". The old
  // version had a `|| visibleKeys[last]` fallback that resurrected the last
  // step when activeStep was null — clicking Continue on the final step
  // looked like a no-op because the card immediately re-activated itself.
  if (state.wizardActiveStep !== null && visibleKeys.indexOf(state.wizardActiveStep) === -1) {
    state.wizardActiveStep = visibleKeys.find((k) => !isWizardStepCompleted(k)) || null;
  }
  // Active wins over completed — that's how Edit re-opens a step. Otherwise
  // a step that's both in completedSteps AND in wizardActiveStep would render
  // as completed (collapsed summary) instead of active (controls visible).
  if (state.wizardActiveStep === key) return "active";
  if (isWizardStepCompleted(key)) return "completed";
  return "pending";
}

function continueWizardStep(stepKey) {
  if (!isWizardStepCompleted(stepKey)) {
    state.wizardCompletedSteps = state.wizardCompletedSteps.concat([stepKey]);
  }
  // Advance to next non-completed step.
  const steps = getWizardSteps();
  for (let i = 0; i < steps.length; i += 1) {
    if (!isWizardStepCompleted(steps[i].key)) {
      state.wizardActiveStep = steps[i].key;
      scheduleRender();
      return;
    }
  }
  state.wizardActiveStep = null;
  scheduleRender();
}

function editWizardStep(stepKey) {
  state.wizardActiveStep = stepKey;
  scheduleRender();
}

function markAllWizardStepsComplete() {
  // Used by the demo buttons — push the user past the wizard since the demo is fully configured.
  state.wizardCompletedSteps = getWizardSteps().map((s) => s.key);
  state.wizardActiveStep = null;
}

function resetWizard() {
  state.wizardCompletedSteps = [];
  state.wizardActiveStep = "inverter";
}

// === Smart battery-count suggestion ===
function computeBatterySuggestion() {
  // Capacity-based suggestion: triggers whenever total inverter current
  // exceeds the sum of every battery's max-discharge rating, and recommends
  // how many more batteries (or eForce modules) bring the system back into
  // compliance. Works for eBoost, eForce, and eFlex Max.
  const invModel = INVERTER_MODELS[state.inverterModel];
  if (!invModel) return null;
  const invPerInverter = (invModel.current || 0) * (invModel.ports || 1);
  const totalInvCurrent = state.inverterCount * invPerInverter;

  // Sum the actual per-battery capacity, accounting for eForce stack sizes.
  let totalBatCapacity = 0;
  for (let i = 0; i < state.batteryCount; i += 1) {
    totalBatCapacity += getBatteryMaxCurrent(i, state.batteryModel, state.eforceStackSizes) || 0;
  }

  if (totalInvCurrent <= totalBatCapacity) return null;
  const shortfallA = totalInvCurrent - totalBatCapacity;

  // Per-added-unit capacity. For eForce a fresh module added as a 1-module
  // stack contributes 195 A (worst case); for eBoost 250 A; for eFlex Max 100 A.
  let perUnitA, unitLabelSingle, unitLabelPlural, currentCount, maxCount;
  if (state.batteryModel === "eforce") {
    perUnitA = getEforceStackCurrent ? getEforceStackCurrent(1) : 195;
    unitLabelSingle = "module";
    unitLabelPlural = "modules";
    currentCount = state.eforceModuleCount || state.batteryCount;
    maxCount = EFORCE_MAX_BATTERY_COUNT;
  } else if (state.batteryModel === "eflex_max") {
    perUnitA = EFLEX_MAX_CURRENT || 100;
    unitLabelSingle = "battery";
    unitLabelPlural = "batteries";
    currentCount = state.batteryCount;
    maxCount = getMaxBatteryCountForModel("eflex_max");
  } else {
    perUnitA = 250; // eBoost per-battery max
    unitLabelSingle = "battery";
    unitLabelPlural = "batteries";
    currentCount = state.batteryCount;
    maxCount = getMaxBatteryCountForModel("eboost");
  }

  const additional = Math.ceil(shortfallA / perUnitA);
  const newTotal = currentCount + additional;
  if (newTotal > maxCount) return null; // can't fix within the model's limits

  return {
    additional: additional,
    newTotal: newTotal,
    unitSingle: unitLabelSingle,
    unitPlural: unitLabelPlural,
    totalInvCurrent: totalInvCurrent,
    totalBatCapacity: totalBatCapacity,
  };
}

function applyBatterySuggestion(newTotal) {
  if (state.batteryModel === "eforce") {
    setEforceModuleCount(newTotal);
  } else {
    resizeSystem(state.inverterCount, newTotal);
  }
}

function setBusbarType(busbar) {
  // eFlex Max only: choose between Busbar, eFlex Busbar, or no bus rail.
  // Toggling the currently-active type turns it off (back to "none").
  if (state.batteryModel !== "eflex_max") return;
  if (state.busbarType === busbar) {
    state.busbarType = "none";
  } else {
    state.busbarType = busbar;
  }
  // Re-run the auto-config so connections/links are appropriate for the new mix.
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}

function setBatteryLayoutMode(mode) {
  // eForce and eFlex Max only support side-by-side; ignore front-stacking attempts.
  if ((state.batteryModel === "eforce" || state.batteryModel === "eflex_max") && mode === "front_stacking") return;
  state.batteryLayoutMode = mode;
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}
function setInverterModel(model) {
  state.inverterModel = model;
  // Solo 6.5kW has a single terminal and cannot run a "Do not share" topology.
  // If the user had that selected, fall back to "Share battery".
  if (model === "solo_6_5kw" && state.configurationMode === "do_not_share") {
    state.configurationMode = "share";
  }
  reapplyAutoConfigIfNeeded();
  scheduleRender();
}
function setBatteryModel(model) {
  if (state.batteryModel === model) return;
  const wasEflexMax = state.batteryModel === "eflex_max";
  state.batteryModel = model;
  if (model === "eforce") {
    // Force side-by-side; eForce doesn't permit front-stacking.
    state.batteryLayoutMode = "side_by_side";
    // Fix every battery's connection type to the single eForce eWay.
    state.batteryConnectionTypes = state.batteryConnectionTypes.map(() => EFORCE_FIXED_TYPE);
    // Seed stack sizes (default 2 modules each) and derive module count.
    const stacks = (state.eforceStackSizes || []).slice();
    while (stacks.length < state.batteryCount) stacks.push(2);
    state.eforceStackSizes = stacks.slice(0, state.batteryCount);
    state.eforceModuleCount = state.eforceStackSizes.reduce((sum, n) => sum + n, 0);
  } else if (model === "eflex_max") {
    // eFlex Max has its own connection point — no eWay tiers. Force every battery to it.
    state.batteryConnectionTypes = state.batteryConnectionTypes.map(() => EFLEX_MAX_FIXED_TYPE);
    // eFlex Max only supports side-by-side.
    state.batteryLayoutMode = "side_by_side";
  } else if (model === "eboost") {
    // Coming back from eForce or eFlex Max: reset to the default eWay tier.
    state.batteryConnectionTypes = state.batteryConnectionTypes.map((t) => (t === EFORCE_FIXED_TYPE || t === EFLEX_MAX_FIXED_TYPE ? "three_point_terminal" : t));
  }
  // Busbar configuration is only valid while eFlex Max is selected. Leaving
  // eFlex Max resets the configuration to "no auto-config".
  if (wasEflexMax && model !== "eflex_max") {
    state.busbarType = "none";
    if (state.configurationMode === "busbar" || state.configurationMode === "eflex_busbar") {
      state.configurationMode = "none";
    }
  }
  // Entering eFlex Max: migrate legacy busbar values out of configurationMode.
  if (model === "eflex_max") {
    if (state.configurationMode === "busbar") { state.busbarType = "busbar"; state.configurationMode = "share"; }
    else if (state.configurationMode === "eflex_busbar") { state.busbarType = "eflex_busbar"; state.configurationMode = "share"; }
  }
  // Clamp battery count to the new model's max.
  const maxBat = getMaxBatteryCountForModel(model);
  if (state.batteryCount > maxBat) resizeSystem(state.inverterCount, maxBat);
  else reapplyAutoConfigIfNeeded();
  scheduleRender();
}
