// === Render utilities ===
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function badge(type, content) {
  const cls = type === "good" ? "goodBadge" : type === "bad" ? "badBadge" : type === "warn" ? "warnBadge" : "badge";
  return '<span class="' + cls + '">' + content + '</span>';
}

function buildSvg(state, results) {
  const inverterCount = state.inverterCount;
  const batteryCount = state.batteryCount;
  const isFrontStacking = state.batteryLayoutMode === "front_stacking";
  const stackingColumns = isFrontStacking ? Math.ceil(batteryCount / 2) : batteryCount;
  const diagramWidth = Math.max(860, Math.max(inverterCount, stackingColumns) * 170 + 240);
  const isEforceLayout = state.batteryModel === "eforce";
  const diagramHeight = isFrontStacking ? 610 : 470;
  const inverterY = 90;
  const batteryTopY = isFrontStacking ? 250 : diagramHeight - 170;
  const batteryBottomY = isFrontStacking ? 430 : batteryTopY;
  const selectedCurrent = (INVERTER_MODELS[state.inverterModel] || {}).current || 250;

  const batteryPositions = results.batteryNames.map((name, i) => {
    if (!isFrontStacking) {
      return {
        name,
        x: batteryCount === 1 ? diagramWidth / 2 - 64 : 120 + i * ((diagramWidth - 240) / Math.max(1, batteryCount - 1)) - 64,
        y: batteryTopY,
      };
    }
    const columnIndex = Math.floor(i / 2);
    const rowIndex = i % 2;
    const columnCount = Math.max(1, Math.ceil(batteryCount / 2));
    return {
      name,
      x: columnCount === 1 ? diagramWidth / 2 - 64 : 120 + columnIndex * ((diagramWidth - 240) / Math.max(1, columnCount - 1)) - 64,
      y: rowIndex === 0 ? batteryTopY : batteryBottomY,
    };
  });

  const inverterAnchorCenters = results.inverterNames.map((_, i) => {
    const connectedBatteries = results.batteryNames
      .map((__, batteryIndex) => batteryIndex)
      .filter((batteryIndex) => ((results.directFlows[i] || [])[batteryIndex] || 0) > 0);
    return connectedBatteries.length > 0
      ? getGroupBoundsCenter(connectedBatteries, batteryPositions)
      : (inverterCount === 1 ? diagramWidth / 2 : 120 + i * ((diagramWidth - 240) / Math.max(1, inverterCount - 1)));
  });

  const inverterPositions = inverterAnchorCenters.map((centerX, i) => {
    const sameCluster = inverterAnchorCenters
      .map((value, index) => ({ value, index }))
      .filter((entry) => Math.abs(entry.value - centerX) < 1)
      .sort((a, b) => a.index - b.index);
    const clusterIndex = sameCluster.findIndex((entry) => entry.index === i);
    const offset = sameCluster.length > 1 ? (clusterIndex - (sameCluster.length - 1) / 2) * 120 : 0;
    return { name: results.inverterNames[i], x: centerX - 45 + offset, y: inverterY };
  });

  const frontStackColumnCount = getFrontStackColumnCount(batteryCount);
  const isFrontStackShared = isFrontStacking && results.globalShareMode === "share";
  const isFrontStackDoNotShare = isFrontStacking && results.globalShareMode === "do_not_share";

  let svg = '<svg viewBox="0 0 ' + diagramWidth + ' ' + diagramHeight + '" style="width:100%;height:auto" role="img" aria-label="Electrical behavior diagram">';
  svg += '<text x="' + (diagramWidth / 2) + '" y="30" text-anchor="middle" style="fill:#475569;font-size:14px;font-weight:700">Inverters</text>';
  svg += '<text x="' + (diagramWidth / 2) + '" y="' + (diagramHeight - 18) + '" text-anchor="middle" style="fill:#475569;font-size:14px;font-weight:700">Batteries</text>';

  // Power conductors inverter -> battery (or through the busbar when active).
  const isExternalBusbarMode = state.busbarType === "busbar" && !isFrontStacking;
  const isEflexBusbarMode = state.busbarType === "eflex_busbar" && !isFrontStacking;
  const isBusbarMode = isExternalBusbarMode || isEflexBusbarMode;
  const totalInverterCurrentA = inverterCount * selectedCurrent;
  const externalBusbarRatingA = Math.round(totalInverterCurrentA * 1.2);
  const eflexBusbarRatingA = EFLEX_BUSBAR_RATING;

  // Highlight the cable that lands on each primary battery — the one that
  // carries the inverter feed into its comm group. Drawn green.
  const primaryBatterySet = new Set();
  (results.communicationGroups || []).forEach((grp) => {
    if (grp && grp.batteries && grp.batteries.length > 0) primaryBatterySet.add(grp.batteries[0]);
  });
  if (primaryBatterySet.size === 0) {
    for (let j = 0; j < batteryCount; j += 1) {
      if (j === 0 || !state.batteryLinks[j - 1]) primaryBatterySet.add(j);
    }
  }
  const isPrimaryTarget = (j) => primaryBatterySet.has(j);
  const COMM_PRIMARY_COLOR = "#16a34a";  // green dashed — primary battery to inverter
  const COMM_DEFAULT_COLOR = "#2563eb";   // blue dashed — every other comm cable
  const commColorFor = (j) => isPrimaryTarget(j) ? COMM_PRIMARY_COLOR : COMM_DEFAULT_COLOR;
  if (isExternalBusbarMode) {
    // Regular Busbar: one bar per effective battery group (each isolated group
    // gets its own busbar segment when in do-not-share). Each segment's rating
    // is 1.2 × the sum of its inverters' current.
    const busbarY = inverterY + 130;
    const busbarH = 22;
    const groupsForBus = (results.batteryGroups && results.batteryGroups.length > 0) ? results.batteryGroups : [results.batteryNames.map((_, j) => j)];
    groupsForBus.forEach((group) => {
      if (!group || group.length === 0) return;
      const groupInverters = [];
      for (let i = 0; i < results.inverterNames.length; i++) {
        if (group.some(b => (state.connections[i] || [])[b])) groupInverters.push(i);
      }
      const groupInverterCurrent = groupInverters.length * selectedCurrent;
      const busbarRating = Math.round(groupInverterCurrent * 1.2);
      const overloaded = groupInverterCurrent > busbarRating + 1e-9;
      const firstPos = batteryPositions[group[0]];
      const lastPos = batteryPositions[group[group.length - 1]];
      const busbarLeft = firstPos.x;
      const busbarRight = lastPos.x + 128;
      const busbarW = busbarRight - busbarLeft;
      const stroke = overloaded ? "#dc2626" : "#475569";
      const fill = overloaded ? "#fee2e2" : "#e2e8f0";
      svg += '<rect x="' + busbarLeft + '" y="' + busbarY + '" width="' + busbarW + '" height="' + busbarH + '" rx="4" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2"/>';
      svg += '<text x="' + (busbarLeft + 8) + '" y="' + (busbarY + 14) + '" style="fill:#0f172a;font-size:11px;font-weight:700">Busbar</text>';
      svg += '<text x="' + (busbarRight - 8) + '" y="' + (busbarY + 14) + '" text-anchor="end" style="fill:#0f172a;font-size:11px;font-weight:700">' + formatAmps(groupInverterCurrent) + ' A / ' + busbarRating + ' A rating</text>';
      // Inverter drops for this group's inverters only.
      groupInverters.forEach((i) => {
        let invTotal = 0;
        group.forEach((j) => {
          if ((state.connections[i] || [])[j]) invTotal += (results.directFlows[i] || [])[j] || 0;
        });
        if (invTotal <= 0) return;
        const from = inverterPositions[i];
        const dropX = from.x + 45;
        svg += '<line x1="' + dropX + '" y1="' + (from.y + 56) + '" x2="' + dropX + '" y2="' + busbarY + '" stroke="#000" stroke-width="2.5"/>';
        svg += '<text x="' + (dropX + 6) + '" y="' + ((from.y + 56 + busbarY) / 2 + 4) + '" style="fill:#64748b;font-size:11px">' + formatAmps(invTotal) + 'A</text>';
      });
      // Busbar -> battery drops for this group.
      group.forEach((j) => {
        const to = batteryPositions[j];
        const battery = results.batteryStatus[j];
        if (!battery || battery.inactive) return;
        const dropX = to.x + 64;
        const load = battery.finalLoad || 0;
        svg += '<line x1="' + dropX + '" y1="' + (busbarY + busbarH) + '" x2="' + dropX + '" y2="' + to.y + '" stroke="#000" stroke-width="2.5"/>';
        if (load > 0) svg += '<text x="' + (dropX + 6) + '" y="' + ((busbarY + busbarH + to.y) / 2 + 4) + '" style="fill:#64748b;font-size:11px">' + formatAmps(load) + 'A</text>';
      });
    });
  } else if (isEflexBusbarMode && batteryPositions.length > 0) {
    // eFlex Busbar: one band PER effective battery group. In share mode there
    // is one big group → one band spanning all batteries. In do-not-share
    // mode each inverter's batteries form their own group → one band each.
    const bandH = 26;
    const groupsForBus = (results.batteryGroups && results.batteryGroups.length > 0) ? results.batteryGroups : [results.batteryNames.map((_, j) => j)];
    groupsForBus.forEach((group) => {
      if (!group || group.length === 0) return;
      const groupInverters = [];
      for (let i = 0; i < results.inverterNames.length; i++) {
        if (group.some(b => (state.connections[i] || [])[b])) groupInverters.push(i);
      }
      const groupInverterCurrent = groupInverters.length * selectedCurrent;
      const overloaded = groupInverterCurrent > eflexBusbarRatingA + 1e-9;
      const firstPos = batteryPositions[group[0]];
      const lastPos = batteryPositions[group[group.length - 1]];
      const bandLeft = firstPos.x;
      const bandRight = lastPos.x + 128;
      const bandY = firstPos.y;
      const stroke = overloaded ? "#dc2626" : "#475569";
      const fill = overloaded ? "#fee2e2" : "#cbd5e1";
      svg += '<rect x="' + bandLeft + '" y="' + bandY + '" width="' + (bandRight - bandLeft) + '" height="' + bandH + '" rx="6" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2"/>';
      svg += '<text x="' + (bandLeft + 10) + '" y="' + (bandY + 11) + '" style="fill:#0f172a;font-size:11px;font-weight:700">eFlex Busbar</text>';
      svg += '<text x="' + (bandLeft + 10) + '" y="' + (bandY + 22) + '" style="fill:#475569;font-size:9px">' + eflexBusbarRatingA + ' A</text>';
      svg += '<text x="' + (bandRight - 10) + '" y="' + (bandY + 11) + '" text-anchor="end" style="fill:#0f172a;font-size:11px;font-weight:700">' + formatAmps(groupInverterCurrent) + ' A</text>';
      svg += '<text x="' + (bandRight - 10) + '" y="' + (bandY + 22) + '" text-anchor="end" style="fill:#0f172a;font-size:9px;font-weight:700">at bus</text>';
      // Inverter drops for this group's inverters only.
      groupInverters.forEach((i) => {
        let invTotal = 0;
        group.forEach((j) => {
          if ((state.connections[i] || [])[j]) invTotal += (results.directFlows[i] || [])[j] || 0;
        });
        if (invTotal <= 0) return;
        const from = inverterPositions[i];
        const dropX = from.x + 45;
        svg += '<line x1="' + dropX + '" y1="' + (from.y + 56) + '" x2="' + dropX + '" y2="' + bandY + '" stroke="#000" stroke-width="2.5"/>';
        svg += '<text x="' + (dropX + 6) + '" y="' + ((from.y + 56 + bandY) / 2 + 4) + '" style="fill:#64748b;font-size:11px">' + formatAmps(invTotal) + 'A</text>';
      });
      // Battery columns sit directly under the band — no per-battery drop line needed.
    });
  } else {
    results.inverterNames.forEach((inv, i) => {
      results.batteryNames.forEach((bat, j) => {
        if (!(state.connections[i] || [])[j]) return;
        const current = results.directFlows[i][j];
        if (current <= 0) return;
        const from = inverterPositions[i];
        const to = batteryPositions[j];
        svg += '<line x1="' + (from.x + 45) + '" y1="' + (from.y + 56) + '" x2="' + (to.x + 64) + '" y2="' + to.y + '" stroke="#000" stroke-width="2.5"/>';
        svg += '<text x="' + ((from.x + to.x) / 2 + 10) + '" y="' + ((from.y + to.y) / 2 + 6) + '" text-anchor="middle" style="fill:#64748b;font-size:11px">' + formatAmps(current) + 'A</text>';
      });
    });
  }

  // Communication: standard (non-front-stack)
  if (!isFrontStackShared && !isFrontStackDoNotShare) {
    results.autoCommConnections.forEach((row, i) => {
      row.forEach((enabled, j) => {
        if (!enabled) return;
        const from = inverterPositions[i];
        const to = batteryPositions[j];
        // Green dashed when this is the primary battery for its comm group; blue dashed otherwise.
        svg += '<line x1="' + (from.x + 70) + '" y1="' + (from.y + 62) + '" x2="' + (to.x + 90) + '" y2="' + (to.y - 6) + '" stroke="' + commColorFor(j) + '" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
    });
    results.autoCommBatteryLinks.forEach((enabled, i) => {
      if (!enabled) return;
      const a = batteryPositions[i];
      const b = batteryPositions[i + 1];
      svg += '<line x1="' + (a.x + 90) + '" y1="' + (a.y + 90) + '" x2="' + (b.x + 90) + '" y2="' + (a.y + 90) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    });
  }

  // Front-stack shared comm lines
  if (isFrontStackShared && inverterPositions[0] && batteryPositions[0]) {
    const inv0 = inverterPositions[0];
    const bat0 = batteryPositions[0];
    // Battery 0 is the primary in front-stack shared mode → green dashed.
    svg += '<line x1="' + (inv0.x + 70) + '" y1="' + (inv0.y + 62) + '" x2="' + (bat0.x + 90) + '" y2="' + (bat0.y - 6) + '" stroke="' + commColorFor(0) + '" stroke-width="1.5" stroke-dasharray="6 5"/>';
  }
  if (isFrontStackShared) {
    // Diagonal comm lines: top of column N -> bottom of column N-1
    for (let offset = 0; offset < Math.max(0, frontStackColumnCount - 1); offset += 1) {
      const fromColumn = frontStackColumnCount - 1 - offset;
      const toColumn = fromColumn - 1;
      const fromTopIndex = getTopBatteryIndexForColumn(fromColumn);
      const toBottomIndex = getBottomBatteryIndexForColumn(toColumn, batteryCount);
      if (fromTopIndex >= batteryCount || toBottomIndex === -1) continue;
      const from = batteryPositions[fromTopIndex];
      const to = batteryPositions[toBottomIndex];
      svg += '<line x1="' + (from.x + 28) + '" y1="' + (from.y + 90) + '" x2="' + (to.x + 100) + '" y2="' + (to.y + 18) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    }
    // Vertical comm lines: within each column, top battery -> bottom battery (closes the daisy chain)
    for (let column = 0; column < frontStackColumnCount; column += 1) {
      const topIndex = getTopBatteryIndexForColumn(column);
      const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
      if (bottomIndex === -1) continue;
      const top = batteryPositions[topIndex];
      const bottom = batteryPositions[bottomIndex];
      svg += '<line x1="' + (top.x + 94) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 94) + '" y2="' + (bottom.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
    }
  }

  // Front-stack do-not-share comm
  if (isFrontStackDoNotShare) {
    results.batteryGroups.forEach((group, groupIndex) => {
      const topIndices = group.filter((batteryIndex) => batteryIndex % 2 === 0);
      const touchedInverter = results.inverterNames.findIndex((_, inv) =>
        group.some((batteryIndex) => ((results.directFlows[inv] || [])[batteryIndex] || 0) > 0)
      );
      if (touchedInverter !== -1 && topIndices.length > 0) {
        const from = inverterPositions[touchedInverter];
        const primaryBatteryIndex = topIndices[0];
        const to = batteryPositions[primaryBatteryIndex];
        // topIndices[0] is the primary of the do-not-share group → green dashed.
        svg += '<line x1="' + (from.x + 70) + '" y1="' + (from.y + 62) + '" x2="' + (to.x + 90) + '" y2="' + (to.y - 6) + '" stroke="' + commColorFor(primaryBatteryIndex) + '" stroke-width="1.5" stroke-dasharray="6 5"/>';
      }
      topIndices.forEach((topIndex) => {
        const bottomIndex = topIndex + 1;
        if (group.indexOf(bottomIndex) === -1) return;
        const top = batteryPositions[topIndex];
        const bottom = batteryPositions[bottomIndex];
        svg += '<line x1="' + (top.x + 94) + '" y1="' + (top.y + 102) + '" x2="' + (bottom.x + 94) + '" y2="' + (bottom.y - 6) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
      topIndices.slice(1).forEach((topIndex) => {
        const previousBottomIndex = topIndex - 1;
        if (group.indexOf(previousBottomIndex) === -1) return;
        const from = batteryPositions[topIndex];
        const to = batteryPositions[previousBottomIndex];
        svg += '<line x1="' + (from.x + 28) + '" y1="' + (from.y + 90) + '" x2="' + (to.x + 100) + '" y2="' + (to.y + 18) + '" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6 5"/>';
      });
    });
  }

  // Battery-to-battery power conductors. Drawn generically from the solved edge
  // list, so it handles every layout AND arbitrary user-added conductors
  // (any battery to any other). Skipped in busbar mode (current routes through
  // the busbar instead). Lines run centre-to-centre and are drawn before the
  // battery boxes, so they read as cables joining the boxes. The label shows the
  // solved current magnitude on that conductor.
  if (!isBusbarMode) {
    (results.edges || []).forEach((e, k) => {
      const a = batteryPositions[e[0]];
      const b = batteryPositions[e[1]];
      if (!a || !b) return;
      const current = Math.abs((results.edgeCurrents || [])[k] || 0);
      const ax = a.x + 64, ay = a.y + 50;
      const bx = b.x + 64, by = b.y + 50;
      svg += '<line x1="' + ax + '" y1="' + ay + '" x2="' + bx + '" y2="' + by + '" stroke="#000" stroke-width="3"/>';
      const mx = (ax + bx) / 2, my = (ay + by) / 2;
      svg += '<text x="' + mx + '" y="' + (my - 6) + '" text-anchor="middle" style="fill:#64748b;font-size:11px;paint-order:stroke;stroke:#fff;stroke-width:3px">' + formatAmps(current) + 'A</text>';
    });
  }

  // Inverter-to-inverter mustard comm lines
  results.inverterNames.forEach((_, i) => {
    results.inverterNames.forEach((__, j) => {
      if (j <= i) return;
      const a = inverterPositions[i];
      const b = inverterPositions[j];
      svg += '<line x1="' + (a.x + 45) + '" y1="' + (a.y + 28) + '" x2="' + (b.x + 45) + '" y2="' + (b.y + 28) + '" stroke="#d4a017" stroke-width="2" stroke-dasharray="6 6"/>';
    });
  });

  // Inverter boxes
  inverterPositions.forEach((item, idx) => {
    svg += '<g>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y - 6) + '" text-anchor="middle" style="fill:#64748b;font-size:10px;font-weight:700">' + (idx === 0 ? "Primary" : "Secondary") + '</text>';
    svg += '<rect x="' + item.x + '" y="' + item.y + '" width="90" height="56" rx="10" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y + 24) + '" text-anchor="middle" style="fill:#0f172a;font-size:13px;font-weight:700">' + escapeHtml(item.name) + '</text>';
    svg += '<text x="' + (item.x + 45) + '" y="' + (item.y + 42) + '" text-anchor="middle" style="fill:#475569;font-size:11px">' + formatAmps(selectedCurrent) + 'A DC</text>';
    svg += '</g>';
  });

  // Battery boxes
  const isEforceMode = state.batteryModel === 'eforce';
  // Use the eWay-band + module-block visual for every battery, in every layout.
  const useStackedVisual = true;
  batteryPositions.forEach((item, i) => {
    const status = results.batteryStatus[i];
    const active = !status.inactive;
    const commGroup = results.communicationGroups.find((g) => g.batteries.indexOf(i) !== -1);
    const isPrimaryBattery = commGroup ? commGroup.batteries[0] === i : (i === 0 || !state.batteryLinks[i - 1]);
    const opacity = active ? 1 : 0.35;
    const overloadStroke = status.overloaded ? "#dc2626" : "#65a30d";
    const overloadFill = status.overloaded ? "#fee2e2" : "#ecfccb";
    const stackSize = isEforceMode ? Math.max(1, Math.min(3, (state.eforceStackSizes || [])[i] || 1)) : 1;
    const batteryMaxA = getBatteryMaxCurrent(i, state.batteryModel, state.eforceStackSizes);
    svg += '<g opacity="' + opacity + '">';
    const primaryY = useStackedVisual ? (isEforceMode ? item.y + 134 : item.y + 118) : item.y + 118;
    svg += '<text x="' + (item.x + 64) + '" y="' + primaryY + '" text-anchor="middle" style="fill:#64748b;font-size:10px;font-weight:700">' + (isPrimaryBattery ? "Primary" : "Secondary") + '</text>';

    if (useStackedVisual) {
      // eWay band at the top — separate visual element, slightly darker, with name + node load.
      // Skipped in busbar modes (the battery connects to a shared bus instead of having its own eWay).
      const ewayX = item.x;
      const ewayY = item.y;
      const ewayW = 128;
      const ewayH = 26;
      if (!isBusbarMode) {
        svg += '<rect x="' + ewayX + '" y="' + ewayY + '" width="' + ewayW + '" height="' + ewayH + '" rx="6" fill="#cbd5e1" stroke="' + overloadStroke + '" stroke-width="2"/>';
        svg += '<text x="' + (ewayX + 8) + '" y="' + (ewayY + 11) + '" style="fill:#0f172a;font-size:10px;font-weight:700">' + escapeHtml(item.name) + '</text>';
        svg += '<text x="' + (ewayX + 8) + '" y="' + (ewayY + 22) + '" style="fill:#475569;font-size:9px">' + escapeHtml(status.config.label) + ' · ' + formatAmps(status.config.nodeRating) + 'A</text>';
        svg += '<text x="' + (ewayX + ewayW - 8) + '" y="' + (ewayY + 11) + '" text-anchor="end" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.incomingNodeCurrent) + 'A</text>';
        svg += '<text x="' + (ewayX + ewayW - 8) + '" y="' + (ewayY + 22) + '" text-anchor="end" style="fill:#0f172a;font-size:9px;font-weight:700">at node</text>';
      } else if (isExternalBusbarMode) {
        // External Busbar mode: no band above each battery, so put the name label there.
        svg += '<text x="' + (ewayX + 64) + '" y="' + (ewayY + 14) + '" text-anchor="middle" style="fill:#0f172a;font-size:11px;font-weight:700">' + escapeHtml(item.name) + '</text>';
      }
      // eFlex Busbar mode: the long band sits at y+0..26 and shows its own info; the
      // per-battery name will appear inside the green module (handled in the module
      // label section below).

      // Module section: 1 block for eBoost, 1–3 blocks for eForce stacks.
      const modulesAreaY = item.y + ewayH + 4;
      const modulesAreaH = 102 - ewayH - 4; // 72h
      const moduleGap = 2;
      const totalGap = moduleGap * (stackSize - 1);
      const moduleH = Math.max(12, Math.floor((modulesAreaH - totalGap) / stackSize));
      for (let m = 0; m < stackSize; m += 1) {
        const modY = modulesAreaY + m * (moduleH + moduleGap);
        svg += '<rect x="' + (item.x + 6) + '" y="' + modY + '" width="116" height="' + moduleH + '" rx="4" fill="' + overloadFill + '" stroke="' + overloadStroke + '" stroke-width="1.5"/>';
        // Lego-style studs along the top of each module
        const studCount = 4;
        for (let s = 0; s < studCount; s += 1) {
          const studX = item.x + 22 + s * 24;
          svg += '<circle cx="' + studX + '" cy="' + modY + '" r="2.5" fill="' + overloadStroke + '" opacity="0.6"/>';
        }
        // Module label (and, for eBoost, the absorbed/max line beneath it inside the same module).
        if (moduleH >= 16) {
          if (isEforceMode) {
            const moduleLabel = 'M' + (stackSize - m) + ' · 9.6 kWh';
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 + 3) + '" text-anchor="middle" style="fill:#475569;font-size:11px;font-weight:700">' + moduleLabel + '</text>';
          } else {
            // eBoost / eFlex Max: model label centered, current/max underneath.
            const modelLabel = state.batteryModel === 'eflex_max' ? 'eFlex Max' : 'eBoost';
            // In eFlex Busbar mode the long band hides the per-battery name, so show it here.
            if (isEflexBusbarMode) {
              svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 - 14) + '" text-anchor="middle" style="fill:#0f172a;font-size:11px;font-weight:700">' + escapeHtml(item.name) + '</text>';
            }
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 - 1) + '" text-anchor="middle" style="fill:#475569;font-size:11px;font-weight:700">' + modelLabel + '</text>';
            svg += '<text x="' + (item.x + 64) + '" y="' + (modY + moduleH / 2 + 13) + '" text-anchor="middle" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.finalLoad) + ' / ' + formatAmps(batteryMaxA) + 'A max</text>';
          }
        }
      }
      // Per-stack load + max below modules — eForce only (eBoost shows it inside the module above).
      if (isEforceMode) {
        svg += '<text x="' + (item.x + 64) + '" y="' + (item.y + 118) + '" text-anchor="middle" style="fill:#0f172a;font-size:10px;font-weight:700">' + formatAmps(status.finalLoad) + ' / ' + formatAmps(batteryMaxA) + 'A max</text>';
      }
    }
    svg += '</g>';
  });

  svg += '</svg>';

  const legend = '<div class="legend">' +
    '<div class="legendItem"><div class="swatchBlack"></div><span>Power cable</span></div>' +
    '<div class="legendItem"><div class="swatchBlue"></div><span>Battery to battery communication</span></div>' +
    '<div class="legendItem"><div class="swatchGreen"></div><span>Primary battery to inverter communication</span></div>' +
    '<div class="legendItem"><div class="swatchMustard"></div><span>Inverter-to-inverter communication</span></div>' +
    '</div>';
  return svg + legend;
}

function buildStructuredObservations(results) {
  const topology = [];
  const groups = [];
  const communication = [];
  const general = results.inverterLimitWarnings.slice();
  results.observations.forEach((line) => {
    if (line.indexOf("Share Battery setup") !== -1 || line.indexOf("Do Not Share setup") !== -1) topology.push(line);
    else if (/^Group \d+/.test(line)) groups.push(line);
    else if (line.indexOf("talks to the inverter") !== -1) communication.push(line);
    else general.push(line);
  });
  let html = '<div class="obsContainer">';
  if (topology.length > 0) {
    html += '<ul class="obsList">' + topology.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (groups.length > 0) {
    html += '<ul class="' + (topology.length ? 'obsListSpaced' : 'obsList') + '">' + groups.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (communication.length > 0) {
    html += '<ul class="obsCommList">' + communication.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (results.advisories.length > 0) {
    html += '<ul class="obsListSpaced">' + results.advisories.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  if (general.length > 0) {
    html += '<ul class="obsListSpaced">' + general.map((l) => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>';
  }
  html += '</div>';
  return html;
}

function buildSetupPanel(state, results) {
  const inv = state.inverterCount, bat = state.batteryCount;
  const model = INVERTER_MODELS[state.inverterModel];
  const bridgedNote = model.bridgedPorts
    ? "This inverter model treats its two battery ports as internally bridged."
    : "This inverter model does not bridge separate battery ports.";

  let html = '';
  html += '<div class="panel">';
  html += '<div class="panelHeader">System setup</div>';
  html += '<div class="setupBody">';

  // Wizard cards — guided step-by-step configuration.
  const wizardSteps = getWizardSteps();
  wizardSteps.forEach((step, idx) => {
    const status = getWizardStatus(step.key);
    html += '<div class="wizardStep ' + status + '" data-step="' + step.key + '">';
    html += '<div class="wizardStepHeader">';
    html += '<div class="wizardStepTitle"><span class="wizardStepNum">' + (status === 'completed' ? '\u2713' : (idx + 1)) + '</span>' + escapeHtml(step.title) + '</div>';
    if (status === 'completed') {
      html += '<button class="wizardEditBtn" data-action="editStep" data-step="' + step.key + '">Edit</button>';
    }
    html += '</div>';

    if (status === 'pending') {
      html += '<div class="wizardPendingMsg">Complete the previous step to continue.</div>';
      html += '</div>';
      return;
    }

    // Step-specific body — completed shows summary; active shows controls + Continue button.
    if (step.key === 'inverter') {
      const invModel = INVERTER_MODELS[state.inverterModel];
      if (status === 'completed') {
        html += '<div class="wizardStepSummary">' + escapeHtml(invModel.label) + ' \u00d7 ' + state.inverterCount + ' \u2014 ' + invModel.current + ' A per port' + (invModel.ports > 1 ? ' (' + invModel.ports + ' ports each)' : '') + '</div>';
      } else {
        html += '<div class="wizardStepBody">';
        html += '<label class="subFieldLabel">Inverter model</label>';
        html += '<select class="select" data-action="setInverterModel">';
        ['solo_6_5kw', 'envy_8kw', 'envy_10kw', 'envy_duo_21_envy_12kw'].forEach((key) => {
          const m = INVERTER_MODELS[key];
          const sel = state.inverterModel === key ? ' selected' : '';
          html += '<option value="' + key + '"' + sel + '>' + escapeHtml(m.label) + ' \u2014 ' + m.current + ' A' + (m.ports > 1 ? ' \u00d7 ' + m.ports + ' ports' : '') + '</option>';
        });
        html += '</select>';
        html += '<div class="helper">' + escapeHtml(bridgedNote) + '</div>';
        html += '<label class="subFieldLabel" style="margin-top:10px">Number of inverters</label>';
        html += '<div class="row">';
        html += '<button class="smallButton" data-action="invMinus">\u2212</button>';
        html += '<input class="input" data-action="invInput" value="' + inv + '"/>';
        html += '<button class="smallButton" data-action="invPlus">+</button>';
        html += '</div>';
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="inverter">Continue \u2192</button></div>';
        html += '</div>';
      }
    } else if (step.key === 'battery') {
      if (status === 'completed') {
        const modelLabel = state.batteryModel === 'eboost' ? 'eBoost' : (state.batteryModel === 'eforce' ? 'eForce' : 'eFlex Max');
        const countLabel = state.batteryModel === 'eforce'
          ? ((state.eforceModuleCount || 1) + ' module' + ((state.eforceModuleCount || 1) === 1 ? '' : 's') + ' across ' + state.batteryCount + ' stack' + (state.batteryCount === 1 ? '' : 's'))
          : (state.batteryCount + ' \u00d7 ' + modelLabel);
        html += '<div class="wizardStepSummary">' + escapeHtml(countLabel) + (state.batteryModel === 'eforce' ? '' : '') + '</div>';
      } else {
        html += '<div class="wizardStepBody">';
        html += '<label class="subFieldLabel">Battery model</label>';
        html += '<div class="configButtonRow">';
        html += '<button class="btn' + (state.batteryModel === 'eboost' ? ' active' : '') + '" data-action="setBatteryEboost">eBoost</button>';
        html += '<button class="btn' + (state.batteryModel === 'eforce' ? ' active' : '') + '" data-action="setBatteryEforce">eForce</button>';
        html += '<button class="btn' + (state.batteryModel === 'eflex_max' ? ' active' : '') + '" data-action="setBatteryEflexMax">eFlex Max</button>';
        html += '</div>';
        if (state.batteryModel === 'eforce') {
          const eforceModules = state.eforceModuleCount || 1;
          html += '<label class="subFieldLabel" style="margin-top:10px">Number of eForce modules (1\u201332)</label>';
          html += '<div class="row">';
          html += '<button class="smallButton" data-action="eforceModMinus">\u2212</button>';
          html += '<input class="input" data-action="eforceModInput" value="' + eforceModules + '"/>';
          html += '<button class="smallButton" data-action="eforceModPlus">+</button>';
          html += '</div>';
          html += '<div class="helper">Each module is 9.6 kWh. Stacks are arranged in the next step.</div>';
        } else {
          html += '<label class="subFieldLabel" style="margin-top:10px">Number of batteries</label>';
          html += '<div class="row">';
          html += '<button class="smallButton" data-action="batMinus">\u2212</button>';
          html += '<input class="input" data-action="batInput" value="' + bat + '"/>';
          html += '<button class="smallButton" data-action="batPlus">+</button>';
          html += '</div>';
        }
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="battery">Continue \u2192</button></div>';
        html += '</div>';
      }
    } else if (step.key === 'layout') {
      // eBoost only
      if (status === 'completed') {
        html += '<div class="wizardStepSummary">' + (state.batteryLayoutMode === 'side_by_side' ? 'Side by side' : 'Front stacking') + '</div>';
      } else {
        html += '<div class="wizardStepBody">';
        html += '<div class="configButtonRow">';
        html += '<button class="btn' + (state.batteryLayoutMode === 'side_by_side' ? ' active' : '') + '" data-action="layoutSide">Side by side</button>';
        html += '<button class="btn' + (state.batteryLayoutMode === 'front_stacking' ? ' active' : '') + '" data-action="layoutFront">Front stacking</button>';
        html += '</div>';
        html += '<div class="helper">Layout changes only the drawing. In front stacking, the lower battery in each stack is treated as eWay Lite and is fed from the eWay battery above it.</div>';
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="layout">Continue \u2192</button></div>';
        html += '</div>';
      }
    } else if (step.key === 'stacks') {
      // eForce only
      const eforceModules = state.eforceModuleCount || 1;
      if (status === 'completed') {
        const sizes = (state.eforceStackSizes || []).slice(0, bat);
        const summary = sizes.map((s) => s + '-module').join(' + ');
        html += '<div class="wizardStepSummary">' + escapeHtml(summary) + ' \u00b7 ' + eforceModules + ' modules \u00b7 ' + (eforceModules * EFORCE_MODULE_KWH).toFixed(1) + ' kWh</div>';
      } else {
        html += '<div class="wizardStepBody">';
        html += '<div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">';
        html += '<div style="font-size:12px;color:#475569">' + bat + ' stack' + (bat === 1 ? '' : 's') + ' \u00b7 ' + eforceModules + ' module' + (eforceModules === 1 ? '' : 's') + ' \u00b7 ' + (eforceModules * EFORCE_MODULE_KWH).toFixed(1) + ' kWh total</div>';
        html += '<div style="display:flex;gap:6px">';
        const canSplit = bat < EFORCE_MAX_BATTERY_COUNT && (state.eforceStackSizes || []).some((s) => s > 1);
        html += '<button class="btn" style="padding:4px 10px' + (canSplit ? '' : ';opacity:0.4;cursor:not-allowed') + '" data-action="splitEforceStack"' + (canSplit ? '' : ' disabled') + '>+ Split largest</button>';
        html += '<button class="btn" data-action="autoArrangeStacks">Auto-arrange</button>';
        html += '</div></div>';
        html += '<div class="helper" style="margin-bottom:8px">Click 1/2/3 to override an individual stack.</div>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px">';
        for (let i = 0; i < bat; i += 1) {
          const size = (state.eforceStackSizes || [])[i] || 1;
          const maxA = getEforceStackCurrent(size);
          html += '<div style="display:flex;align-items:center;gap:6px;font-size:12px">';
          html += '<span style="min-width:46px;font-weight:600">B' + (i + 1) + '</span>';
          [1, 2, 3].forEach((n) => {
            const active = size === n ? ' active' : '';
            html += '<button class="btn' + active + '" style="padding:2px 8px;font-size:11px;min-width:0" data-action="eforceStack" data-idx="' + i + '" data-n="' + n + '">' + n + '</button>';
          });
          html += '<span class="helper" style="margin-left:4px">' + maxA + 'A</span>';
          html += '</div>';
        }
        html += '</div>';
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="stacks">Continue \u2192</button></div>';
        html += '</div>';
      }
    } else if (step.key === 'sharing') {
      if (status === 'completed') {
        const sharingLabel = state.configurationMode === 'share' ? 'Share battery' : (state.configurationMode === 'do_not_share' ? 'Do not share battery' : 'No auto-config');
        html += '<div class="wizardStepSummary">' + sharingLabel + '</div>';
      } else {
        const soloInverter = state.inverterModel === 'solo_6_5kw';
        html += '<div class="wizardStepBody">';
        html += '<div class="configButtonRow">';
        html += '<button class="btn' + (state.configurationMode === 'share' ? ' active' : '') + '" data-action="autoShare">Share battery</button>';
        if (!soloInverter) {
          html += '<button class="btn' + (state.configurationMode === 'do_not_share' ? ' active' : '') + '" data-action="autoDoNotShare">Do not share battery</button>';
        }
        html += '</div>';
        html += '<div class="helper">Share battery auto-configures a shared layout using eWay connection points and enables all adjacent battery conductors.</div>';
        if (!soloInverter) {
          html += '<div class="helper">Do not share battery splits batteries into isolated groups per inverter, with battery-to-battery conductors inside each group.</div>';
        } else {
          html += '<div class="helper">The Solo 6.5kW has a single terminal connection, so it only supports a shared battery layout.</div>';
        }
        const sharingPicked = state.configurationMode === 'share' || state.configurationMode === 'do_not_share';
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="sharing"' + (sharingPicked ? '' : ' disabled') + '>Continue \u2192</button></div>';
        html += '</div>';
      }
    } else if (step.key === 'busrail') {
      // eFlex Max only
      if (status === 'completed') {
        const busLabel = state.busbarType === 'busbar' ? 'Busbar (1.2 \u00d7 inverter total)' : (state.busbarType === 'eflex_busbar' ? 'eFlex Busbar (325 A)' : 'No bus rail');
        html += '<div class="wizardStepSummary">' + busLabel + '</div>';
      } else {
        html += '<div class="wizardStepBody">';
        html += '<div class="configButtonRow">';
        html += '<button class="btn' + (state.busbarType === 'none' ? ' active' : '') + '" data-action="busbarNone">No bus rail</button>';
        html += '<button class="btn' + (state.busbarType === 'busbar' ? ' active' : '') + '" data-action="autoBusbar">Busbar</button>';
        html += '<button class="btn' + (state.busbarType === 'eflex_busbar' ? ' active' : '') + '" data-action="autoEflexBusbar">eFlex Busbar (325 A)</button>';
        html += '</div>';
        html += '<div class="helper">eFlex Max has a 2-terminal connection point with no eWay (100 A per battery). Use a bus rail to share inverters across multiple batteries.</div>';
        html += '<div class="wizardContinueRow"><button class="wizardContinue" data-action="continueWizard" data-step="busrail">Continue \u2192</button></div>';
        html += '</div>';
      }
    }
    html += '</div>';
  });

  // Advanced configuration — collapsible at the bottom of the wizard.
  // Manual config
  html += '<details class="section"' + (detailsOpen.manualConfig ? ' open' : '') + ' data-details-key="manualConfig">';
  html += '<summary>Manual Configuration</summary>';

  // Inverter -> battery conductors table
  html += '<details class="section"' + (detailsOpen.manualConductors ? ' open' : '') + ' data-details-key="manualConductors" style="margin-top:8px">';
  html += '<summary>Inverter → Battery conductors</summary>';
  html += '<div class="tableWrap"><table class="tbl">';
  html += '<thead><tr><th></th>';
  results.batteryNames.forEach((b) => { html += '<th>' + escapeHtml(b) + '</th>'; });
  html += '</tr></thead><tbody>';
  results.inverterNames.forEach((iname, i) => {
    const overLimit = ((state.connections[i] || []).filter(Boolean).length || 0) > model.maxPorts;
    const trStyle = overLimit ? ' style="background:#fffbeb"' : '';
    html += '<tr' + trStyle + '><td class="lbl">' + escapeHtml(iname) + '</td>';
    results.batteryNames.forEach((bname, j) => {
      const on = !!(state.connections[i] || [])[j];
      const cls = on ? 'toggleOn' : 'toggleOff';
      const txt = on ? 'Connected' : 'Open';
      html += '<td><button class="' + cls + '" data-action="toggleConn" data-i="' + i + '" data-j="' + j + '">' + txt + '</button></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '</details>';

  // Battery connection points
  html += '<details class="section"' + (detailsOpen.manualBattConn ? ' open' : '') + ' data-details-key="manualBattConn" style="margin-top:8px">';
  html += '<summary>Battery connection points</summary>';
  const isEforce = state.batteryModel === 'eforce';
  results.batteryNames.forEach((name, i) => {
    const appliedType = isEforce ? EFORCE_FIXED_TYPE : getEffectiveBatteryConnectionType(i, state.batteryConnectionTypes[i] || 'three_point_terminal', state.batteryLayoutMode);
    const config = getConnectionPointConfig(appliedType, state.batteryModel);
    const lockedFrontStackLite = !isEforce && isFrontStackBottomBattery(i, state.batteryLayoutMode);
    const lockedEforce = isEforce;
    html += '<div class="bpRow">';
    html += '<div>';
    html += '<div class="bpRowName">' + escapeHtml(name) + '</div>';
    html += '<div class="helper">' + escapeHtml(config.label) + ' • Max ' + formatAmps(config.nodeRating) + ' A node rating • ' + config.terminalCount + ' landing' + (config.terminalCount > 1 ? 's' : '')
      + (lockedFrontStackLite ? ' • front-stack bottom (defaults to eWay Lite — change to validate an installer\u2019s spec)' : '')
      + (lockedEforce ? ' • fixed for eForce' : '')
      + '</div>';
    html += '</div>';
    const disabled = lockedEforce ? ' disabled' : '';
    const opacityStyle = lockedEforce ? ';opacity:0.7' : '';
    html += '<select class="select" style="width:140px' + opacityStyle + '" data-action="changeBatType" data-idx="' + i + '"' + disabled + '>';
    if (lockedEforce) {
      html += '<option value="' + EFORCE_FIXED_TYPE + '" selected>eWay</option>';
    } else {
    [['single_point_terminal', 'eWay Lite'], ['three_point_terminal', 'eWay'], ['six_point_busbar', 'eWay Pro']].forEach((opt) => {
      const sel = appliedType === opt[0] ? ' selected' : '';
      html += '<option value="' + opt[0] + '"' + sel + '>' + opt[1] + '</option>';
    });
    }
    html += '</select>';
    html += '</div>';
  });
  html += '</details>';

  // Battery <-> battery conductors
  html += '<details class="section"' + (detailsOpen.manualBatteryLinks ? ' open' : '') + ' data-details-key="manualBatteryLinks" style="margin-top:8px">';
  html += '<summary>Battery ↔ Battery conductors</summary>';
  if (bat === 1) {
    html += '<div class="helper">Add another battery to enable inter-battery conductors.</div>';
  } else {
    html += '<div class="helper">Each conductor is rated ' + CONDUCTOR_RATING + ' A DC. Toggle the standard conductors, or add a custom one between any two batteries to mirror an installer\u2019s single-line diagram.</div>';
    // Standard (auto-config) conductors, shown with their TRUE physical endpoints.
    for (let i = 0; i < Math.max(0, bat - 1); i += 1) {
      const ep = flatLinkEndpoints(i, state.batteryLayoutMode);
      if (ep[0] < 0 || ep[1] >= bat) continue;
      html += '<div class="bbRow">';
      html += '<div>';
      html += '<div class="bpRowName">' + escapeHtml(results.batteryNames[ep[0]]) + ' ↔ ' + escapeHtml(results.batteryNames[ep[1]]) + '</div>';
      html += '<div class="helper">' + CONDUCTOR_RATING + ' A DC conductor</div>';
      html += '</div>';
      const checked = state.batteryLinks[i] ? ' checked' : '';
      html += '<label class="checkLabel"><input type="checkbox" data-action="toggleLink" data-idx="' + i + '"' + checked + '/> Enable</label>';
      html += '</div>';
    }
    // Custom conductors (arbitrary pairs the user added).
    (state.extraBatteryEdges || []).forEach((e, idx) => {
      if (e[0] >= bat || e[1] >= bat) return;
      html += '<div class="bbRow">';
      html += '<div>';
      html += '<div class="bpRowName">' + escapeHtml(results.batteryNames[e[0]]) + ' ↔ ' + escapeHtml(results.batteryNames[e[1]]) + ' <span style="color:#2E9E6A;font-weight:700">· custom</span></div>';
      html += '<div class="helper">' + CONDUCTOR_RATING + ' A DC conductor</div>';
      html += '</div>';
      html += '<button class="btn" data-action="removeBatteryEdge" data-idx="' + idx + '">Remove</button>';
      html += '</div>';
    });
    // Add-a-conductor control (any battery to any other battery).
    html += '<div class="bbRow" style="border-style:dashed">';
    html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    html += '<span class="helper">Add conductor between</span>';
    html += '<select class="select" id="addEdgeA" style="width:64px">';
    for (let b = 0; b < bat; b += 1) html += '<option value="' + b + '">' + escapeHtml(results.batteryNames[b]) + '</option>';
    html += '</select>';
    html += '<span class="helper">and</span>';
    html += '<select class="select" id="addEdgeB" style="width:64px">';
    for (let b = 0; b < bat; b += 1) html += '<option value="' + b + '"' + (b === 1 ? ' selected' : '') + '>' + escapeHtml(results.batteryNames[b]) + '</option>';
    html += '</select>';
    html += '</div>';
    html += '<button class="btn" data-action="addBatteryEdge">Add</button>';
    html += '</div>';
  }
  html += '</details>';

  html += '</details>'; // Inner manual wrapper
  html += '</details>'; // Outer Advanced configuration

  html += '</div>'; // setupBody
  html += '</div>'; // panel
  return html;
}

function buildResultsPanel(state, results) {
  let totalBatteryDischarge = 0;
  for (let i = 0; i < state.batteryCount; i += 1) totalBatteryDischarge += getBatteryMaxCurrent(i, state.batteryModel, state.eforceStackSizes);
  const overloadBadge = badge(results.risks.length === 0 ? 'good' : 'bad', results.risks.length === 0 ? 'No overload' : 'Overload present');
  const alarmBadge = results.alarms.length > 0 ? badge('bad', 'Alarm present') : '';
  const obsBadge = badge('warn', 'System observations');
  const commBadge = badge(null, 'Communication: Auto');
  const shareBadge = badge(results.globalShareMode === 'share' ? 'good' : 'warn', results.globalShareMode === 'share' ? 'Share Battery' : 'Do Not Share Battery');
  const portsBadge = badge(results.bridgedPorts ? 'warn' : null, results.bridgedPorts ? 'Ports bridged internally' : 'Ports not bridged');
  const modelBadge = badge(null, 'Inverter model: ' + escapeHtml(results.modelLabel));
  const totalBadge = badge(null, 'Total inverter current: ' + formatAmps(results.totalInput) + ' A');
  const dischargeBadge = badge(null, 'Total Battery Discharging Capacity: ' + formatAmps(totalBatteryDischarge) + ' A');

  let html = '';
  html += '<div class="panel" id="pdfResultsPanel">';
  html += '<div class="panelHeader">System result</div>';
  html += '<div class="panelBody">';
  html += '<div class="badgeRow">' + overloadBadge + alarmBadge + obsBadge + commBadge + shareBadge + portsBadge + modelBadge + totalBadge + dischargeBadge + '</div>';

  const showAlerts = results.alarms.length > 0 || results.risks.length > 0 || results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0;
  if (showAlerts) {
    html += '<div style="display:flex;flex-direction:column;gap:16px;margin-top:16px">';
    if (results.alarms.length > 0) {
      html += '<div class="alertRed">';
      html += '<div class="alertTitleRed">🚨 Topology alarm</div>';
      html += '<div class="alertList red">';
      results.alarms.forEach((a) => { html += '<div>• ' + escapeHtml(a) + '</div>'; });
      html += '</div></div>';
    }
    const suggestion = computeBatterySuggestion();
    if (results.risks.length > 0 || suggestion) {
      html += '<div class="alertRed">';
      html += '<div class="alertTitleRed">🔴 Electrical risks</div>';
      if (results.risks.length > 0) {
        html += '<div class="alertList red">';
        results.risks.forEach((r) => { html += '<div>• ' + escapeHtml(r) + '</div>'; });
        html += '</div>';
      }
      if (suggestion) {
        const unit = suggestion.additional === 1 ? suggestion.unitSingle : suggestion.unitPlural;
        const action = 'Add ' + suggestion.additional + ' ' + unit;
        html += '<div class="smartSuggestion">';
        html += '<div class="msg">✨ Total inverter current (' + formatAmps(suggestion.totalInvCurrent) + ' A) exceeds total battery capacity (' + formatAmps(suggestion.totalBatCapacity) + ' A). ' + action + ' (new total: ' + suggestion.newTotal + ' ' + suggestion.unitPlural + ') to make the system compliant.</div>';
        html += '<button class="applyBtn" data-action="applyBatterySuggestion" data-total="' + suggestion.newTotal + '">' + action + '</button>';
        html += '</div>';
      }
      html += '</div>';
    }
    if (results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0) {
      html += '<div class="alertYellow">';
      html += '<div class="alertTitleYellow">🟡 System observations</div>';
      html += buildStructuredObservations(results);
      html += '</div>';
    }
    html += '</div>';
  }

  // Battery cards
  html += '<div class="cards" style="margin-top:16px">';
  results.batteryStatus.forEach((status, idx) => {
    const batteryMax = status.batteryMax || getBatteryMaxCurrent(idx, state.batteryModel, state.eforceStackSizes);
    const percent = Math.min(100, (status.finalLoad / Math.max(1, batteryMax)) * 100);
    const cardCls = status.overloaded ? 'cardRed' : status.inactive ? 'cardYellow' : 'card';
    const statusBadge = badge(status.overloaded ? 'bad' : status.inactive ? 'warn' : 'good', status.overloaded ? 'Overloaded' : status.inactive ? 'Idle' : 'Within limit');
    const fillColor = status.overloaded ? '#ef4444' : status.inactive ? '#eab308' : '#0f172a';
    const stackInfo = state.batteryModel === 'eforce' ? ' • ' + (state.eforceStackSizes[idx] || 1) + '× 9.6kWh' : '';
    html += '<div class="' + cardCls + '">';
    html += '<div class="cardHeader"><div class="cardName">' + escapeHtml(status.name) + escapeHtml(stackInfo) + '</div>' + statusBadge + '</div>';
    html += '<div class="cardLine">Connection point: ' + escapeHtml(status.config.label) + '</div>';
    html += '<div class="cardLine">Incoming current at node: ' + formatAmps(status.incomingNodeCurrent) + ' A</div>';
    html += '<div class="cardLine">Max Discharge: ' + formatAmps(batteryMax) + 'A</div>';
    html += '<div class="cardSmall">Power landings used: ' + status.totalConnectionPointsUsed + ' / ' + status.config.terminalCount + '</div>';
    html += '<div class="progress"><div style="width:' + percent + '%;height:100%;background:' + fillColor + '"></div></div>';
    html += '</div>';
  });
  html += '</div>';

  html += '</div></div>';
  return html;
}

function downloadReportPdf() {
  // Build the PDF using jsPDF (text + image placement) and html2canvas
  // (rasterize HTML to images). Both are loaded from CDN as standalone
  // scripts in the page <head>.
  const figureNode = document.getElementById('pdfFigurePanel');
  const resultsNode = document.getElementById('pdfResultsPanel');
  if (!figureNode || !resultsNode) return;
  const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  const html2canvasFn = window.html2canvas;
  if (!jsPDFCtor || !html2canvasFn) {
    window.print();
    return;
  }

  const pill = document.createElement('div');
  pill.style.cssText = 'position:fixed;top:14px;right:18px;background:#0f172a;color:#ffffff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:99999;box-shadow:0 4px 12px rgba(15,23,42,0.25);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;';
  pill.textContent = 'Generating PDF…';
  document.body.appendChild(pill);

  const pdf = new jsPDFCtor({ unit: 'pt', format: 'letter', orientation: 'portrait' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 36;
  const usableW = pageW - 2 * margin;
  const now = new Date();
  let y = margin;

  function done() { pdf.save('wiring_validator_' + now.toISOString().slice(0, 10) + '.pdf'); pill.remove(); }
  function abort(err) { console.error('PDF generation failed:', err); pill.remove(); window.print(); }

  // Title + date.
  pdf.setFontSize(14);
  pdf.setFont(undefined, 'bold');
  pdf.text('Wiring validator report', margin, y + 12);
  y += 20;
  pdf.setFontSize(8);
  pdf.setFont(undefined, 'normal');
  pdf.setTextColor(110);
  pdf.text('Generated ' + now.toLocaleString() + ' — Theoretical worst-case analysis at maximum rated current. Engineer stamp required before installation.', margin, y + 7, { maxWidth: usableW });
  y += 22;
  pdf.setTextColor(0);
  pdf.setFontSize(10);
  pdf.setFont(undefined, 'bold');
  pdf.text('Illustrative figure', margin, y + 8);
  y += 14;

  // Capture the figure panel (entire DOM, not just the SVG) via html2canvas.
  // This is the most reliable path because we know html2canvas handles HTML
  // wrappers correctly, and the SVG inside renders via the browser's normal
  // pipeline before capture.
  html2canvasFn(figureNode, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
    backgroundColor: '#ffffff',
  }).then(function (fcanvas) {
    const fDataUrl = fcanvas.toDataURL('image/png');
    const fAspect = fcanvas.height / fcanvas.width;
    // Reserve roughly half the page for the figure so the results panel has room below.
    const remaining = pageH - margin - y;
    const figMaxH = remaining * 0.55;
    let fW = usableW;
    let fH = fW * fAspect;
    if (fH > figMaxH) { fH = figMaxH; fW = fH / fAspect; }
    pdf.addImage(fDataUrl, 'PNG', margin, y, fW, fH);
    y += fH + 16;

    return html2canvasFn(resultsNode, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: '#ffffff',
    });
  }).then(function (rcanvas) {
    const rDataUrl = rcanvas.toDataURL('image/png');
    const rAspect = rcanvas.height / rcanvas.width;
    let remaining = pageH - margin - y;
    let rW = usableW;
    let rH = rW * rAspect;
    if (rH > remaining) {
      pdf.addPage();
      y = margin;
      remaining = pageH - margin - y;
      if (rH > remaining) { rH = remaining; rW = rH / rAspect; }
    }
    pdf.addImage(rDataUrl, 'PNG', margin, y, rW, rH);
    done();
  }).catch(abort);
}

    state.batteryCount,
    state.connections,
    state.batteryLinks,
    state.batteryConnectionTypes,
    state.inverterModel,
    state.batteryLayoutMode,
    state.batteryModel,
    state.eforceStackSizes,

  );

  html += '<p class="subtitle">Plan a Fortress Power battery + inverter installation before you wire it. Pick your inverter model, battery model (eBoost or eForce), and quantities; the tool auto-configures a topology and checks conductor currents, per-battery max discharge limits, connection-point terminal counts, and eWay node ratings. Anything out of spec turns red with a plain-language explanation.</p>';
  html += '<p class="subtitle">This is a <strong>theoretical</strong> validator: it analyzes the worst case using the <strong>maximum rated current output</strong> of both the inverters and the batteries. Real-world operation under partial load will be less stressful than what is modeled here — so any layout that passes here has headroom in practice, and any layout that fails here will fail under the conditions it is designed to handle.</p>';

  html += '<img src="' + FORTRESS_LOGO_DATA_URL + '" alt="Fortress Power" style="height:54px;width:auto;display:block;flex-shrink:0"/>';
  html += '<div class="buttonRow">';
  html += '<button class="btn" data-action="demoBalanced"><span style="font-weight:700">Do not share example</span></button>';
  html += '<button class="btn" data-action="demoOverload"><span style="font-weight:700">Overload example</span></button>';
  html += '<button class="btn" data-action="demoShared"><span style="font-weight:700">Share battery example</span></button>';

  if (state.isFigureFullscreen) {
    html += buildFigurePanel(state, results, true);
  }

  document.getElementById('root').innerHTML = html;
}

// === Render scheduling ===
let renderQueued = false;
function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  Promise.resolve().then(() => {
    renderQueued = false;
    render();
  });
}

// === Event delegation ===
document.addEventListener('click', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  // Walk up to find the actionable element (button/select clicks may originate on inner span)
  const el = t.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  switch (action) {
    case 'demoBalanced': demoBalanced(); markAllWizardStepsComplete(); scheduleRender(); break;
    case 'demoOverload': demoOverload(); markAllWizardStepsComplete(); scheduleRender(); break;
    case 'demoShared': demoShared(); markAllWizardStepsComplete(); scheduleRender(); break;
    case 'clearAll': clearAll(); resetWizard(); scheduleRender(); break;
    case 'invMinus': resizeSystem(state.inverterCount - 1, state.batteryCount); break;
    case 'invPlus': resizeSystem(state.inverterCount + 1, state.batteryCount); break;
    case 'batMinus': resizeSystem(state.inverterCount, state.batteryCount - 1); break;
    case 'batPlus': resizeSystem(state.inverterCount, state.batteryCount + 1); break;
    case 'autoShare': autoConfigureShareBattery(); break;
    case 'autoDoNotShare': autoConfigureDoNotShareBattery(); break;
    case 'autoBusbar': setBusbarType('busbar'); break;
    case 'autoEflexBusbar': setBusbarType('eflex_busbar'); break;
    case 'busbarNone': { state.busbarType = 'none'; scheduleRender(); break; }
    case 'continueWizard': { const stepKey = el.getAttribute('data-step'); if (stepKey) continueWizardStep(stepKey); break; }
    case 'editStep': { const stepKey = el.getAttribute('data-step'); if (stepKey) editWizardStep(stepKey); break; }
    case 'applyBatterySuggestion': { const newTotal = parseInt(el.getAttribute('data-total'), 10); if (newTotal > 0) applyBatterySuggestion(newTotal); break; }
    case 'layoutSide': setBatteryLayoutMode('side_by_side'); break;
    case 'layoutFront': setBatteryLayoutMode('front_stacking'); break;
    case 'setBatteryEboost': setBatteryModel('eboost'); break;
    case 'setBatteryEforce': setBatteryModel('eforce'); break;
    case 'setBatteryEflexMax': setBatteryModel('eflex_max'); break;
    case 'eforceStack': {
      const idx = parseInt(el.getAttribute('data-idx'), 10);
      const n = parseInt(el.getAttribute('data-n'), 10);
      setEforceStackSize(idx, n);
      break;
    }
    case 'eforceModMinus': setEforceModuleCount((state.eforceModuleCount || 1) - 1); break;
    case 'eforceModPlus': setEforceModuleCount((state.eforceModuleCount || 1) + 1); break;
    case 'autoArrangeStacks': autoArrangeEforceStacks(); break;
    case 'splitEforceStack': splitLargestEforceStack(); break;
    case 'toggleConn': {
      const i = parseInt(el.getAttribute('data-i'), 10);
      const j = parseInt(el.getAttribute('data-j'), 10);
      toggleConnection(i, j);
      break;
    }
    case 'openFullscreen': setState({ isFigureFullscreen: true }); break;
    case 'addBatteryEdge': {
      const selA = document.getElementById('addEdgeA');
      const selB = document.getElementById('addEdgeB');
      if (selA && selB) addBatteryEdge(parseInt(selA.value, 10), parseInt(selB.value, 10));
      break;
    }
    case 'removeBatteryEdge': {
      const idx = parseInt(el.getAttribute('data-idx'), 10);
      removeBatteryEdge(idx);
      break;
    }
    case 'closeFullscreen': setState({ isFigureFullscreen: false }); break;
    case 'downloadPdf': downloadReportPdf(); break;
    case 'closeOverlay': {
      // Only close if click originated on backdrop, not inside panel
      if (el === t) setState({ isFigureFullscreen: false });
      break;
    }
    case 'overlayPanelClick': e.stopPropagation(); break;
  }
});

document.addEventListener('change', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  const action = t.getAttribute('data-action');
  if (!action) return;
  if (action === 'setInverterModel') {
    setInverterModel(t.value);
  } else if (action === 'changeBatType') {
    const idx = parseInt(t.getAttribute('data-idx'), 10);
    changeBatteryConnectionType(idx, t.value);
  } else if (action === 'toggleLink') {
    const idx = parseInt(t.getAttribute('data-idx'), 10);
    toggleBatteryLink(idx);
  } else if (action === 'invInput') {
    resizeSystem(t.value, state.batteryCount);
  } else if (action === 'batInput') {
    resizeSystem(state.inverterCount, t.value);
  } else if (action === 'eforceModInput') {
    setEforceModuleCount(parseInt(t.value, 10));
  }
});

// Track <details> open/closed across re-renders
document.addEventListener('toggle', (e) => {
  const t = e.target;
  if (!(t instanceof Element)) return;
  const key = t.getAttribute('data-details-key');
  if (!key) return;
  detailsOpen[key] = t.open;
}, true);

function applyUrlPreFill() {
  let params;
  try { params = new URLSearchParams(window.location.search); }
  catch (e) { return false; }

  const norm = (v) => (v || "").trim().toLowerCase();
  const invModel = URL_INVERTER_MAP[norm(params.get("inverter"))];
  const batConfig = URL_BATTERY_MAP[norm(params.get("battery"))];
  const invQtyRaw = parseInt(params.get("inverter_qty"), 10);
  const batQtyRaw = parseInt(params.get("battery_qty"), 10);
  const invQty = Number.isFinite(invQtyRaw) && invQtyRaw > 0 ? invQtyRaw : null;
  const batQty = Number.isFinite(batQtyRaw) && batQtyRaw > 0 ? batQtyRaw : null;

  // Nothing provided/matched -- leave defaults untouched.
  if (!invModel && !batConfig && invQty === null && batQty === null) return false;

  // 1) Inverter model first (must precede share-mode reset for Solo).
  if (invModel) {
    state.inverterModel = invModel;
    if (invModel === "solo_6_5kw" && state.configurationMode === "do_not_share") {
      state.configurationMode = "share";
    }
  }

  // 2) Battery model only (do NOT pre-select layout mode — user configures that).
  if (batConfig) {
    state.batteryModel = batConfig.model;
  }

  // 3) Inverter count.
  const finalInvCount = invQty !== null ? Math.min(Math.max(1, invQty), 10) : state.inverterCount;

  // 4) Battery count (or eForce module/stack layout).
  if (batConfig && batConfig.model === "eforce") {
    // For eForce, the battery name encodes modules-per-stack and battery_qty is
    // the number of stacks. We pack uniform stacks, clamping to the model max.
    const modulesPerStack = batConfig.modulesPerStack;
    const stacks = batQty !== null ? batQty : 1;
    const desired = stacks * modulesPerStack;
    const total = Math.max(1, Math.min(EFORCE_MAX_BATTERY_COUNT, desired));
    const sizes = [];
    let remaining = total;
    while (remaining > 0) {
      const take = Math.min(modulesPerStack, remaining);
      sizes.push(take);
      remaining -= take;
    }
    state.eforceModuleCount = total;
    resizeSystem(finalInvCount, sizes.length);
    state.eforceStackSizes = sizes; // resizeSystem may default these; restore desired arrangement.
  } else {
    const target = batQty !== null ? batQty : state.batteryCount;
    const maxBat = getMaxBatteryCountForModel(state.batteryModel);
    const finalBatCount = Math.min(Math.max(1, target), maxBat);
    resizeSystem(finalInvCount, finalBatCount);
  }

  // 5) Do NOT auto-complete the wizard — user must configure Layout, Sharing, Bus Rail, etc. manually.
  return true;
}

applyUrlPreFill();

// Initial render
render();

})();
</script>
