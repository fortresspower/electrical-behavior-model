function clampCount(value, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 1;
  return Math.max(1, Math.min(max, Math.floor(n)));
}

function formatAmps(value) {
  const rounded = Math.round((Number(value) || 0) * 10) / 10;
  return Number.isInteger(rounded) ? `${rounded}` : rounded.toFixed(1);
}

function names(prefix, count) {
  return Array.from({ length: count }, (_, i) => `${prefix}${i + 1}`);
}

function matrix(rows, cols, fill = false) {
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}

function getConnectionPointConfig(type) {
  switch (type) {
    case "three_point_terminal":
      return { label: "eWay", nodeRating: 750, terminalCount: 3 };
    case "six_point_busbar":
      return { label: "eWay Pro", nodeRating: 1200, terminalCount: 6 };
    default:
      return { label: "eWay Lite", nodeRating: 250, terminalCount: 1 };
  }
}

function isFrontStackBottomBattery(index, batteryLayoutMode) {
  return batteryLayoutMode === "front_stacking" && index % 2 === 1;
}

function getEffectiveBatteryConnectionType(index, configuredType, batteryLayoutMode) {
  return isFrontStackBottomBattery(index, batteryLayoutMode) ? "single_point_terminal" : configuredType;
}

function getFrontStackColumnCount(batteryCount) {
  return Math.max(1, Math.ceil(batteryCount / 2));
}

function getTopBatteryIndexForColumn(columnIndex) {
  return columnIndex * 2;
}

function getBottomBatteryIndexForColumn(columnIndex, batteryCount) {
  const candidate = columnIndex * 2 + 1;
  return candidate < batteryCount ? candidate : -1;
}

function getLastBatteryIndexForColumn(columnIndex, batteryCount) {
  const bottom = getBottomBatteryIndexForColumn(columnIndex, batteryCount);
  return bottom !== -1 ? bottom : getTopBatteryIndexForColumn(columnIndex);
}

function buildBatteryLinkGroups(batteryCount, batteryLinks) {
  const groups = [];
  let start = 0;
  while (start < batteryCount) {
    let end = start;
    while (end < batteryCount - 1 && batteryLinks[end]) end += 1;
    const indices = [];
    for (let i = start; i <= end; i += 1) indices.push(i);
    groups.push(indices);
    start = end + 1;
  }
  return groups;
}

function buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts) {
  const parent = Array.from({ length: batteryCount }, (_, i) => i);
  const find = (x) => {
    while (parent[x] !== x) {
      parent[x] = parent[parent[x]];
      x = parent[x];
    }
    return x;
  };
  const union = (a, b) => {
    const ra = find(a);
    const rb = find(b);
    if (ra !== rb) parent[rb] = ra;
  };

  for (let i = 0; i < batteryCount - 1; i += 1) {
    if (batteryLinks[i]) union(i, i + 1);
  }

  if (bridgedPorts) {
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const connected = [];
      for (let bat = 0; bat < batteryCount; bat += 1) {
        if ((directFlows[inv]?.[bat] ?? 0) > 0) connected.push(bat);
      }
      if (connected.length > 1) {
        const first = connected[0];
        for (let k = 1; k < connected.length; k += 1) union(first, connected[k]);
      }
    }
  }

  const map = new Map();
  for (let i = 0; i < batteryCount; i += 1) {
    const root = find(i);
    if (!map.has(root)) map.set(root, []);
    map.get(root).push(i);
  }

  return Array.from(map.values())
    .map((group) => group.sort((a, b) => a - b))
    .sort((a, b) => a[0] - b[0]);
}

function inferGlobalShareMode(groupCount) {
  return groupCount === 1 ? "share" : "do_not_share";
}

function getGroupTouchedInverters(indices, inverterCount, directFlows) {
  const touched = [];
  for (let inv = 0; inv < inverterCount; inv += 1) {
    const touches = indices.some((batteryIndex) => (directFlows[inv]?.[batteryIndex] ?? 0) > 0);
    if (touches) touched.push(inv);
  }
  return touched;
}

function hasTrueMixedShareDoNotShareTopology(effectiveGroups, inverterCount, directFlows) {
  if (effectiveGroups.length <= 1) return false;
  const sharedAcrossMultipleInverters = effectiveGroups.some((group) => {
    if (group.length <= 1) return false;
    const touched = getGroupTouchedInverters(group, inverterCount, directFlows);
    return touched.length > 1;
  });
  return sharedAcrossMultipleInverters && effectiveGroups.length > 1;
}

function buildCommunicationGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts) {
  const effectiveGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);
  return effectiveGroups.map((indices) => {
    let masterInverter = -1;
    const touchedInverters = [];
    for (let inv = 0; inv < inverterCount; inv += 1) {
      const touches = indices.some((batteryIndex) => (directFlows[inv]?.[batteryIndex] ?? 0) > 0);
      if (touches) {
        if (masterInverter === -1) masterInverter = inv;
        touchedInverters.push(inv);
      }
    }

    return {
      inverterIndex: masterInverter,
      batteries: indices.slice(),
      touchedInverters,
      reason:
        indices.length > 1 && bridgedPorts && touchedInverters.length === 1
          ? "bridged_inverter_bus"
          : indices.length > 1
            ? "shared_group"
            : "single_branch",
    };
  });
}

function getGroupBounds(batteries, batteryPositions) {
  const xs = batteries.map((index) => batteryPositions[index].x + 64);
  return {
    centerX: xs.reduce((sum, value) => sum + value, 0) / xs.length,
    minX: Math.min(...xs),
    maxX: Math.max(...xs),
  };
}

function StructuredObservations({ results }) {
  const topology = [];
  const groups = [];
  const communication = [];
  const general = [...results.inverterLimitWarnings];

  results.observations.forEach((line) => {
    if (line.includes("Share Battery topology confirmed") || line.includes("Do Not Share Battery")) {
      topology.push(line);
    } else if (/^Group \d+:/.test(line)) {
      groups.push(line);
    } else if (line.includes("Communication grouped") || line.includes("Shared communication group") || line.includes("Single inverter with multiple batteries")) {
      communication.push(line);
    } else {
      general.push(line);
    }
  });

  const listStyle = { margin: 0, paddingLeft: 20 };
  const spacedListStyle = { marginTop: 10, paddingLeft: 20 };
  const itemStyle = { marginBottom: 8 };
  const nestedStyle = { marginTop: 6, marginLeft: 26, paddingLeft: 18 };

  return (
    <div style={{ fontSize: 13, color: "#78350f", lineHeight: 1.6 }}>
      {topology.length > 0 && <ul style={listStyle}>{topology.map((line, i) => <li key={`topology-${i}`} style={itemStyle}>{line}</li>)}</ul>}
      {groups.length > 0 && <ul style={topology.length > 0 ? spacedListStyle : listStyle}>{groups.map((line, i) => <li key={`group-${i}`} style={itemStyle}>{line}</li>)}</ul>}
      {communication.length > 0 && <ul style={nestedStyle}>{communication.map((line, i) => <li key={`comm-${i}`} style={{ marginBottom: 6, listStyleType: "circle" }}>{line}</li>)}</ul>}
      {results.advisories.length > 0 && <ul style={topology.length > 0 || groups.length > 0 || communication.length > 0 ? spacedListStyle : listStyle}>{results.advisories.map((line, i) => <li key={`adv-${i}`} style={itemStyle}>{line}</li>)}</ul>}
      {general.length > 0 && <ul style={topology.length > 0 || groups.length > 0 || communication.length > 0 || results.advisories.length > 0 ? spacedListStyle : listStyle}>{general.map((line, i) => <li key={`general-${i}`} style={itemStyle}>{line}</li>)}</ul>}
    </div>
  );
}

function analyzeSystem(inverterCount, batteryCount, connections, batteryLinks, batteryConnectionTypes, inverterModelKey, batteryLayoutMode) {
  const model = INVERTER_MODELS[inverterModelKey] ?? { current: DEFAULT_INVERTER_CURRENT, maxPorts: 2, bridgedPorts: false, label: "Custom" };
  const inverterOutputCurrent = model.current;
  const maxPorts = model.maxPorts;
  const bridgedPorts = model.bridgedPorts;

  const inverterNames = names("I", inverterCount);
  const batteryNames = names("B", batteryCount);
  const directFlows = Array.from({ length: inverterCount }, () => Array(batteryCount).fill(0));
  const nodeInflow = Array(batteryCount).fill(0);
  const finalBatteryLoad = Array(batteryCount).fill(0);
  const linkTransfers = Array.from({ length: Math.max(0, batteryCount - 1) }, () => ({ net: 0 }));
  const autoCommConnections = matrix(inverterCount, batteryCount, false);
  const autoCommBatteryLinks = Array(Math.max(0, batteryCount - 1)).fill(false);
  const observations = [];
  const inverterLimitWarnings = [];
  const risks = [];
  const alarms = [];
  const advisories = [];

  inverterNames.forEach((name, i) => {
    const targets = [];
    for (let j = 0; j < batteryCount; j += 1) {
      if (connections[i]?.[j]) targets.push(j);
    }
    if (targets.length === 0) {
      observations.push(`${name} is not connected (no current flow).`);
      return;
    }
    if (targets.length > maxPorts) {
      inverterLimitWarnings.push(`${name} has ${targets.length} outgoing conductors selected. Only ${maxPorts} conductor${maxPorts === 1 ? "" : "s"} per inverter are allowed for the selected model; the first ${maxPorts} ${maxPorts === 1 ? "is" : "are"} used in the model.`);
    }
    const activeTargets = targets.slice(0, maxPorts);
    const share = activeTargets.length > 0 ? inverterOutputCurrent / activeTargets.length : 0;
    activeTargets.forEach((batteryIndex) => {
      directFlows[i][batteryIndex] = share;
      nodeInflow[batteryIndex] += share;
    });
  });

  const batteryLinkGroups = buildBatteryLinkGroups(batteryCount, batteryLinks);
  const effectiveGroups = buildEffectiveGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);
  const batteryGroupLabels = effectiveGroups.map((indices, groupIndex) => `Group ${groupIndex + 1}: ${indices.map((idx) => batteryNames[idx]).join(", ")}`);
  const globalShareMode = inferGlobalShareMode(effectiveGroups.length);
  const hasMixedShareDoNotShareTopology = hasTrueMixedShareDoNotShareTopology(effectiveGroups, inverterCount, directFlows);
  const communicationGroups = buildCommunicationGroups(inverterCount, batteryCount, directFlows, batteryLinks, bridgedPorts);

  if (globalShareMode === "share") {
    observations.push("All batteries are part of one effective shared battery network. Share Battery topology confirmed.");
  } else {
    observations.push("Battery network is not fully shared. This layout behaves as Do Not Share Battery.");
    advisories.push("Share Battery functionality depends on one continuous shared path across all batteries.");
    advisories.push("That shared path can be created by battery conductors and, on bridged-port inverter models, through the inverter battery bus.");
  }

  if (hasMixedShareDoNotShareTopology) {
    alarms.push("Mixed Share / Do Not Share battery topology detected. This system combines a shared battery group that spans multiple inverters with other isolated battery groups.");
    advisories.push("Choose one battery topology approach for the whole system: either all batteries participate in one shared network, or all battery groups remain isolated.");
  }

  if (bridgedPorts) {
    advisories.push("For Envy Duo 21 / Envy 12kW, the two inverter battery ports are treated as internally bridged.");
  } else {
    advisories.push("For Envy 8kW and Envy 10kW, battery ports are not internally bridged.");
  }

  if (batteryLinkGroups.length > 1 && effectiveGroups.length === 1 && bridgedPorts) {
    observations.push("Separated battery-conductor groups are being electrically shared through bridged inverter battery ports.");
  }

  if (globalShareMode === "share" && batteryCount >= 2) {
    const leftEndTotalConnectionPoints = connections.reduce((sum, row) => sum + (row?.[0] ? 1 : 0), 0) + (batteryCount > 1 && batteryLinks[0] ? 1 : 0);
    const rightIndex = batteryCount - 1;
    const rightEndTotalConnectionPoints = connections.reduce((sum, row) => sum + (row?.[rightIndex] ? 1 : 0), 0) + (batteryCount > 1 && batteryLinks[rightIndex - 1] ? 1 : 0);

    if (leftEndTotalConnectionPoints <= 1) {
      advisories.push(`Cost optimization: ${batteryNames[0]} can use eWay Lite because this end battery has no more than one total connection point.`);
    }
    if (rightEndTotalConnectionPoints <= 1) {
      advisories.push(`Cost optimization: ${batteryNames[rightIndex]} can use eWay Lite because this end battery has no more than one total connection point.`);
    }
  }

  batteryGroupLabels.forEach((label) => observations.push(label));

  effectiveGroups.forEach((indices) => {
    const totalInflow = indices.reduce((sum, idx) => sum + nodeInflow[idx], 0);
    const sharedLoad = indices.length === 1 ? totalInflow : totalInflow / indices.length;
    indices.forEach((idx) => {
      finalBatteryLoad[idx] = sharedLoad;
    });
  });

  batteryLinkGroups.forEach((indices) => {
    let prefixImbalance = 0;
    const totalInflow = indices.reduce((sum, idx) => sum + nodeInflow[idx], 0);
    const sharedLoad = indices.length === 1 ? totalInflow : totalInflow / indices.length;
    for (let k = 0; k < indices.length - 1; k += 1) {
      const left = indices[k];
      prefixImbalance += nodeInflow[left] - sharedLoad;
      linkTransfers[left] = { net: prefixImbalance };
    }
  });

  communicationGroups.forEach(({ inverterIndex, batteries, reason }) => {
    if (batteries.length <= 1) return;
    batteries.slice(0, -1).forEach((batteryIndex) => {
      autoCommBatteryLinks[batteryIndex] = true;
    });
    if (inverterIndex !== -1) {
      autoCommConnections[inverterIndex][batteries[0]] = true;
      if (reason === "bridged_inverter_bus") {
        observations.push(`Communication grouped through bridged inverter battery ports: ${batteryNames[batteries[0]]} is primary and ${batteryNames[batteries[batteries.length - 1]]} follows through the inverter bus.`);
      } else {
        observations.push(`Shared communication group detected: ${batteryNames[batteries[0]]} is primary and ${batteryNames[batteries[batteries.length - 1]]} follows in the same effective group.`);
      }
    }
  });

  effectiveGroups.forEach((indices) => {
    if (indices.length !== 1) return;
    const batteryIndex = indices[0];
    for (let inv = 0; inv < inverterCount; inv += 1) {
      if ((directFlows[inv]?.[batteryIndex] ?? 0) > 0) autoCommConnections[inv][batteryIndex] = true;
    }
  });

  const connectedBatteryIndices = batteryNames.map((_, idx) => idx).filter((idx) => nodeInflow[idx] > 0);
  if (inverterCount === 1 && connectedBatteryIndices.length > 1 && !batteryLinks.some(Boolean)) {
    connectedBatteryIndices.slice(0, -1).forEach((batteryIndex) => {
      autoCommBatteryLinks[batteryIndex] = true;
    });
    connectedBatteryIndices.forEach((batteryIndex, index) => {
      autoCommConnections[0][batteryIndex] = index === 0;
    });
    observations.push("Single inverter with multiple batteries detected: battery-to-battery communication chain added automatically.");
  }

  const batteryStatus = batteryNames.map((name, i) => {
    const appliedType = getEffectiveBatteryConnectionType(i, batteryConnectionTypes[i] ?? "three_point_terminal", batteryLayoutMode);
    const config = getConnectionPointConfig(appliedType);
    const isBottomFrontStackBattery = batteryLayoutMode === "front_stacking" && isFrontStackBottomBattery(i, batteryLayoutMode);

    if (isBottomFrontStackBattery) {
      const incomingNodeCurrent = finalBatteryLoad[i];
      const maxNodeCurrent = finalBatteryLoad[i];
      const totalConnectionPointsUsed = finalBatteryLoad[i] > 1e-9 ? 1 : 0;
      const batteryOverload = finalBatteryLoad[i] > BATTERY_MAX + 1e-9;
      const nodeOverload = incomingNodeCurrent > config.nodeRating + 1e-9;
      const terminalOveruse = totalConnectionPointsUsed > config.terminalCount;
      const inactive = finalBatteryLoad[i] <= 1e-9;

      if (batteryOverload) risks.push(`${name} absorbs ${formatAmps(finalBatteryLoad[i])} A, which is above its 250 A battery maximum.`);
      if (nodeOverload) risks.push(`${name} connection point incoming current is ${formatAmps(incomingNodeCurrent)} A, which is above its ${formatAmps(config.nodeRating)} A connection-point rating.`);
      if (terminalOveruse) risks.push(`${name} uses ${totalConnectionPointsUsed} power-conductor landings, but its selected connection point allows only ${config.terminalCount}. Communication cabling is treated separately and is not counted as a power landing.`);
      if (inactive) observations.push(`${name} is not absorbing current.`);

      return {
        name,
        finalLoad: finalBatteryLoad[i],
        incomingNodeCurrent,
        maxNodeCurrent,
        config,
        totalConnectionPointsUsed,
        overloaded: batteryOverload || nodeOverload || terminalOveruse,
        inactive,
      };
    }

    const directConnectionCount = connections.reduce((sum, row) => sum + (row?.[i] ? 1 : 0), 0);
    const leftEnabled = i > 0 && batteryLinks[i - 1];
    const rightEnabled = i < batteryCount - 1 && batteryLinks[i];
    const leftIncoming = leftEnabled ? Math.max(0, linkTransfers[i - 1]?.net ?? 0) : 0;
    const rightIncoming = rightEnabled ? Math.max(0, -(linkTransfers[i]?.net ?? 0)) : 0;
    const leftOutgoing = leftEnabled ? Math.max(0, -(linkTransfers[i - 1]?.net ?? 0)) : 0;
    const rightOutgoing = rightEnabled ? Math.max(0, linkTransfers[i]?.net ?? 0) : 0;
    const totalConnectionPointsUsed = (() => {
      if (batteryLayoutMode === "front_stacking" && globalShareMode === "share" && isFrontStackBottomBattery(i, batteryLayoutMode)) {
        const hasPowerFeedFromAbove = leftEnabled || rightEnabled;
        return hasPowerFeedFromAbove ? 1 : directConnectionCount;
      }
      return directConnectionCount + (leftEnabled ? 1 : 0) + (rightEnabled ? 1 : 0);
    })();
    const incomingNodeCurrent = nodeInflow[i] + leftIncoming + rightIncoming;
    const outgoingNodeCurrent = leftOutgoing + rightOutgoing + finalBatteryLoad[i];
    const maxNodeCurrent = Math.max(incomingNodeCurrent, outgoingNodeCurrent);
    const batteryOverload = finalBatteryLoad[i] > BATTERY_MAX + 1e-9;
    const nodeOverload = incomingNodeCurrent > config.nodeRating + 1e-9;
    const terminalOveruse = totalConnectionPointsUsed > config.terminalCount;
    const inactive = nodeInflow[i] <= 1e-9 && finalBatteryLoad[i] <= 1e-9;

    if (batteryOverload) risks.push(`${name} absorbs ${formatAmps(finalBatteryLoad[i])} A, which is above its 250 A battery maximum.`);
    if (nodeOverload) risks.push(`${name} connection point incoming current is ${formatAmps(incomingNodeCurrent)} A, which is above its ${formatAmps(config.nodeRating)} A connection-point rating.`);
    if (terminalOveruse) risks.push(`${name} uses ${totalConnectionPointsUsed} power-conductor landings, but its selected connection point allows only ${config.terminalCount}. Communication cabling is treated separately and is not counted as a power landing.`);
    if (inactive) observations.push(`${name} is not absorbing current.`);

    return {
      name,
      finalLoad: finalBatteryLoad[i],
      incomingNodeCurrent,
      maxNodeCurrent,
      config,
      totalConnectionPointsUsed,
      overloaded: batteryOverload || nodeOverload || terminalOveruse,
      inactive,
    };
  });

  linkTransfers.forEach((transfer, i) => {
    const current = Math.abs(transfer.net);
    if (current > CONDUCTOR_RATING + 1e-9) {
      risks.push(`${batteryNames[i]} ↔ ${batteryNames[i + 1]} carries ${formatAmps(current)} A, which is above its 250 A conductor rating.`);
    }
  });

  const totalInput = nodeInflow.reduce((a, b) => a + b, 0);
  const batteryCapacity = batteryCount * BATTERY_MAX;
  if (totalInput > batteryCapacity + 1e-9) {
    risks.push(`Total inverter current is ${formatAmps(totalInput)} A, while total battery capacity is ${formatAmps(batteryCapacity)} A.`);
  }

  return {
    globalShareMode,
    batteryGroups: effectiveGroups,
    batteryGroupLabels,
    communicationGroups,
    inverterNames,
    inverterLimitWarnings,
    batteryNames,
    directFlows,
    batteryStatus,
    linkTransfers,
    risks,
    observations,
    alarms,
    advisories,
    totalInput,
    autoCommConnections,
    autoCommBatteryLinks,
    bridgedPorts,
    modelLabel: model.label,
  };
}

function runSelfChecks() {
  const groupsA = buildEffectiveGroups(2, 3, [[250, 0, 0], [0, 250, 0]], [false, true], false);
  const groupsB = buildEffectiveGroups(2, 3, [[125, 125, 0], [0, 250, 0]], [false, true], true);
  if (groupsA.length !== 2) throw new Error("Self-check failed: expected two effective groups without bridge sharing.");
  if (groupsB.length !== 1) throw new Error("Self-check failed: expected one effective group with bridged inverter sharing.");
}

runSelfChecks();

function ElectricalBehaviorModel() {
  const [inverterCount, setInverterCount] = useState(2);
  const [batteryCount, setBatteryCount] = useState(3);
  const [connections, setConnections] = useState([[true, false, false], [false, true, false]]);
  const [batteryLinks, setBatteryLinks] = useState([false, false]);
  const [batteryConnectionTypes, setBatteryConnectionTypes] = useState(["three_point_terminal", "three_point_terminal", "three_point_terminal"]);
  const [inverterModel, setInverterModel] = useState("envy_duo_21_envy_12kw");
  const [isFigureFullscreen, setIsFigureFullscreen] = useState(false);
  const [batteryLayoutMode, setBatteryLayoutMode] = useState("side_by_side");
  const [configurationMode, setConfigurationMode] = useState("none");

  const resizeSystem = (newInv, newBat) => {
    const inv = clampCount(newInv, MAX_INVERTER_COUNT);
    const bat = clampCount(newBat, MAX_BATTERY_COUNT);
    setInverterCount(inv);
    setBatteryCount(bat);
    setConnections((prev) => {
      const next = matrix(inv, bat, false);
      for (let i = 0; i < Math.min(inv, prev.length); i += 1) {
        for (let j = 0; j < Math.min(bat, prev[i].length); j += 1) next[i][j] = prev[i][j];
      }
      return next;
    });
    setBatteryLinks((prev) => {
      const next = Array(Math.max(0, bat - 1)).fill(false);
      for (let i = 0; i < Math.min(next.length, prev.length); i += 1) next[i] = prev[i];
      return next;
    });
    setBatteryConnectionTypes((prev) => {
      const next = Array(bat).fill("three_point_terminal");
      for (let i = 0; i < Math.min(bat, prev.length); i += 1) next[i] = prev[i];
      return next;
    });
  };

  const toggleConnection = (i, j) => {
    setConnections((prev) => prev.map((row, r) => row.map((cell, c) => (r === i && c === j ? !cell : cell))));
  };

  const toggleBatteryLink = (idx) => {
    setBatteryLinks((prev) => prev.map((value, i) => (i === idx ? !value : value)));
  };

  const changeBatteryConnectionType = (idx, value) => {
    setBatteryConnectionTypes((prev) => prev.map((item, i) => (i === idx ? value : item)));
  };

  const clearAll = () => {
    setConfigurationMode("none");
    setConnections(matrix(inverterCount, batteryCount, false));
    setBatteryLinks(Array(Math.max(0, batteryCount - 1)).fill(false));
    setBatteryConnectionTypes(Array(batteryCount).fill("three_point_terminal"));
  };

  const applyShareConfiguration = (layoutModeOverride = batteryLayoutMode) => {
    const nextConnections = matrix(inverterCount, batteryCount, false);
    const nextBatteryLinks = Array(Math.max(0, batteryCount - 1)).fill(true);
    const nextBatteryConnectionTypes = Array(batteryCount).fill("three_point_terminal");

    if (layoutModeOverride === "front_stacking") {
      const columnCount = getFrontStackColumnCount(batteryCount);
      const landingCount = Math.min(inverterCount, columnCount);
      const centeredStartColumn = Math.max(0, Math.floor((columnCount - landingCount) / 2));

      for (let column = 0; column < columnCount; column += 1) {
        const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
        if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
      }

      for (let inv = 0; inv < landingCount; inv += 1) {
        const column = centeredStartColumn + inv;
        const topBatteryIndex = getTopBatteryIndexForColumn(column);
        if (topBatteryIndex < batteryCount) nextConnections[inv][topBatteryIndex] = true;
      }
    } else if (batteryCount > 0 && inverterCount > 0) {
      const usedBatteries = new Set();
      const useCenteredWindow = batteryCount >= inverterCount;
      const centeredStartIndex = useCenteredWindow ? Math.floor((batteryCount - inverterCount) / 2) : 0;

      for (let inv = 0; inv < inverterCount; inv += 1) {
        let targetIndex;
        if (useCenteredWindow) {
          targetIndex = centeredStartIndex + Math.min(inv, batteryCount - 1);
        } else if (inverterCount === 1) {
          targetIndex = 0;
        } else {
          targetIndex = Math.floor((inv * batteryCount) / inverterCount);
        }

        if (targetIndex > batteryCount - 1) targetIndex = batteryCount - 1;

        let assignedBattery = targetIndex;
        if (usedBatteries.has(assignedBattery)) {
          let bestBattery = assignedBattery;
          let bestDistance = Number.POSITIVE_INFINITY;
          for (let bat = 0; bat < batteryCount; bat += 1) {
            if (usedBatteries.has(bat)) continue;
            const distance = Math.abs(bat - targetIndex);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestBattery = bat;
            }
          }
          assignedBattery = bestBattery;
        }

        usedBatteries.add(assignedBattery);
        nextConnections[inv][assignedBattery] = true;
      }
    }

    setConnections(nextConnections);
    setBatteryLinks(nextBatteryLinks);
    setBatteryConnectionTypes(nextBatteryConnectionTypes);
  };

  const applyDoNotShareConfiguration = (layoutModeOverride = batteryLayoutMode) => {
    const nextConnections = matrix(inverterCount, batteryCount, false);
    const nextBatteryLinks = Array(Math.max(0, batteryCount - 1)).fill(false);
    const nextBatteryConnectionTypes = Array(batteryCount).fill("three_point_terminal");
    const maxPorts = INVERTER_MODELS[inverterModel]?.maxPorts ?? 1;

    if (layoutModeOverride === "front_stacking") {
      const columnCount = getFrontStackColumnCount(batteryCount);
      for (let column = 0; column < columnCount; column += 1) {
        const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
        if (bottomIndex !== -1) nextBatteryConnectionTypes[bottomIndex] = "single_point_terminal";
      }

      for (let inv = 0; inv < inverterCount; inv += 1) {
        const startColumn = Math.floor((inv * columnCount) / inverterCount);
        const endColumnExclusive = Math.floor(((inv + 1) * columnCount) / inverterCount);
        const groupEndColumn = Math.max(startColumn + 1, endColumnExclusive);
        const groupColumnCount = Math.max(1, groupEndColumn - startColumn);
        const directAssignments = Math.min(groupColumnCount, maxPorts);
        const assignmentStartColumn = groupColumnCount > directAssignments
          ? startColumn + Math.floor((groupColumnCount - directAssignments) / 2)
          : startColumn;

        for (let offset = 0; offset < directAssignments; offset += 1) {
          const column = assignmentStartColumn + offset;
          const topBatteryIndex = getTopBatteryIndexForColumn(column);
          if (topBatteryIndex < batteryCount) nextConnections[inv][topBatteryIndex] = true;
        }

        for (let column = startColumn; column < groupEndColumn; column += 1) {
          const topBatteryIndex = getTopBatteryIndexForColumn(column);
          const bottomBatteryIndex = getBottomBatteryIndexForColumn(column, batteryCount);
          if (bottomBatteryIndex !== -1 && topBatteryIndex < batteryCount - 1) nextBatteryLinks[topBatteryIndex] = true;
          if (column < groupEndColumn - 1) {
            const boundaryIndex = getLastBatteryIndexForColumn(column, batteryCount);
            if (boundaryIndex >= 0 && boundaryIndex < batteryCount - 1) nextBatteryLinks[boundaryIndex] = true;
          }
        }
      }
    } else if (batteryCount > 0 && inverterCount > 0) {
      for (let inv = 0; inv < inverterCount; inv += 1) {
        const startBattery = Math.floor((inv * batteryCount) / inverterCount);
        const endBatteryExclusive = Math.floor(((inv + 1) * batteryCount) / inverterCount);
        const groupEnd = Math.max(startBattery + 1, endBatteryExclusive);
        const groupSize = Math.max(1, groupEnd - startBattery);
        const directAssignments = Math.min(groupSize, maxPorts);
        const assignmentStart = groupSize > directAssignments ? startBattery + Math.floor((groupSize - directAssignments) / 2) : startBattery;

        for (let offset = 0; offset < directAssignments; offset += 1) {
          const batteryIndex = assignmentStart + offset;
          if (batteryIndex >= 0 && batteryIndex < batteryCount) nextConnections[inv][batteryIndex] = true;
        }

        for (let batteryIndex = startBattery; batteryIndex < groupEnd - 1; batteryIndex += 1) {
          if (batteryIndex >= 0 && batteryIndex < batteryCount - 1) nextBatteryLinks[batteryIndex] = true;
        }
      }
    }

    setConnections(nextConnections);
    setBatteryLinks(nextBatteryLinks);
    setBatteryConnectionTypes(nextBatteryConnectionTypes);
  };

  const autoConfigureShareBattery = () => {
    setConfigurationMode("share");
  };

  const autoConfigureDoNotShareBattery = () => {
    setConfigurationMode("do_not_share");
  };

  useEffect(() => {
    if (configurationMode === "share") {
      applyShareConfiguration(batteryLayoutMode);
    } else if (configurationMode === "do_not_share") {
      applyDoNotShareConfiguration(batteryLayoutMode);
    }
  }, [configurationMode, batteryLayoutMode, inverterCount, batteryCount, inverterModel]);

  const demoBalanced = () => {
    setConfigurationMode("none");
    setInverterCount(2);
    setBatteryCount(3);
    setConnections([[true, false, false], [false, true, true]]);
    setBatteryLinks([false, true]);
    setBatteryConnectionTypes(["three_point_terminal", "three_point_terminal", "three_point_terminal"]);
  };

  const demoOverload = () => {
    setConfigurationMode("none");
    setInverterCount(3);
    setBatteryCount(2);
    setConnections([[true, false], [true, false], [true, false]]);
    setBatteryLinks([false]);
    setBatteryConnectionTypes(["three_point_terminal", "three_point_terminal"]);
  };

  const demoShared = () => {
    setConfigurationMode("none");
    setInverterCount(2);
    setBatteryCount(2);
    setConnections([[true, false], [false, true]]);
    setBatteryLinks([true]);
    setBatteryConnectionTypes(["three_point_terminal", "three_point_terminal"]);
  };

  const results = useMemo(
    () => analyzeSystem(inverterCount, batteryCount, connections, batteryLinks, batteryConnectionTypes, inverterModel, batteryLayoutMode),
    [inverterCount, batteryCount, connections, batteryLinks, batteryConnectionTypes, inverterModel, batteryLayoutMode]
  );

  const selectedCurrent = INVERTER_MODELS[inverterModel]?.current ?? DEFAULT_INVERTER_CURRENT;
  const isFrontStacking = batteryLayoutMode === "front_stacking";
  const stackingColumns = isFrontStacking ? Math.ceil(batteryCount / 2) : batteryCount;
  const diagramWidth = Math.max(860, Math.max(inverterCount, stackingColumns) * 170 + 240);
  const diagramHeight = isFrontStacking ? 560 : 440;
  const inverterY = 90;
  const batteryTopY = isFrontStacking ? 250 : diagramHeight - 170;
  const batteryBottomY = isFrontStacking ? 390 : batteryTopY;

  const batteryPositions = results.batteryNames.map((name, i) => {
    if (!isFrontStacking) {
      return {
        name,
        x: batteryCount === 1 ? diagramWidth / 2 - 64 : 120 + i * ((diagramWidth - 240) / Math.max(1, batteryCount - 1)) - 64,
        y: batteryTopY,
      };
    }
    const columnIndex = Math.floor(i / 2);
    const rowIndex = i % 2;
    const columnCount = Math.max(1, Math.ceil(batteryCount / 2));
    return {
      name,
      x: columnCount === 1 ? diagramWidth / 2 - 64 : 120 + columnIndex * ((diagramWidth - 240) / Math.max(1, columnCount - 1)) - 64,
      y: rowIndex === 0 ? batteryTopY : batteryBottomY,
    };
  });

  const inverterAnchorCenters = results.inverterNames.map((_, i) => {
    const connectedBatteries = results.batteryNames
      .map((__, batteryIndex) => batteryIndex)
      .filter((batteryIndex) => (results.directFlows[i]?.[batteryIndex] ?? 0) > 0);
    if (connectedBatteries.length > 0) return getGroupBounds(connectedBatteries, batteryPositions).centerX;
    return inverterCount === 1 ? diagramWidth / 2 : 120 + i * ((diagramWidth - 240) / Math.max(1, inverterCount - 1));
  });

  const inverterPositions = inverterAnchorCenters.map((centerX, i) => {
    const sameCluster = inverterAnchorCenters
      .map((value, index) => ({ value, index }))
      .filter((entry) => Math.abs(entry.value - centerX) < 1)
      .sort((a, b) => a.index - b.index);
    const clusterIndex = sameCluster.findIndex((entry) => entry.index === i);
    const spread = 120;
    const offset = sameCluster.length > 1 ? (clusterIndex - (sameCluster.length - 1) / 2) * spread : 0;
    return { name: results.inverterNames[i], x: centerX - 45 + offset, y: inverterY };
  });

  const frontStackColumnCount = getFrontStackColumnCount(batteryCount);
  const isFrontStackShared = isFrontStacking && results.globalShareMode === "share";
  const isFrontStackDoNotShare = isFrontStacking && results.globalShareMode === "do_not_share";

  const figureContent = (
    <div style={isFigureFullscreen ? styles.figureWrapFullscreen : styles.figureWrap}>
      <svg viewBox={`0 0 ${diagramWidth} ${diagramHeight}`} style={{ width: "100%", height: "auto" }} role="img" aria-label="Electrical behavior diagram">
        <text x={diagramWidth / 2} y={30} textAnchor="middle" style={{ fill: "#475569", fontSize: 14, fontWeight: 700 }}>Inverters</text>
        <text x={diagramWidth / 2} y={diagramHeight - 18} textAnchor="middle" style={{ fill: "#475569", fontSize: 14, fontWeight: 700 }}>Batteries</text>

        {results.inverterNames.flatMap((inv, i) => results.batteryNames.map((bat, j) => {
          if (!connections[i]?.[j]) return null;
          const current = results.directFlows[i][j];
          if (current <= 0) return null;
          const from = inverterPositions[i];
          const to = batteryPositions[j];
          return (
            <g key={`${inv}-${bat}`}>
              <line x1={from.x + 45} y1={from.y + 56} x2={to.x + 64} y2={to.y} stroke="#000000" strokeWidth="2.5" />
              <text x={(from.x + to.x) / 2 + 10} y={(from.y + to.y) / 2 + 6} textAnchor="middle" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        }))}

        {!isFrontStackShared && !isFrontStackDoNotShare && results.autoCommConnections.flatMap((row, i) => row.map((enabled, j) => {
          if (!enabled) return null;
          const from = inverterPositions[i];
          const to = batteryPositions[j];
          return <line key={`comm-line-${i}-${j}`} x1={from.x + 70} y1={from.y + 62} x2={to.x + 90} y2={to.y - 6} stroke="#2563eb" strokeWidth="1.5" strokeDasharray="6 5" />;
        }))}

        {!isFrontStackShared && !isFrontStackDoNotShare && results.autoCommBatteryLinks.map((enabled, i) => {
          if (!enabled) return null;
          const a = batteryPositions[i];
          const b = batteryPositions[i + 1];
          return <line key={`comm-battery-line-${i}`} x1={a.x + 90} y1={a.y + 90} x2={b.x + 90} y2={a.y + 90} stroke="#2563eb" strokeWidth="1.5" strokeDasharray="6 5" />;
        })}

        {isFrontStackShared && inverterPositions[0] && batteryPositions[0] && (
          <line x1={inverterPositions[0].x + 70} y1={inverterPositions[0].y + 62} x2={batteryPositions[0].x + 90} y2={batteryPositions[0].y - 6} stroke="#2563eb" strokeWidth="1.5" strokeDasharray="6 5" />
        )}

        {isFrontStackShared && Array.from({ length: frontStackColumnCount }, (_, column) => {
          const topIndex = getTopBatteryIndexForColumn(column);
          const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
          if (bottomIndex === -1) return null;
          const top = batteryPositions[topIndex];
          const bottom = batteryPositions[bottomIndex];
          return (
            <line
              key={`front-comm-vertical-${column}`}
              x1={top.x + 94}
              y1={top.y + 102}
              x2={bottom.x + 94}
              y2={bottom.y - 6}
              stroke="#2563eb"
              strokeWidth="1.5"
              strokeDasharray="6 5"
            />
          );
        })}

        {isFrontStackShared && Array.from({ length: Math.max(0, frontStackColumnCount - 1) }, (_, offset) => {
          const fromColumn = frontStackColumnCount - 1 - offset;
          const toColumn = fromColumn - 1;
          const fromTopIndex = getTopBatteryIndexForColumn(fromColumn);
          const toBottomIndex = getBottomBatteryIndexForColumn(toColumn, batteryCount);
          if (fromTopIndex >= batteryCount || toBottomIndex === -1) return null;
          const from = batteryPositions[fromTopIndex];
          const to = batteryPositions[toBottomIndex];
          return (
            <line
              key={`front-comm-diagonal-${fromTopIndex}-${toBottomIndex}`}
              x1={from.x + 28}
              y1={from.y + 90}
              x2={to.x + 100}
              y2={to.y + 18}
              stroke="#2563eb"
              strokeWidth="1.5"
              strokeDasharray="6 5"
            />
          );
        })}

        {isFrontStackDoNotShare && results.inverterNames.flatMap((_, inv) => {
          const groupTopIndices = Array.from({ length: frontStackColumnCount }, (_, column) => getTopBatteryIndexForColumn(column))
            .filter((topIndex) => topIndex < batteryCount && (results.directFlows[inv]?.[topIndex] ?? 0) > 0)
            .sort((a, b) => a - b);

          const lines = [];

          if (groupTopIndices.length > 0) {
            const firstTopIndex = groupTopIndices[0];
            const from = inverterPositions[inv];
            const to = batteryPositions[firstTopIndex];
            lines.push(
              <line
                key={`front-dns-comm-inverter-${inv}-${firstTopIndex}`}
                x1={from.x + 70}
                y1={from.y + 62}
                x2={to.x + 90}
                y2={to.y - 6}
                stroke="#2563eb"
                strokeWidth="1.5"
                strokeDasharray="6 5"
              />
            );
          }

          groupTopIndices.forEach((topIndex) => {
            const column = Math.floor(topIndex / 2);
            const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
            if (bottomIndex !== -1) {
              const top = batteryPositions[topIndex];
              const bottom = batteryPositions[bottomIndex];
              lines.push(
                <line
                  key={`front-dns-comm-vertical-${topIndex}-${bottomIndex}`}
                  x1={top.x + 94}
                  y1={top.y + 102}
                  x2={bottom.x + 94}
                  y2={bottom.y - 6}
                  stroke="#2563eb"
                  strokeWidth="1.5"
                  strokeDasharray="6 5"
                />
              );
            }
          });

          groupTopIndices.slice(1).forEach((topIndex) => {
            const column = Math.floor(topIndex / 2);
            const previousBottomIndex = getBottomBatteryIndexForColumn(column - 1, batteryCount);
            if (previousBottomIndex !== -1) {
              const from = batteryPositions[topIndex];
              const to = batteryPositions[previousBottomIndex];
              lines.push(
                <line
                  key={`front-dns-comm-diagonal-${topIndex}-${previousBottomIndex}`}
                  x1={from.x + 28}
                  y1={from.y + 90}
                  x2={to.x + 100}
                  y2={to.y + 18}
                  stroke="#2563eb"
                  strokeWidth="1.5"
                  strokeDasharray="6 5"
                />
              );
            }
          });

          return lines;
        })}

        {!isFrontStackShared && !isFrontStackDoNotShare && results.linkTransfers.map((transfer, i) => {
          if (!batteryLinks[i]) return null;
          const a = batteryPositions[i];
          const b = batteryPositions[i + 1];
          const current = Math.abs(transfer.net);
          return (
            <g key={`link-${i}`}>
              <line x1={a.x + 64} y1={a.y + 70} x2={b.x + 64} y2={a.y + 70} stroke="#000000" strokeWidth="3" />
              <text x={(a.x + b.x) / 2 + 64} y={a.y + 64} textAnchor="middle" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        })}

        {isFrontStackShared && Array.from({ length: frontStackColumnCount }, (_, column) => {
          const topIndex = getTopBatteryIndexForColumn(column);
          const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
          if (bottomIndex === -1) return null;
          const top = batteryPositions[topIndex];
          const bottom = batteryPositions[bottomIndex];
          const current = results.batteryStatus[bottomIndex]?.finalLoad ?? 0;
          return (
            <g key={`front-power-vertical-${column}`}>
              <line x1={top.x + 64} y1={top.y + 102} x2={bottom.x + 64} y2={bottom.y} stroke="#000000" strokeWidth="3" />
              <text x={bottom.x + 50} y={bottom.y - 8} textAnchor="end" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        })}

        {isFrontStackShared && Array.from({ length: frontStackColumnCount - 1 }, (_, column) => {
          const leftTopIndex = getTopBatteryIndexForColumn(column);
          const rightTopIndex = getTopBatteryIndexForColumn(column + 1);
          if (rightTopIndex >= batteryCount) return null;
          const left = batteryPositions[leftTopIndex];
          const right = batteryPositions[rightTopIndex];
          const transferIndex = getLastBatteryIndexForColumn(column, batteryCount);
          const current = Math.abs(results.linkTransfers[transferIndex]?.net ?? 0);
          return (
            <g key={`front-power-top-${column}`}>
              <line x1={left.x + 128} y1={left.y + 70} x2={right.x} y2={right.y + 70} stroke="#000000" strokeWidth="3" />
              <text x={(left.x + 128 + right.x) / 2} y={left.y + 64} textAnchor="middle" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        })}

        {isFrontStackDoNotShare && Array.from({ length: frontStackColumnCount }, (_, column) => {
          const topIndex = getTopBatteryIndexForColumn(column);
          const bottomIndex = getBottomBatteryIndexForColumn(column, batteryCount);
          if (bottomIndex === -1 || !batteryLinks[topIndex]) return null;
          const top = batteryPositions[topIndex];
          const bottom = batteryPositions[bottomIndex];
          const current = Math.abs(results.linkTransfers[topIndex]?.net ?? results.batteryStatus[bottomIndex]?.finalLoad ?? 0);
          return (
            <g key={`front-dns-power-vertical-${column}`}>
              <line x1={top.x + 64} y1={top.y + 102} x2={bottom.x + 64} y2={bottom.y} stroke="#000000" strokeWidth="3" />
              <text x={bottom.x + 50} y={bottom.y - 8} textAnchor="end" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        })}

        {isFrontStackDoNotShare && Array.from({ length: Math.max(0, frontStackColumnCount - 1) }, (_, column) => {
          const leftTopIndex = getTopBatteryIndexForColumn(column);
          const rightTopIndex = getTopBatteryIndexForColumn(column + 1);
          if (rightTopIndex >= batteryCount) return null;
          const boundaryIndex = getLastBatteryIndexForColumn(column, batteryCount);
          if (!batteryLinks[boundaryIndex]) return null;
          const left = batteryPositions[leftTopIndex];
          const right = batteryPositions[rightTopIndex];
          const current = Math.abs(results.linkTransfers[boundaryIndex]?.net ?? 0);
          return (
            <g key={`front-dns-power-top-${column}`}>
              <line x1={left.x + 128} y1={left.y + 70} x2={right.x} y2={right.y + 70} stroke="#000000" strokeWidth="3" />
              <text x={(left.x + 128 + right.x) / 2} y={left.y + 64} textAnchor="middle" style={{ fill: "#64748b", fontSize: 11 }}>{formatAmps(current)}A</text>
            </g>
          );
        })}

        {results.inverterNames.flatMap((_, i) => results.inverterNames.map((__, j) => {
          if (j <= i) return null;
          const a = inverterPositions[i];
          const b = inverterPositions[j];
          return <line key={`inv-comm-${i}-${j}`} x1={a.x + 45} y1={a.y + 28} x2={b.x + 45} y2={b.y + 28} stroke="#d4a017" strokeWidth="2" strokeDasharray="6 6" />;
        }))}

        {inverterPositions.map((item, idx) => (
          <g key={item.name}>
            <text x={item.x + 45} y={item.y - 6} textAnchor="middle" style={{ fill: "#64748b", fontSize: 10, fontWeight: 700 }}>{idx === 0 ? "Primary" : "Secondary"}</text>
            <rect x={item.x} y={item.y} width="90" height="56" rx="10" fill="#cbd5e1" stroke="#475569" strokeWidth="2" />
            <text x={item.x + 45} y={item.y + 24} textAnchor="middle" style={{ fill: "#0f172a", fontSize: 13, fontWeight: 700 }}>{item.name}</text>
            <text x={item.x + 45} y={item.y + 42} textAnchor="middle" style={{ fill: "#475569", fontSize: 11 }}>{formatAmps(selectedCurrent)}A DC</text>
          </g>
        ))}

        {batteryPositions.map((item, i) => {
          const status = results.batteryStatus[i];
          const active = !status.inactive;
          const commGroup = results.communicationGroups.find((group) => group.batteries.includes(i));
          const isPrimaryBattery = commGroup ? commGroup.batteries[0] === i : i === 0 || !batteryLinks[i - 1];
          const stateLabel = status.overloaded ? "Overload" : status.inactive ? "Inactive" : "Normal";
          return (
            <g key={item.name} opacity={active ? 1 : 0.35}>
              <text x={item.x + 64} y={item.y + 118} textAnchor="middle" style={{ fill: "#64748b", fontSize: 10, fontWeight: 700 }}>{isPrimaryBattery ? "Primary" : "Secondary"}</text>
              <rect x={item.x} y={item.y} width="128" height="102" rx="10" fill={status.overloaded ? "#fee2e2" : "#ecfccb"} stroke={status.overloaded ? "#dc2626" : "#65a30d"} strokeWidth="2.5" />
              <text x={item.x + 64} y={item.y + 18} textAnchor="middle" style={{ fill: "#0f172a", fontSize: 14, fontWeight: 700 }}>{item.name}</text>
              <text x={item.x + 64} y={item.y + 32} textAnchor="middle" style={{ fill: "#475569", fontSize: 10, fontWeight: 700 }}>{status.config.label}</text>
              <text x={item.x + 64} y={item.y + 46} textAnchor="middle" style={{ fill: "#475569", fontSize: 11 }}>{formatAmps(status.incomingNodeCurrent)} / Max {formatAmps(status.config.nodeRating)}A</text>
              <text x={item.x + 64} y={item.y + 60} textAnchor="middle" style={{ fill: "#64748b", fontSize: 10 }}>Charge/Discharge {formatAmps(status.finalLoad)}A</text>
              <text x={item.x + 64} y={item.y + 74} textAnchor="middle" style={{ fill: "#64748b", fontSize: 10 }}>Max current at node {formatAmps(status.maxNodeCurrent)}A</text>
              <text x={item.x + 64} y={item.y + 88} textAnchor="middle" style={{ fill: "#64748b", fontSize: 10 }}>{stateLabel}</text>
            </g>
          );
        })}
      </svg>
      <Legend />
    </div>
  );

  return (
    <div style={styles.page}>
      <div style={styles.container}>
        <div style={styles.headerRow}>
          <div>
            <h1 style={styles.title}>Battery & inverter wiring validator for installers</h1>
            <p style={styles.subtitle}>
              This tool allows you to configure and validate inverter-to-battery wiring layouts by selecting inverter models, defining the number of inverters and batteries, and assigning power conductors between them. Each inverter outputs its rated current based on the selected model, with Envy 8kW and Envy 10kW limited to one battery conductor and Envy Duo 21 / Envy 12kW allowing up to two. Batteries can absorb up to 250 A DC, and all conductors are rated at 250 A DC. Share Battery is evaluated from the effective electrical topology: batteries can be shared either through battery-to-battery conductors or, on Envy Duo 21 / Envy 12kW, through internally bridged inverter battery ports. The tool automatically generates communication topology, highlights overload conditions, improper terminal usage, battery group separation, and inactive components, while displaying real-time current flow, node limits, and battery charge/discharge behavior. Each battery connection point defaults to eWay and can be changed to eWay Lite, eWay, or eWay Pro to reflect different terminal capacities and constraints. Disclaimer: This tool is for theoretical and educational purposes only and does not replace proper system design, engineering analysis, or code compliance review. Always consult a licensed electrician and a qualified electrical engineer before finalizing or installing any electrical system.
            </p>
          </div>
          <div style={styles.buttonRow}>
            <ControlButton onClick={demoBalanced}><span style={{ fontWeight: 700 }}>Do not share example</span></ControlButton>
            <ControlButton onClick={demoOverload}><span style={{ fontWeight: 700 }}>Overload example</span></ControlButton>
            <ControlButton onClick={demoShared}><span style={{ fontWeight: 700 }}>Share battery example</span></ControlButton>
            <ControlButton onClick={clearAll}><span style={{ fontWeight: 700 }}>Clear</span></ControlButton>
          </div>
        </div>

        <div style={styles.layout}>
          <div style={styles.panel}>
            <div style={styles.panelHeader}>System setup</div>
            <div style={styles.setupBody}>
              <Section title="Step 1. Choose inverter model" open>
                <select value={inverterModel} onChange={(e) => setInverterModel(e.target.value)} style={styles.select}>
                  <option value="envy_8kw">Envy 8kW — 167 A</option>
                  <option value="envy_10kw">Envy 10kW — 210 A</option>
                  <option value="envy_duo_21_envy_12kw">Envy Duo 21 / Envy 12kW — 250 A</option>
                </select>
                <div style={styles.helper}>
                  {INVERTER_MODELS[inverterModel]?.bridgedPorts ? "This inverter model treats its two battery ports as internally bridged." : "This inverter model does not bridge separate battery ports."}
                </div>
              </Section>

              <Section title="Step 2. Choose the number of devices." open>
                <div style={styles.twoCol}>
                  <div>
                    <label style={styles.subFieldLabel}>Number of inverters</label>
                    <div style={styles.row}>
                      <button style={styles.smallButton} onClick={() => resizeSystem(inverterCount - 1, batteryCount)}>−</button>
                      <input style={styles.input} value={inverterCount} onChange={(e) => resizeSystem(e.target.value, batteryCount)} />
                      <button style={styles.smallButton} onClick={() => resizeSystem(inverterCount + 1, batteryCount)}>+</button>
                    </div>
                  </div>
                  <div>
                    <label style={styles.subFieldLabel}>Number of batteries</label>
                    <div style={styles.row}>
                      <button style={styles.smallButton} onClick={() => resizeSystem(inverterCount, batteryCount - 1)}>−</button>
                      <input style={styles.input} value={batteryCount} onChange={(e) => resizeSystem(inverterCount, e.target.value)} />
                      <button style={styles.smallButton} onClick={() => resizeSystem(inverterCount, batteryCount + 1)}>+</button>
                    </div>
                  </div>
                </div>
              </Section>

              <Section title="Auto configuration" open>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>Step 3. Choose the Configuration</div>
                <div style={styles.configButtonRow}>
                  <ControlButton onClick={autoConfigureShareBattery} active={configurationMode === "share"}>Share battery</ControlButton>
                  <ControlButton onClick={autoConfigureDoNotShareBattery} active={configurationMode === "do_not_share"}>Do not share battery</ControlButton>
                </div>
                <div style={{ ...styles.configButtonRow, marginTop: 8 }}>
                  <ControlButton onClick={() => setBatteryLayoutMode("side_by_side")} active={batteryLayoutMode === "side_by_side"}>Side to side</ControlButton>
                  <ControlButton onClick={() => setBatteryLayoutMode("front_stacking")} active={batteryLayoutMode === "front_stacking"}>Front stacking</ControlButton>
                </div>
                <div style={styles.helper}>Share battery will auto-configure a shared battery layout using eWay connection points, enable all adjacent battery conductors, and center the inverter landings on a contiguous battery window whenever possible so the unused batteries are balanced at both extremes, without automatically expanding to eWay Pro.</div>
                <div style={styles.helper}>Do not share battery will auto-configure proportional contiguous battery groups per inverter, make sure no battery is left unused, and use battery-to-battery conductors within each isolated group while keeping different inverter groups electrically separate.</div>
                <div style={styles.helper}>Layout view changes only the drawing. Share and Do Not Share battery rules stay the same.</div>
                <div style={styles.helper}>In front stacking, the lower battery in each stack is treated as eWay Lite and is fed from the eWay battery above it.</div>
              </Section>

              <Section title="Manual Configuration" open={false}>
                <Section title="Inverter → Battery conductors" open={false}>
                  <div style={styles.tableWrap}>
                    <table style={styles.table}>
                      <thead>
                        <tr>
                          <th style={styles.th}></th>
                          {results.batteryNames.map((b) => <th key={b} style={styles.th}>{b}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {results.inverterNames.map((inv, i) => {
                          const rowStyle = (connections[i]?.filter(Boolean).length || 0) > INVERTER_MODELS[inverterModel].maxPorts ? { background: "#fffbeb" } : undefined;
                          return (
                            <tr key={inv} style={rowStyle}>
                              <td style={styles.tdLabel}>{inv}</td>
                              {results.batteryNames.map((bat, j) => (
                                <td key={`${inv}-${bat}`} style={styles.td}>
                                  <ToggleButton on={Boolean(connections[i]?.[j])} onClick={() => toggleConnection(i, j)} />
                                </td>
                              ))}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </Section>

                <Section title="Battery connection points" open={false}>
                  {results.batteryNames.map((name, i) => {
                    const appliedType = getEffectiveBatteryConnectionType(i, batteryConnectionTypes[i] ?? "three_point_terminal", batteryLayoutMode);
                    const config = getConnectionPointConfig(appliedType);
                    const lockedFrontStackLite = isFrontStackBottomBattery(i, batteryLayoutMode);
                    return (
                      <div key={name} style={styles.linkRow}>
                        <div>
                          <div style={{ fontWeight: 700 }}>{name}</div>
                          <div style={styles.helper}>{config.label} • Max {formatAmps(config.nodeRating)} A node rating • {config.terminalCount} landing{config.terminalCount > 1 ? "s" : ""}{lockedFrontStackLite ? " • fixed by front stacking" : ""}</div>
                        </div>
                        <select value={appliedType} disabled={lockedFrontStackLite} onChange={(e) => changeBatteryConnectionType(i, e.target.value)} style={{ ...styles.select, width: 140, opacity: lockedFrontStackLite ? 0.7 : 1 }}>
                          <option value="single_point_terminal">eWay Lite</option>
                          <option value="three_point_terminal">eWay</option>
                          <option value="six_point_busbar">eWay Pro</option>
                        </select>
                      </div>
                    );
                  })}
                </Section>

                <Section title="Battery ↔ Battery conductors" open={false}>
                  {batteryCount === 1 ? <div style={styles.helper}>Add another battery to enable inter-battery conductors.</div> : null}
                  {Array.from({ length: Math.max(0, batteryCount - 1) }, (_, i) => (
                    <div key={i} style={styles.linkRow}>
                      <div>
                        <div style={{ fontWeight: 700 }}>{results.batteryNames[i]} ↔ {results.batteryNames[i + 1]}</div>
                        <div style={styles.helper}>250 A DC conductor</div>
                      </div>
                      <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                        <input type="checkbox" checked={batteryLinks[i]} onChange={() => toggleBatteryLink(i)} />
                        Enable
                      </label>
                    </div>
                  ))}
                </Section>
              </Section>
            </div>
          </div>

          <div style={styles.resultsCol}>
            <div style={styles.panel}>
              <div style={styles.figureHeaderRow}>
                <div style={{ fontSize: 18, fontWeight: 700 }}>Illustrative figure</div>
                <button style={styles.button} onClick={() => setIsFigureFullscreen(true)}>Expand</button>
              </div>
              <div style={styles.panelBody}>{figureContent}</div>
            </div>

            {isFigureFullscreen && (
              <div style={styles.overlayBackdrop} onClick={() => setIsFigureFullscreen(false)}>
                <div style={styles.overlayPanel} onClick={(e) => e.stopPropagation()}>
                  <div style={styles.figureHeaderRow}>
                    <div style={{ fontSize: 18, fontWeight: 700 }}>Illustrative figure</div>
                    <button style={styles.button} onClick={() => setIsFigureFullscreen(false)}>Close</button>
                  </div>
                  <div style={styles.panelBody}>{figureContent}</div>
                </div>
              </div>
            )}

            <div style={styles.panel}>
              <div style={styles.panelHeader}>System result</div>
              <div style={styles.panelBody}>
                <div style={styles.badgeRow}>
                  <MiniBadge type={results.risks.length === 0 ? "good" : "bad"}>{results.risks.length === 0 ? "No overload" : "Overload present"}</MiniBadge>
                  {results.alarms.length > 0 ? <MiniBadge type="bad">Alarm present</MiniBadge> : null}
                  <MiniBadge type="warn">System observations</MiniBadge>
                  <MiniBadge>Communication: Auto</MiniBadge>
                  <MiniBadge type={results.globalShareMode === "share" ? "good" : "warn"}>{results.globalShareMode === "share" ? "Share Battery" : "Do Not Share Battery"}</MiniBadge>
                  <MiniBadge type={results.bridgedPorts ? "warn" : undefined}>{results.bridgedPorts ? "Ports bridged internally" : "Ports not bridged"}</MiniBadge>
                  <MiniBadge>Inverter model: {results.modelLabel}</MiniBadge>
                  <MiniBadge>Total inverter current: {formatAmps(results.totalInput)} A</MiniBadge>
                  <MiniBadge>Total battery capacity: {formatAmps(batteryCount * BATTERY_MAX)} A</MiniBadge>
                </div>

                {(results.alarms.length > 0 || results.risks.length > 0 || results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0) && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 16, marginTop: 16 }}>
                    {results.alarms.length > 0 && (
                      <div style={styles.alertRed}>
                        <div style={styles.alertTitleRed}>🚨 Topology alarm</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 13, color: "#7f1d1d" }}>
                          {results.alarms.map((alarm, i) => <div key={`alarm-${i}`}>• {alarm}</div>)}
                        </div>
                      </div>
                    )}

                    {results.risks.length > 0 && (
                      <div style={styles.alertRed}>
                        <div style={styles.alertTitleRed}>🔴 Electrical risks</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 13, color: "#7f1d1d" }}>
                          {results.risks.map((risk, i) => <div key={`risk-${i}`}>• {risk}</div>)}
                        </div>
                      </div>
                    )}

                    {(results.observations.length > 0 || results.inverterLimitWarnings.length > 0 || results.advisories.length > 0) && (
                      <div style={styles.alertYellow}>
                        <div style={styles.alertTitleYellow}>🟡 System observations</div>
                        <StructuredObservations results={results} />
                      </div>
                    )}
                  </div>
                )}

                <div style={{ ...styles.cards, marginTop: 16 }}>
                  {results.batteryStatus.map((status) => {
                    const percent = Math.min(100, (status.finalLoad / BATTERY_MAX) * 100);
                    const cardStyle = status.overloaded ? styles.cardRed : status.inactive ? styles.cardYellow : styles.card;
                    return (
                      <div key={status.name} style={cardStyle}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                          <div style={{ fontWeight: 700 }}>{status.name}</div>
                          <MiniBadge type={status.overloaded ? "bad" : status.inactive ? "warn" : "good"}>{status.overloaded ? "Overloaded" : status.inactive ? "Idle" : "Within limit"}</MiniBadge>
                        </div>
                        <div style={{ fontSize: 13, color: "#334155", marginBottom: 4 }}>Connection point: {status.config.label}</div>
                        <div style={{ fontSize: 13, color: "#334155", marginBottom: 4 }}>Incoming current at node: {formatAmps(status.incomingNodeCurrent)} A</div>
                        <div style={{ fontSize: 13, color: "#334155", marginBottom: 4 }}>Battery Charge/Discharge: {formatAmps(status.finalLoad)} A</div>
                        <div style={{ fontSize: 13, color: "#334155", marginBottom: 4 }}>Max current at node: {formatAmps(status.maxNodeCurrent)} A</div>
                        <div style={{ fontSize: 12, color: "#64748b" }}>Power landings used: {status.totalConnectionPointsUsed} / {status.config.terminalCount}</div>
                        <div style={styles.progress}>
                          <div style={{ width: `${percent}%`, height: "100%", background: status.overloaded ? "#ef4444" : status.inactive ? "#eab308" : "#0f172a" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


    const container = document.getElementById("root");
    container.innerHTML = "";
    ReactDOM.createRoot(container).render(<ElectricalBehaviorModel />);
  </script>
</body>
</html>
